                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                const Y_HEADER = 0.35; 
                const Y_NOME   = 0.45; 
                const Y_CORPO  = 0.55; 
                const Y_CURSO  = 0.62; 
                const Y_DATA   = 0.78; 

                ctx.font = `italic ${Math.floor(w * 0.018)}px 'Merriweather', serif`;
                ctx.fillStyle = "#475569";
                ctx.fillText("Certificamos para os devidos fins que", centerX, h * Y_HEADER);

                const nomeAluno = finalUser.displayName || finalUser.name || "Nome do Aluno";
                ctx.font = `bold ${Math.floor(w * 0.05)}px 'Merriweather', serif`; 
                ctx.fillStyle = "#0f172a"; 
                ctx.shadowColor = "rgba(0,0,0,0.15)"; 
                ctx.shadowBlur = 5;
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 3;
                ctx.fillText(nomeAluno, centerX, h * Y_NOME, w * 0.85);
                ctx.shadowColor = "transparent";

                let docText = "";
                if (finalUser.cpf) docText += `CPF: ${finalUser.cpf}`;
                if (finalUser.cpf && finalUser.rg) docText += "  •  "; 
                if (finalUser.rg) docText += `RG: ${finalUser.rg}`;
                
                if (docText) {
                    ctx.font = `${Math.floor(w * 0.014)}px 'Inter', sans-serif`;
                    ctx.fillStyle = "#64748b"; 
                    ctx.fillText(docText, centerX, h * (Y_NOME + 0.06));
                }

                ctx.font = `normal ${Math.floor(w * 0.018)}px 'Inter', sans-serif`;
                ctx.fillStyle = "#334155";
                ctx.fillText("Concluiu com êxito a carga horária do curso profissionalizante de:", centerX, h * Y_CORPO);

                ctx.font = `bold ${Math.floor(w * 0.035)}px 'Merriweather', serif`;
                ctx.fillStyle = "#1e293b"; 
                ctx.fillText(course.title, centerX, h * Y_CURSO, w * 0.8);

                ctx.beginPath();
                ctx.moveTo(centerX - (w * 0.15), h * 0.74);
                ctx.lineTo(centerX + (w * 0.15), h * 0.74);
                ctx.strokeStyle = "#cbd5e1";
                ctx.lineWidth = 2;
                ctx.stroke();

                const dateStr = new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
                ctx.font = `${Math.floor(w * 0.016)}px 'Inter', sans-serif`;
                ctx.fillStyle = "#475569";
                ctx.fillText(`São Paulo, ${dateStr}`, centerX, h * Y_DATA);

                setPreviewHighRes(canvas.toDataURL('image/jpeg', 0.9));
            };

        }, [expandedCert, user]);

        const handleExpand = (course, template, customPdf) => {
            setExpandedCert({ course, template, customPdf });
        };

        const handleClose = () => {
            setExpandedCert(null);
        };

        const availableCertificates = courses.filter(course => {
            const prog = userProgress ? userProgress[course.id] : null;
            if (prog && prog.percentage === 100) return true;

            let total = 0;
            let completed = 0;
            if(course.modulos) {
                course.modulos.forEach((mod, mIdx) => {
                    if(mod.aulas) mod.aulas.forEach((_, lIdx) => {
                        total++;
                        if(localStorage.getItem(`completed_${user.uid}_${course.id}_${mIdx}_${lIdx}`) === 'true') {
                            completed++;
                        }
                    });
                });
            }
            return total > 0 && completed === total;
        });

        return (
            <div className="space-y-4 md:space-y-10 animate-fade-in max-w-[100rem] mx-auto mt-16 md:mt-28 mb-10 px-3 md:px-8 lg:px-12 font-sans">
                
                {/* HEADER (Mais compacto no mobile) */}
                <div className="flex items-center gap-2 md:gap-5 mb-3 md:mb-8 px-1">
                   <div className="p-2 md:p-5 bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 dark:text-yellow-400 rounded-lg md:rounded-2xl shadow-inner">
                       <Award className="w-5 h-5 md:w-8 md:h-8" />
                   </div>
                   <div>
                       <h2 className="text-xl md:text-4xl font-black text-slate-800 dark:text-white tracking-tight">Galeria de Certificados</h2>
                       <p className="text-slate-500 dark:text-slate-400 text-[10px] md:text-base mt-0.5 md:mt-1.5">Visualize e baixe seus certificados de conclusão.</p>
                   </div>
               </div>

               {availableCertificates.length === 0 ? (
                   <div className="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl md:rounded-3xl p-8 md:p-24 flex flex-col items-center justify-center text-center bg-slate-50/50 dark:bg-slate-900/50 min-h-[200px] md:min-h-[400px]">
                       <div className="w-12 h-12 md:w-24 md:h-24 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-400 mb-3 md:mb-8">
                           <Lock className="w-6 h-6 md:w-12 md:h-12" />
                       </div>
                       <h4 className="font-extrabold text-base md:text-3xl text-slate-700 dark:text-slate-200 mb-1.5 md:mb-4">Nenhuma conquista ainda</h4>
                       <p className="text-slate-500 text-xs md:text-lg max-w-sm md:max-w-xl leading-relaxed">Complete 100% de um curso para liberar seu certificado e registrar sua conquista aqui.</p>
                   </div>
               ) : (
                  

               // GRADE DE CERTIFICADOS (Layout de Documento Horizontal - Usa o componente CertificateCard)
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        {availableCertificates.map(course => {
                            const template = certificates.find(c => c.courseId === course.id);
                            // Aqui o código puxa o PDF oficial que o administrador enviou pelo painel!
                            const customPdf = customCerts ? customCerts[course.id] : null; 
                            
                            return (
                                <CertificateCard 
                                    key={course.id} 
                                    user={user} 
                                    course={course} 
                                    template={template}
                                    customPdf={customPdf} 
                                    onExpand={handleExpand} 
                                />
                            );
                        })}
                    </div>
                )}

               {/* Modal de Visualização (INALTERADO) */}
               {expandedCert && (
                   <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md animate-fade-in" onClick={handleClose}>
                       <div className="relative w-full max-w-6xl bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
                           
                           <div className="p-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-white dark:bg-slate-900 z-10 shrink-0">
                               <h3 className="font-bold text-slate-800 dark:text-white flex items-center gap-2">
                                   <Award className="text-yellow-500" size={20}/> 
                                   {expandedCert.course.title}
                               </h3>
                               <button onClick={handleClose} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors text-slate-500 dark:text-slate-400">
                                   <X size={24} />
                               </button>
                           </div>

                           <div className="flex-1 overflow-hidden p-4 md:p-8 bg-slate-100 dark:bg-slate-950 flex items-center justify-center min-h-[50vh]">
                                {expandedCert.customPdf ? (
                                    expandedCert.customPdf.toLowerCase().includes('.pdf') ? (
                                        <iframe src={`${expandedCert.customPdf}#view=FitH`} className="w-full h-[70vh] rounded-xl shadow-2xl bg-white border-none" />
                                    ) : (
                                        <img src={expandedCert.customPdf} className="max-w-full max-h-[70vh] object-contain shadow-2xl rounded-lg border-4 border-white dark:border-slate-800" alt="Certificado Personalizado" />
                                    )
                                ) : previewHighRes ? (
                                    <img 
                                        src={previewHighRes} 
                                        className="max-w-full max-h-[70vh] object-contain shadow-2xl rounded-lg border-4 border-white dark:border-slate-800" 
                                        alt="Certificado Expandido" 
                                    />
                                ) : (
                                    <div className="flex flex-col items-center gap-3 text-slate-400 py-20">
                                        <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                        <p>Gerando alta resolução...</p>
                                    </div>
                                )}
                            </div>
                           <div className="p-6 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col md:flex-row justify-between items-center gap-4 shrink-0">
                               <p className="text-sm text-slate-500 dark:text-slate-400 text-center md:text-left">
                                   Certificado emitido para <strong>{user.displayName}</strong>
                               </p>
                               <button 
                                   onClick={() => {
                                        if (customCerts && customCerts[expandedCert.course.id]) {
                                            window.open(customCerts[expandedCert.course.id], "_blank");
                                        } else {
                                            onGenerate(expandedCert.course.id, expandedCert.course.title);
                                        }
                                   }}
                                   className="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-lg shadow-indigo-600/20 flex items-center gap-2 transition-all hover:scale-105 active:scale-95 w-full md:w-auto justify-center"
                               >
                                   <Download size={20} /> {customCerts && customCerts[expandedCert.course.id] ? "Baixar PDF Oficial" : "Baixar Certificado"}
                               </button>
                           </div>
                       </div>
                   </div>
               )}
            </div>
        );
    };
   
   
   






// =================================================================================
    // SUB-COMPONENTE: INPUT GLASSMORPHISM (COMPACTO NO MOBILE, GRANDE NO PC)
    // =================================================================================
    const PremiumInput = ({ label, icon: Icon, id, ...props }) => (
        <div className="space-y-1 md:space-y-2.5 group">
            <label htmlFor={id} className="text-[9px] md:text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 md:ml-1.5 transition-colors group-focus-within:text-indigo-400">
                {label}
            </label>
            <div className="relative">
                {Icon && <Icon className="absolute left-3 md:left-5 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 transition-colors w-4 h-4 md:w-5 md:h-5" />}
                <input 
                    id={id}
                    className={`w-full bg-black/20 dark:bg-black/40 backdrop-blur-sm border border-slate-200 dark:border-white/10 rounded-lg md:rounded-2xl px-3 md:px-5 py-2.5 md:py-4 outline-none transition-all duration-300 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-600 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30 hover:border-slate-300 dark:hover:border-white/20 text-xs md:text-base shadow-inner ${Icon ? 'pl-9 md:pl-12' : ''} disabled:opacity-50 disabled:bg-black/10`}
                    {...props}
                />
            </div>
        </div>
    );

    // =================================================================================
    // COMPONENTE PERFIL (SaaS PREMIUM - OTIMIZADO PARA MOBILE)
    // =================================================================================
    const ProfileSection = ({ user, showNotification }) => {
        // --- ESTADOS DO COMPONENTE ---
        const [userData, setUserData] = useState({
            name: user.displayName || '', email: user.email || '', cpf: '', rg: '', phone: '', birthDate: '', zipCode: '', address: '', number: '', neighborhood: '', city: '', state: '', bio: '', photoBase64: null
        });
        const [isEditing, setIsEditing] = useState(false);
        const [isLoading, setIsLoading] = useState(false);
        const fileInputRef = useRef(null);

        // --- LÓGICA DE DADOS ---
        useEffect(() => {
            const fetchUserData = async () => {
                if(!db) return;
                try {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if(docSnap.exists()) setUserData(prev => ({...prev, ...docSnap.data()}));
                } catch (error) { console.error("Erro ao buscar perfil", error); }
            };
            fetchUserData();
        }, [user]);

        const handleChange = (field, value) => setUserData(prev => ({ ...prev, [field]: value }));
        
        const handleCpfChange = (e) => { 
            let v = e.target.value.replace(/\D/g, '').slice(0, 11);
            v = v.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            handleChange('cpf', v); 
        };
        
        const handlePhoneChange = (e) => { 
            let v = e.target.value.replace(/\D/g, '').slice(0, 11);
            v = v.replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d)(\d{4})$/, '$1-$2');
            handleChange('phone', v); 
        };

        const handleCepChange = async (e) => {
            let v = e.target.value.replace(/\D/g, '').slice(0, 8);
            v = v.replace(/^(\d{5})(\d)/, '$1-$2');
            handleChange('zipCode', v);
            if (v.replace(/\D/g, '').length === 8) {
                try {
                    const res = await fetch(`https://viacep.com.br/ws/${v.replace('-','')}/json/`);
                    const data = await res.json();
                    if (!data.erro) setUserData(prev => ({ ...prev, address: data.logradouro, neighborhood: data.bairro, city: data.localidade, state: data.uf }));
                } catch (err) { }
            }
        };

        const handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (readerEvent) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > 300) { height *= 300 / width; width = 300; } } else { if (height > 300) { width *= 300 / height; height = 300; } }

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                };

    const getS3Client = () => {
        if (typeof AWS === 'undefined') {
            console.error("ERRO CRÍTICO: AWS SDK não foi carregado.");
            return null;
        }

        // DADOS DO ADMIN (Conexão Unificada)
        const accountId = '2ece542306d80259e71a793d20f91a60';
        const accessKeyId = '5365b5ba42a26381492e9869e322d27a';
        const secretAccessKey = '9c1257268d4892c92f9f43f7fd3a9eb5b0dcb6e29224c00a898c4cbffb1cc059';

        return new AWS.S3({
            endpoint: `https://${accountId}.r2.cloudflarestorage.com`,
            accessKeyId: accessKeyId,
            secretAccessKey: secretAccessKey,
            signatureVersion: 'v4',
            region: 'auto',
            s3ForcePathStyle: true,
            httpOptions: { timeout: 300000 } // 5 minutos de timeout
        });

    // ======================================================
    // 2. FUNÇÃO DE UPLOAD CONECTADA (CONFIGURAÇÃO DEFINITIVA)
    // ======================================================
    const uploadToCustomDrive = async (file, folder = 'Community/') => {
        if (!file) return null;
        
        const s3 = getS3Client(); // Usa as credenciais do Admin
        if (!s3) {
            alert("Erro: Biblioteca de upload não carregou.");
            return null;
        }

        const bucketName = 'test03'; 
        
        // ---------------------------------------------------------
        // ⚠️ ATENÇÃO: A CONEXÃO ESTÁ AQUI
        // ---------------------------------------------------------
        // Cole o link que você pegou no Cloudflare (Public Access) entre as aspas.
        // NÃO coloque a barra "/" no final.
        
        const publicDomain = "https://pub-263c6a7252164111a104a68e6835cfc4.r2.dev"; 
        
        // ---------------------------------------------------------

        // 👇 NOVO: Proteção para fotos do celular que vêm sem nome 👇
        const safeFileName = file.name || "mobile_upload.jpg";
        const parts = safeFileName.split('.');
        const extension = parts.length > 1 ? parts.pop().toLowerCase() : (file.type.split('/')[1] || 'jpg');
        const timestamp = Date.now();
        
        // Limpeza de nome segura
        const cleanName = parts[0]
            ? parts[0].normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/g, "")
            : "media"; 
        
        const uniqueFileName = `${timestamp}_${cleanName}.${extension}`;
        // 👆 FIM DO BLOCO NOVO 👆
        const key = `${folder}${uniqueFileName}`;

        // Define o tipo de arquivo corretamente
        let contentType = file.type;
        if (!contentType || contentType === '') {
            if(extension === 'png') contentType = 'image/png';
            else if(extension === 'jpg' || extension === 'jpeg') contentType = 'image/jpeg';
            else if(extension === 'mp4') contentType = 'video/mp4';
            else if(extension === 'pdf') contentType = 'application/pdf';
        }

        let detectedType = 'image';
        if (contentType.includes('video') || ['mp4', 'webm', 'mov', 'avi'].includes(extension)) {
            detectedType = 'video';
        } else if (contentType.includes('audio') || ['mp3', 'wav', 'ogg'].includes(extension)) {
            detectedType = 'audio';
        } else if (contentType.includes('pdf') || contentType.includes('application')) {
            detectedType = 'file';
        }

        const params = {
            Bucket: bucketName,
            Key: key,
            Body: file,
            ContentType: contentType
            // ACL removido pois R2 gerencia isso pelo Public Access
        };

        console.log(`[Upload R2] Iniciando envio para: ${publicDomain}/${key}`);

        return new Promise((resolve, reject) => {
            const upload = s3.upload(params);

            upload.on('httpUploadProgress', (evt) => {
                const percent = parseInt((evt.loaded * 100) / evt.total);
                console.log(`Progresso: ${percent}%`);
            });

            upload.send((err, data) => {
                if (err) {
                    console.error("❌ ERRO NO UPLOAD R2:", err);
                    alert(`Falha no upload. Verifique o Console.`);
                    reject(err);
                } else {
                    // Monta o Link Final que vai aparecer no site
                    const finalUrl = `${publicDomain}/${key}`;
                    console.log("✅ Upload Sucesso! Link Público:", finalUrl);
                    
                    resolve({
                        url: finalUrl, 
                        type: detectedType,
                        name: uniqueFileName
                    });
                }
            });
        });
    };

    // --- MINI PLAYER DE ÁUDIO (DESIGN WHATSAPP CLONE) ---
    const MiniAudioPlayer = ({ src, isMe, avatarUrl }) => {
        const audioRef = useRef(null);
        const [isPlaying, setIsPlaying] = useState(false);
        const [duration, setDuration] = useState(0);
        const [currentTime, setCurrentTime] = useState(0);

        useEffect(() => {
            const audio = audioRef.current;
            if (!audio) return;
            
            const setAudioData = () => {
                if (audio.duration && audio.duration !== Infinity) setDuration(audio.duration);
            };

            const onTimeUpdate = () => setCurrentTime(audio.currentTime);
            const onEnded = () => { setIsPlaying(false); setCurrentTime(0); };
            
            // Força o carregamento do metadado para garantir a duração no Safari/iOS
            if (audio.readyState >= 1) setAudioData();
            
            audio.addEventListener('loadedmetadata', setAudioData);
            audio.addEventListener('durationchange', setAudioData);
            audio.addEventListener('timeupdate', onTimeUpdate);
            audio.addEventListener('ended', onEnded);
            
            return () => {
                audio.removeEventListener('loadedmetadata', setAudioData);
                audio.removeEventListener('durationchange', setAudioData);
                audio.removeEventListener('timeupdate', onTimeUpdate);
                audio.removeEventListener('ended', onEnded);
            };
        }, [src]);

        const togglePlay = (e) => {
            e.preventDefault();
            e.stopPropagation();
            const audio = audioRef.current;
            if (!audio) return;
            if (isPlaying) audio.pause();
            else audio.play().catch(err => console.error("Erro ao reproduzir:", err));
            setIsPlaying(!isPlaying);
        };

        const formatTime = (time) => {
            if (!time || isNaN(time)) return "0:00";
            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60);
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        };

        return (
            <div className="flex items-center gap-3 pt-1 pb-1 min-w-[240px] md:min-w-[280px]" onClick={(e) => e.stopPropagation()}>
                <audio ref={audioRef} src={src} preload="metadata" />
                
                {/* Avatar do WhatsApp */}

                    <div className="w-10 h-10 md:w-12 md:h-12 rounded-full overflow-hidden bg-slate-200 dark:bg-slate-700 shadow-sm flex items-center justify-center border border-white/10">

                            <Mic size={12} fill="currentColor" />
                        </div>
                    )}
                </div>

                {/* Play/Pause Button */}
                <button 
                    onClick={togglePlay}
                    type="button"
                    className="text-slate-500 dark:text-slate-300 hover:opacity-80 transition-opacity shrink-0 ml-1"
                >
                    {isPlaying ? <Pause size={28} fill="currentColor" /> : <Play size={28} fill="currentColor" />}
                </button>

                {/* Linha do Tempo & Duração */}
                <div className="flex flex-col flex-1 min-w-0 justify-center pr-2">
                    <div className="flex items-center w-full h-6 relative">
                        <input 
                            type="range" min="0" max={duration || 100} value={currentTime} 
                            onChange={(e) => { 
                                e.stopPropagation(); 
                                const audio = audioRef.current; 
                                if(audio) { 
                                    audio.currentTime = Number(e.target.value); 
                                    setCurrentTime(Number(e.target.value)); 
                                } 
                            }}
                            className={`w-full h-1 md:h-1.5 appearance-none bg-black/10 dark:bg-white/20 rounded-full outline-none cursor-pointer
                                [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-3 [&::-webkit-slider-thumb]:h-3 [&::-webkit-slider-thumb]:rounded-full 
                                ${isMe ? '[&::-webkit-slider-thumb]:bg-[#00a884] accent-[#00a884]' : '[&::-webkit-slider-thumb]:bg-blue-500 accent-blue-500'}
                            `}
                        />
                    </div>
                    <div className="flex justify-between items-center -mt-1">
                        <span className="text-[10px] md:text-[11px] font-medium text-slate-500 dark:text-white/60">
                            {isPlaying ? formatTime(currentTime) : formatTime(duration)}

        );
    };
