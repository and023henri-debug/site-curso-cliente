                            </div>
                        </div>

                        <div className="flex-1 flex flex-col relative bg-black overflow-hidden h-[60vh] md:h-full">
                            {activeProductFile ? (
                                <>
                                    <div className="p-3 md:p-4 bg-[#111] border-b border-white/10 flex justify-between items-center shrink-0 z-20 shadow-lg">
                                        <h4 className="text-white font-bold text-xs md:text-base line-clamp-1 pr-2 md:pr-4">{activeProductFile.name}</h4>
                                        <button 
                                            onClick={(e) => { e.preventDefault(); handleForceDownload(activeProductFile.url, activeProductFile.name); }}
                                            disabled={isDownloading}
                                            className="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-2 md:px-4 md:py-2.5 rounded-lg font-bold text-[10px] md:text-sm flex items-center gap-1.5 md:gap-2 transition-all shadow-[0_0_15px_rgba(79,70,229,0.4)] shrink-0 active:scale-95 disabled:opacity-50"
                                        >
                                            {isDownloading ? <div className="w-3 h-3 md:w-4 md:h-4 border-2 border-white/50 border-t-white rounded-full animate-spin"></div> : <Download size={14} className="md:w-4 md:h-4" />}
                                            <span className="hidden sm:inline">{isDownloading ? 'Baixando...' : 'Baixar Arquivo'}</span>
                                            <span className="sm:hidden">{isDownloading ? '...' : 'Baixar'}</span>
                                        </button>
                                    </div>
                                    
                                    <div className="flex-1 w-full flex items-center justify-center p-0 md:p-6 relative overflow-hidden bg-[#050505]">
                                        {(() => {
                                            const url = (activeProductFile.url || '').toLowerCase();
                                            const type = activeProductFile.type || 'arquivo';

                                            if (type === 'video' || url.match(/\.(mp4|webm|ogg)$/)) {
                                                if(url.includes('youtube.com') || url.includes('youtu.be') || url.includes('vimeo')) {
                                                    return <iframe src={activeProductFile.url} className="w-full h-full border-none md:rounded-2xl bg-black" allowFullScreen></iframe>
                                                }
                                                return (
                                                    <div className="w-full h-full md:rounded-2xl overflow-hidden shadow-2xl md:border border-white/10 relative">
                                                        <CustomVideoPlayer 
                                                            src={activeProductFile.url} 
                                                            isCompleted={true} 
                                                            onEnded={() => {}} 
                                                            showNotification={showNotification}
                                                        />
                                                    </div>
                                                );
                                            } else if (type === 'image' || url.match(/\.(jpeg|jpg|gif|png|webp)$/)) {
                                                return <img src={activeProductFile.url} className="max-w-full max-h-full object-contain md:rounded-2xl shadow-2xl border-none md:border border-white/5" alt="Preview Imagem" />;
                                            } else if (type === 'pdf' || url.match(/\.(pdf)$/)) {
                                                return <iframe src={`${activeProductFile.url}#view=FitH`} className="w-full h-full bg-white md:rounded-2xl shadow-2xl border-none"></iframe>;
                                            } else if (type === 'audio' || url.match(/\.(mp3|wav|ogg|m4a)$/i)) {
                                                return (
                                                    <div className="w-full px-4 flex items-center justify-center h-full">
                                                        <MarketplaceAudioPlayer 
                                                            url={activeProductFile.url} 
                                                            name={activeProductFile.name} 
                                                            onDownload={() => handleForceDownload(activeProductFile.url, activeProductFile.name)}
                                                            isDownloading={isDownloading}
                                                        />
                                                    </div>
                                                );
                                            } else {
                                                return (
                                                    <div className="text-center p-6 md:p-8 max-w-sm bg-[#111] rounded-2xl border border-white/5 shadow-2xl m-4">
                                                        <div className="w-16 h-16 md:w-20 md:h-20 bg-indigo-500/20 text-indigo-400 rounded-full flex items-center justify-center mx-auto mb-4 md:mb-5 shadow-inner">
                                                            <LinkIcon size={24} className="md:w-8 md:h-8" />
                                                        </div>
                                                        <h4 className="text-lg md:text-xl font-bold text-white mb-2 md:mb-3">Download Disponível</h4>
                                                        <p className="text-white/50 mb-6 md:mb-8 text-xs md:text-sm leading-relaxed">Este tipo de arquivo precisa ser baixado para ser aberto no seu dispositivo.</p>
                                                        <button 
                                                            onClick={(e) => { e.preventDefault(); handleForceDownload(activeProductFile.url, activeProductFile.name); }}
                                                            disabled={isDownloading}
                                                            className="w-full bg-white text-black px-4 md:px-6 py-3 md:py-4 rounded-xl font-extrabold shadow-xl hover:bg-gray-200 transition-colors flex items-center justify-center gap-2 disabled:opacity-50 text-sm md:text-base"
                                                        >
                                                            {isDownloading ? <div className="w-4 h-4 md:w-5 md:h-5 border-2 border-black/50 border-t-black rounded-full animate-spin"></div> : <Download size={18} />} 
                                                            {isDownloading ? 'Baixando Arquivo...' : 'Fazer Download Agora'}
                                                        </button>
                                                    </div>
                                                );
                                            }
                                        })()}
                                    </div>
                                </>
                            ) : (
                                <div className="flex-1 flex flex-col items-center justify-center text-center p-8">
                                    <div className="w-16 h-16 md:w-20 md:h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/10">
                                        <FileText size={28} className="md:w-8 md:h-8 text-white/20" />
                                    </div>
                                    <h4 className="text-base md:text-lg font-bold text-white mb-2">Selecione um Arquivo</h4>
                                    <p className="text-white/40 text-xs md:text-sm leading-relaxed">Escolha um item na lista ao lado para visualizar ou baixar.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};
// =================================================================================
// FIM DO COMPONENTE ALUNO: LOJA / MARKETPLACE
// =================================================================================
    
// =================================================================================
    // SUB-COMPONENTE: PLAYER DE VÍDEO CUSTOMIZADO PREMIUM (VIDEO.JS LOW LATENCY)
    // =================================================================================
    const CustomVideoPlayer = ({ src, onEnded, poster, isCompleted, showNotification }) => {
        const videoRef = useRef(null);
        const playerRef = useRef(null);

        // Define a variável global de controle para a IA
        useEffect(() => {
            window.AemVideoControl = {
                play: () => { if (playerRef.current) playerRef.current.play(); },
                pause: () => { if (playerRef.current) playerRef.current.pause(); },
                skip: (amount) => { 
                    if (playerRef.current) {
                        const newTime = playerRef.current.currentTime() + amount;
                        if (amount > 0 && !isCompleted && newTime > playerRef.current.currentTime()) {
                             if (showNotification) showNotification("Assista ao vídeo para liberar o avanço.", "error");
                             return;
                        }
                        playerRef.current.currentTime(newTime);
                    }
                }
            };
            return () => { delete window.AemVideoControl; };
        }, [isCompleted, showNotification]);

        useEffect(() => {
            const vjs = window.videojs; 
            
            if (!playerRef.current && videoRef.current) {
                const videoElement = videoRef.current;

                playerRef.current = vjs(videoElement, {
                    autoplay: true,
                    muted: true, // Começa mutado para permitir autoplay
                    controls: true,
                    liveui: true, // UI especial para transmissões ao vivo
                    poster: poster,
                    html5: {
                        vhs: {
                            liveSyncDuration: 1.5, 
                            liveMaxLatencyDuration: 3.0, 
                            liveTolerance: 0.5, 
                            backBufferLength: 5, 
                            enableLowInitialPlaylist: true,
                            limitRenditionByPlayerDimensions: false,
                            fastMQ: true,
                            useBandwidthFromLocalStorage: true
                        }
                    }
                });

                // Eventos
                playerRef.current.on('ended', () => {
                    if (onEnded) onEnded();
                });

                // Auto-Completar (simulando a lógica original que avançava o progresso)
                playerRef.current.on('timeupdate', () => {
                    const player = playerRef.current;
                    const perc = (player.currentTime() / player.duration()) * 100;
                    // Lógica simplificada do seu auto-completar original:
                    if (perc > 95 && !isCompleted && !playerRef.current.hasAutoCompleted) {
                        playerRef.current.hasAutoCompleted = true;
                        if (onEnded) onEnded();
                    }
                });

                playerRef.current.ready(() => {
                    const player = playerRef.current;
                    player.src({ src: src, type: 'application/x-mpegURL' }); // Importante: tipo HLS
                    
                    player.on('loadedmetadata', () => {
                        const duration = player.duration();
                        // Tenta pular para o final (ao vivo) se for uma live
                        if (isFinite(duration)) {
                            player.currentTime(duration);
                        }
                    });
                });
            }

            return () => {
                if (playerRef.current) {
                    playerRef.current.dispose();
                    playerRef.current = null;
                }
            };
        }, [src, poster, isCompleted, onEnded]);

        return (
            <div data-vjs-player className="w-full h-full rounded-2xl overflow-hidden shadow-2xl bg-black">
                <video 
                    ref={videoRef} 
                    className="video-js vjs-default-skin vjs-big-play-centered w-full h-full object-cover" 
                    playsInline
                    preload="auto"
                />
            </div>
        );
    };

// =================================================================================
    // MOTOR DE EXTRAÇÃO DE ÁUDIO PARA A IA (Baseado no seu modelo)
    // =================================================================================
    const audioBufferToWav = (buffer) => {
        const numOfChan = buffer.numberOfChannels;
        const length = buffer.length * numOfChan * 2 + 44;
        const bufferWav = new ArrayBuffer(length);
        const view = new DataView(bufferWav);
        const channels = [];
        let i, sample, offset = 0, pos = 0;

        function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
        function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); setUint32(0x20746d66);
        setUint32(16); setUint16(1); setUint16(numOfChan); setUint32(buffer.sampleRate);
        setUint32(buffer.sampleRate * 2 * numOfChan); setUint16(numOfChan * 2); setUint16(16);
        setUint32(0x61746164); setUint32(length - pos - 4);

        for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

        while (pos < length) {
            for (i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][offset])); 
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0; 
                view.setInt16(pos, sample, true); 
                pos += 2;
            }
            offset++;
        }
        return bufferWav;
    };

    const extractAndResampleAudio = async (fileOrBlob) => {
        try {
            const arrayBuffer = await fileOrBlob.arrayBuffer();
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            // REDUZIDO DE 16000 PARA 8000 (Garante que áudios longos não passem de 4.5MB na Vercel)
            const targetSampleRate = 8000; 
            const offlineCtx = new OfflineAudioContext(1, audioBuffer.duration * targetSampleRate, targetSampleRate);
            
            const source = offlineCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(offlineCtx.destination);
            source.start(0);
            
            const resampledBuffer = await offlineCtx.startRendering();
            audioCtx.close(); 
            
            const wavArrayBuffer = audioBufferToWav(resampledBuffer);
            return new Blob([wavArrayBuffer], { type: 'audio/wav' });
        } catch (e) {
            throw new Error("Falha ao extrair áudio do vídeo. O vídeo pode ser incompatível.");
        }
    };

    const convertBlobToBase64 = (blob) => {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
        });
    };
    // =================================================================================

    // =================================================================================
    // COMPONENTE COURSE PLAYER (LAYOUT HOTMART CLUB / NETFLIX PREMIUM) - RESPONSIVO
    // =================================================================================
    const CoursePlayer = ({ user, course, onBackToModules, onFinishCourse, showNotification, onGoToCertificates }) => {
        const [activeModuleIndex, setActiveModuleIndex] = useState(0);
        const [activeLessonIndex, setActiveLessonIndex] = useState(0);
        
        const [activeTab, setActiveTab] = useState('visao_geral');
        const [note, setNote] = useState('');
        const [savedNote, setSavedNote] = useState(false);
        const [isCinemaMode, setIsCinemaMode] = useState(false);
        const [expandedModules, setExpandedModules] = useState({ 0: true });
        const [completedMap, setCompletedMap] = useState({});

        const [isFavorite, setIsFavorite] = useState(false);
        const [likeStatus, setLikeStatus] = useState(null); 

        // Estado que controla o modal de Parabéns
        const [showCelebration, setShowCelebration] = useState(false);

        // ESTADOS: PRÉ-VISUALIZAÇÃO DE MATERIAIS EXTRAS
        const [previewMaterial, setPreviewMaterial] = useState(null);
        const [downloadingUrl, setDownloadingUrl] = useState(null);

        

        // Função de segurança para links
        const fixUrl = (url) => {
            if (!url) return null;
            const wrongDomain = "https://pub-2ece542306d80259e71a793d20f91a60.r2.dev";
            const rightDomain = "https://pub-263c6a7252164111a104a68e6835cfc4.r2.dev";
            if (url.includes(wrongDomain)) return url.replace(wrongDomain, rightDomain);
            return url;
        };

        const handleForceDownload = async (url, fileName) => {
            if (!url) return;
            setDownloadingUrl(url);
            if (showNotification) showNotification("Iniciando o download...", "info");
            
            try {
                // TRUQUE MÁGICO: Adiciona 't=' com a hora atual para ignorar o cache corrompido do navegador
                const fetchUrl = url + (url.includes('?') ? '&' : '?') + 'force_download=1&t=' + Date.now();
                
                const response = await fetch(fetchUrl, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache' // Força pular o cache
                });
                
                if (!response.ok) throw new Error("Erro na rede ao baixar");
                
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                
                // Pega o nome do arquivo da URL se estiver vazio
                let finalName = fileName || 'arquivo_baixado';
                if (!finalName.includes('.')) {
                    const parts = url.split('/');
                    const lastPart = parts[parts.length - 1].split('?')[0];
                    if (lastPart.includes('.')) finalName = lastPart;
                }
                
                link.download = finalName;
                document.body.appendChild(link);
                link.click();
                
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } catch (error) {
                console.error("Erro no download:", error);
                // Fallback apenas para links como Google Drive que bloqueiam downloads ocultos
                window.open(url, '_blank');
            } finally {
                setDownloadingUrl(null);
            }
        };

        const modules = course.modulos || [];
        const currentModule = modules[activeModuleIndex] || { aulas: [] };
        const currentLesson = currentModule.aulas ? currentModule.aulas[activeLessonIndex] : null;

        const lessonUniqueId = `${course.id}_m${activeModuleIndex}_l${activeLessonIndex}`;
        const noteStorageKey = `milton_note_${user.uid}_${lessonUniqueId}`;
        
        
        const totalLessons = modules.reduce((acc, mod) => acc + (mod.aulas ? mod.aulas.length : 0), 0);
        let validCompletedCount = 0;
        if (totalLessons > 0) {
            Object.keys(completedMap).forEach(key => {
                if (completedMap[key]) validCompletedCount++;
            });
        }
        const progressPercent = totalLessons === 0 ? 0 : Math.min(100, Math.round((validCompletedCount / totalLessons) * 100));

        // 👇 NOVOS ESTADOS DO DIÁRIO AVANÇADO 👇
        const [isAiCorrecting, setIsAiCorrecting] = useState(false);
        const [isNoteLoading, setIsNoteLoading] = useState(false);
        const [isFlipping, setIsFlipping] = useState(false);
        
        // Estados Opcionais do Aluno
        const [noteCover, setNoteCover] = useState('');
        const [noteSignature, setNoteSignature] = useState('');
        const editorRef = useRef(null);

        // CARREGA NOTAS DA NUVEM (Firebase)
        useEffect(() => {
            if (!user?.uid || !db || !lessonUniqueId) return;
            const loadDbNote = async () => {
                setIsNoteLoading(true);
                try {
                    const noteRef = doc(db, "student_notes", `${user.uid}_${lessonUniqueId}`);
                    const noteSnap = await getDoc(noteRef);
                    if (noteSnap.exists()) {
                        const data = noteSnap.data();
                        setNote(data.text || '');
                        setNoteCover(data.cover || '');
                        setNoteSignature(data.signature || '');
                        // Atualiza o editor caso já esteja renderizado
                        if (editorRef.current) editorRef.current.innerHTML = data.text || '';
                    } else {
                        setNote(''); setNoteCover(''); setNoteSignature('');
                        if (editorRef.current) editorRef.current.innerHTML = '';
                    }
                } catch(e) { console.error("Erro", e); } 
                finally { setIsNoteLoading(false); }
            };
            loadDbNote();
            setSavedNote(false);
        // 👇 MUDANÇA: 'user?.uid' impede recarregamentos fantasmas 👇
        }, [user?.uid, db, lessonUniqueId]);


// 👇 CÓDIGOS RECUPERADOS: FAVORITAR E LIKE 👇
        const handleToggleFavorite = async () => {
            const newState = !isFavorite;
            setIsFavorite(newState);
            try {
                const userRef = doc(db, "users", user.uid);
                await updateDoc(userRef, { favoriteLessons: newState ? arrayUnion(lessonUniqueId) : arrayRemove(lessonUniqueId) });
                if (showNotification) showNotification(newState ? "Aula salva nos favoritos!" : "Aula removida dos favoritos.", "success");
            } catch (e) { setIsFavorite(!newState); }
        };

        const handleLike = async (tipo) => {
            const newStatus = likeStatus === tipo ? null : tipo;
            setLikeStatus(newStatus);
            try {
                const userRef = doc(db, "users", user.uid);
                await updateDoc(userRef, { likedLessons: arrayRemove(lessonUniqueId), dislikedLessons: arrayRemove(lessonUniqueId) });
                if (newStatus === 'like') await updateDoc(userRef, { likedLessons: arrayUnion(lessonUniqueId) });
                else if (newStatus === 'dislike') await updateDoc(userRef, { dislikedLessons: arrayUnion(lessonUniqueId) });
            } catch (e) {}
        };
        // 👆 FIM DOS CÓDIGOS RECUPERADOS 👆



// 👇 INÍCIO DOS CÓDIGOS RECUPERADOS DE NAVEGAÇÃO E PROGRESSO 👇
        useEffect(() => {
            let isMounted = true;
            const loadProgress = async () => {
                const map = {};
                if(course.modulos) {
                    course.modulos.forEach((mod, mIdx) => {
                        if(mod.aulas) mod.aulas.forEach((_, lIdx) => {
                            if(localStorage.getItem(`completed_${user.uid}_${course.id}_${mIdx}_${lIdx}`) === 'true') {
                                map[`${mIdx}-${lIdx}`] = true;
                            }
                        });
                    });
                }
                if (isMounted) setCompletedMap(map);

                if (db && user) {
                    try {
                        const progRef = doc(db, "user_progress", `${user.uid}_${course.id}`);
                        const progSnap = await getDoc(progRef);
                        if (progSnap.exists() && isMounted) {
                            const data = progSnap.data();
                            const cloudMap = { ...map };
                            (data.completedLessons || []).forEach(key => { 
                                cloudMap[key] = true; 
                                const [mIdx, lIdx] = key.split('-');
                                localStorage.setItem(`completed_${user.uid}_${course.id}_${mIdx}_${lIdx}`, 'true');
                            });
                            setCompletedMap(cloudMap);
                        }
                    } catch (e) {}
                }
            };
            loadProgress();
            return () => { isMounted = false; };
        }, [course, user]);

        const toggleModule = (mIdx) => {
            setExpandedModules(prev => ({ ...prev, [mIdx]: !prev[mIdx] }));
        };

        const handleNextLesson = (forcedPercent = null) => {
            if (activeLessonIndex < currentModule.aulas.length - 1) {
                setActiveLessonIndex(activeLessonIndex + 1);
            } 
            else if (activeModuleIndex < modules.length - 1) {
                setActiveModuleIndex(activeModuleIndex + 1);
                setActiveLessonIndex(0);
                setExpandedModules(prev => ({ ...prev, [activeModuleIndex + 1]: true }));
            } 
            else {
                const currentCompletion = forcedPercent !== null ? forcedPercent : progressPercent;
                
                if(currentCompletion >= 100) {
                    setShowCelebration(true);
                } else {
                    if(showNotification) showNotification("Você concluiu todas as aulas disponíveis!", "success");
                }
            }
        };

        const handlePrevLesson = () => {
            if (activeLessonIndex > 0) {
                setActiveLessonIndex(activeLessonIndex - 1);
            } else if (activeModuleIndex > 0) {
                const prevMod = activeModuleIndex - 1;
                setActiveModuleIndex(prevMod);
                setActiveLessonIndex(modules[prevMod].aulas.length - 1);
                setExpandedModules(prev => ({ ...prev, [prevMod]: true }));
            }
        };

        const markLessonAsCompleted = async (autoPlayNext = false) => {
            const lessonKey = `${activeModuleIndex}-${activeLessonIndex}`;
            const isAlreadyCompleted = !!completedMap[lessonKey]; 
            
            const localKey = `completed_${user.uid}_${course.id}_${activeModuleIndex}_${activeLessonIndex}`;
            localStorage.setItem(localKey, 'true');
            setCompletedMap(prev => ({ ...prev, [lessonKey]: true }));

            let currentCompleted = 0;
            Object.keys(completedMap).forEach(key => {
                if (completedMap[key] === true) currentCompleted++;
            });
            
            const newCompleted = isAlreadyCompleted ? currentCompleted : currentCompleted + 1;
            const oldPercent = totalLessons === 0 ? 0 : (currentCompleted / totalLessons);
            const newPercent = totalLessons === 0 ? 0 : (newCompleted / totalLessons);

            const reward = Number(course.pointsReward) || 0;
            const pointsBefore = Math.floor(oldPercent * reward);
            const pointsAfter = Math.floor(newPercent * reward);
            const pointsToGive = pointsAfter - pointsBefore;

            if (db && user) {
                try {
                    const progRef = doc(db, "user_progress", `${user.uid}_${course.id}`);
                    await setDoc(progRef, {
                        userId: user.uid,
                        courseId: course.id,
                        completedLessons: arrayUnion(lessonKey),
                        percentage: Math.round(newPercent * 100),
                        lastAccessed: serverTimestamp(),
                        lastMod: activeModuleIndex,
                        lastLes: activeLessonIndex
                    }, { merge: true });

                    if (pointsToGive > 0 && !isAlreadyCompleted) {
                        const userRef = doc(db, "users", user.uid);
                        const userSnap = await getDoc(userRef);
                        
                        if (userSnap.exists()) {
                            const currentData = userSnap.data();
                            const currentEarned = Number(currentData.pointsEarned) || 0;
                            const currentBalance = Number(currentData.pointsBalance) || 0;
                            
                            await updateDoc(userRef, {
                                pointsEarned: currentEarned + pointsToGive,
                                pointsBalance: currentBalance + pointsToGive
                            });
                            
                            if (showNotification) showNotification(`🎉 Você ganhou +${pointsToGive} pontos!`, "success");
                        }
                    } else if (!isAlreadyCompleted && showNotification) {
                         showNotification("Aula marcada como concluída!", "success");
                    }
                } catch (e) {
                    console.error("Erro ao salvar progresso ou pontos:", e);
                }
            }

            if (autoPlayNext) {
                setTimeout(() => {
                    handleNextLesson(Math.round(newPercent * 100));
                }, 1500);
            }
        };
        // 👆 FIM DOS CÓDIGOS RECUPERADOS DE NAVEGAÇÃO E PROGRESSO 👆


// SALVA NOTAS, CAPA E ASSINATURA NA NUVEM
        const handleSaveNote = async () => {
            if (!user || !db) return;
            setSavedNote(true);
            const htmlContent = editorRef.current ? editorRef.current.innerHTML : note;
            try {
                const noteRef = doc(db, "student_notes", `${user.uid}_${lessonUniqueId}`);
                await setDoc(noteRef, {
                    userId: user.uid, lessonId: lessonUniqueId, courseId: course.id,
                    moduleTitle: currentModule.titulo || '', lessonTitle: currentLesson.titulo || '',
                    text: htmlContent, cover: noteCover, signature: noteSignature,
                    updatedAt: serverTimestamp()
                }, { merge: true });
                setNote(htmlContent);
                if (showNotification) showNotification("Diário salvo na nuvem com sucesso!", "success");
            } catch(e) {
                if (showNotification) showNotification("Erro ao salvar anotação.", "error");
            }
            setTimeout(() => setSavedNote(false), 2000);
        };



       // Função para Upload da Capa (Nuvem Cloudflare R2 + Auto Save)
        const handleCoverUpload = async (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 50 * 1024 * 1024) return showNotification("A imagem é gigante (maior que 50MB).", "error");
                
                // MÁGICA VISUAL: Mostra a imagem na tela INSTANTANEAMENTE
                const localUrl = URL.createObjectURL(file);
                setNoteCover(localUrl);

                if (showNotification) showNotification("Enviando capa para a nuvem...", "info");
                
                try {
                    const uploadResult = await uploadToCustomDrive(file, 'DiarioDeBordo/Capas/');
                    if (uploadResult && uploadResult.url) {
                        setNoteCover(uploadResult.url);
                        
                        // 👇 MUDANÇA: Auto-salvamento garantido no Banco de Dados 👇
                        const noteRef = doc(db, "student_notes", `${user.uid}_${lessonUniqueId}`);
                        const htmlContent = editorRef.current ? editorRef.current.innerHTML : note;
                        
                        await setDoc(noteRef, {
                            userId: user.uid, lessonId: lessonUniqueId, courseId: course.id,
                            moduleTitle: currentModule.titulo || '', lessonTitle: currentLesson.titulo || '',
                            text: htmlContent, cover: uploadResult.url, signature: noteSignature,
                            updatedAt: serverTimestamp()
                        }, { merge: true });

                        if (showNotification) showNotification("Capa maravilhosa salva com sucesso!", "success");
                    }
                } catch (error) {
                    if (showNotification) showNotification("Erro ao salvar a capa definitiva.", "error");
                }
            }
        };

        // CORRETOR IA COM EFEITO DE DIGITAÇÃO VISUAL SEGURO VIA REACT
        const handleAiCorrection = async () => {
            const rawText = editorRef.current ? editorRef.current.innerText : note.replace(/<[^>]*>?/gm, '');
            if (!rawText.trim()) return;
            
            setIsAiCorrecting(true);
            if (showNotification) showNotification("A IA está analisando seu texto...", "info");
            
            // Backup do texto caso a IA falhe ou a internet caia
            const backupHtml = note;

            try {
                const prompt = `Corrija a gramática, ortografia e pontuação do texto. Mantenha o sentido e as quebras de linha. Retorne APENAS o texto corrigido, sem introduções:\n\n${rawText}`;
                
                const response = await fetch("https://meu-backend-ia.vercel.app/api/chat", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: prompt })
                });
                
                const data = await response.json();
                let corrected = data.reply || "";
                corrected = corrected.replace(/```[a-zA-Z]*\n?/g, '').replace(/```/g, '').trim();
                
                if (!corrected) throw new Error("A IA retornou vazio.");

                const htmlText = corrected.replace(/\n/g, '<br>');
                let currentStr = '';
                
                // Desativa a edição temporariamente para não bugar o cursor do aluno
                if (editorRef.current) editorRef.current.contentEditable = "false";
                
                let isTag = false;
                let tagStr = '';

                // Efeito Máquina de Escrever super seguro
                for (let i = 0; i < htmlText.length; i++) {
                    const char = htmlText[i];
                    
                    if (char === '<') isTag = true;
                    
                    if (isTag) {
                        tagStr += char;
                        if (char === '>') {
                            isTag = false;
                            currentStr += tagStr;
                            tagStr = '';
                            setNote(currentStr + '<span style="border-right: 2px solid #6366f1; margin-left: 2px; animation: pulse 1s infinite;"></span>');
                        }
                    } else {
                        currentStr += char;
                        setNote(currentStr + '<span style="border-right: 2px solid #6366f1; margin-left: 2px; animation: pulse 1s infinite;"></span>');
                        await new Promise(r => setTimeout(r, 20)); // Velocidade da digitação
                    }
                    
                    // Rola a tela para baixo acompanhando o texto
                    if (editorRef.current) editorRef.current.scrollTop = editorRef.current.scrollHeight;
                }
                
                setNote(currentStr); // Salva o texto final sem o cursor
                if (showNotification) showNotification("Texto polido com sucesso!", "success");

            } catch (e) {
                console.error("Erro IA:", e);
                setNote(backupHtml); // Devolve o texto intacto pro aluno!
                if (showNotification) showNotification("Falha ao corrigir o texto.", "error");
            } finally { 
                if (editorRef.current) editorRef.current.contentEditable = "true";
                setIsAiCorrecting(false); 
            }
        };

        // VIRAR PÁGINA
        const turnPage = (direction) => {
            setIsFlipping(true);
            setTimeout(() => {
                setIsFlipping(false);
                if(direction === 'next') handleNextLesson();
                else handlePrevLesson();
            }, 600);
        };

        const getEmbedUrl = (url) => {
            if (!url) return null;
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const videoId = url.split('v=')[1]?.split('&')[0] || url.split('youtu.be/')[1];
                return `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&showinfo=0`;
            }
            if (url.includes('vimeo.com')) {
                const videoId = url.split('vimeo.com/')[1];
                return `https://player.vimeo.com/video/${videoId}?autoplay=1&title=0&byline=0&portrait=0`;
            }
            return null;
        };

       if(!currentLesson) return <div className="p-10 text-center text-white animate-pulse">Carregando aula...</div>;

        const isCurrentCompleted = completedMap[`${activeModuleIndex}-${activeLessonIndex}`];
        const embedUrl = getEmbedUrl(currentLesson.conteudo);

        return (
            <div className="fixed inset-0 z-[100] bg-[#050505] flex flex-col font-sans text-white overflow-hidden animate-fade-in">
                
                {/* --- MODAL DE CELEBRAÇÃO (PARABÉNS) --- */}
                {showCelebration && (
                    <div className="fixed inset-0 z-[999999] flex items-center justify-center bg-black/90 backdrop-blur-md animate-fade-in px-4">
                        <div className="bg-[#0a0a0a] border border-[#333] rounded-3xl p-8 max-w-md w-full text-center shadow-[0_0_80px_rgba(234,179,8,0.2)] transform transition-all animate-scale-in relative overflow-hidden">
                            
                            {/* Efeito de luz no fundo */}
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full bg-gradient-to-b from-yellow-500/20 to-transparent pointer-events-none"></div>
                            
                            <div className="relative z-10 flex flex-col items-center">
                                {/* Troféu com animação de pulso e bounce */}
                                <div className="w-24 h-24 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-full flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(234,179,8,0.6)] animate-bounce">
                                    <Award size={50} className="text-white" />
                                </div>
                                
                                <h2 className="text-3xl font-black text-white mb-2 tracking-tight">Parabéns!</h2>
                                <p className="text-gray-400 text-sm mb-8 leading-relaxed">
                                    Você concluiu 100% do curso <br/><strong className="text-white text-base">{course.title}</strong>.<br/>Sua dedicação o trouxe até aqui!
                                </p>
                                
                                <button 
                                    onClick={() => {
                                        setShowCelebration(false);
                                        onGoToCertificates();
                                    }}
                                    className="w-full py-4 bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-white font-black uppercase tracking-widest rounded-xl shadow-[0_10px_20px_rgba(234,179,8,0.3)] transition-transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2"
                                >
                                    <Award size={20} /> Resgatar Certificado
                                </button>
                                
                                <button 
                                    onClick={() => setShowCelebration(false)} 
                                    className="mt-4 p-2 text-xs text-gray-500 hover:text-white font-bold uppercase tracking-widest transition-colors"
                                >
                                    Fechar
                                </button>
                            </div>
                        </div>
                    </div>
                )}
                {/* --- FIM DO MODAL DE CELEBRAÇÃO --- */}

                {/* --- INÍCIO DO HEADER DO PLAYER CORRIGIDO --- */}
                <header className="h-[72px] bg-[#0a0a0a]/95 backdrop-blur-xl border-b border-[#222] flex items-center justify-between px-4 md:px-6 shrink-0 z-[110] relative shadow-md">
                    <div className="flex items-center gap-4 md:gap-6">
                        <button onClick={onBackToModules} className="bg-indigo-600 hover:bg-indigo-700 text-white border border-indigo-500/50 transition-all flex items-center gap-2 group px-4 py-2.5 rounded-xl shadow-[0_0_15px_rgba(79,70,229,0.3)]">
                            <ArrowLeft size={18} className="group-hover:-translate-x-1 transition-transform"/>
                            <span className="font-bold text-sm tracking-wide hidden sm:block">Voltar aos Módulos</span>
                            <span className="font-bold text-sm tracking-wide sm:hidden">Módulos</span>
                        </button>
                        
                        <div className="w-px h-6 bg-white/10 hidden md:block"></div>
                        <h1 className="font-black text-sm md:text-lg tracking-tight line-clamp-1 text-white/90">{course.title}</h1>
                    </div>
                </header>
                {/* --- FIM DO HEADER DO PLAYER CORRIGIDO --- */}

                <div className="flex-1 flex flex-col lg:flex-row overflow-y-auto lg:overflow-hidden relative p-0 sm:p-4 md:p-6 lg:p-8 gap-0 sm:gap-6 max-w-[1600px] mx-auto w-full">
                    
                    <div className={`flex flex-col h-auto lg:h-full overflow-visible lg:overflow-y-auto custom-scrollbar transition-all duration-500 bg-[#0f0f0f] border-b sm:border border-[#222] rounded-none sm:rounded-2xl shadow-2xl shrink-0 ${isCinemaMode ? 'w-full' : 'w-full lg:w-[70%] xl:w-[75%]'}`}>
                        
                        <div className="w-full bg-black aspect-video relative group border-b border-[#222] sm:rounded-t-2xl overflow-hidden shrink-0">
                            <button 
                                onClick={onBackToModules}
                                className="absolute top-3 left-3 sm:top-4 sm:left-4 z-[60] bg-black/40 hover:bg-black/80 backdrop-blur-md border border-white/20 text-white p-2 sm:px-4 sm:py-2 rounded-full sm:rounded-xl transition-all duration-300 flex items-center gap-2 shadow-[0_0_15px_rgba(0,0,0,0.5)] opacity-80 hover:opacity-100"
                                title="Voltar aos Módulos"
                            >
                                <ArrowLeft size={20} />
                                <span className="hidden sm:block font-bold text-sm">Voltar</span>
                            </button>
                            
                            {/* 👇 AQUI ESTÁ A LÓGICA DO VÍDEO vs PDF NA TELA PRINCIPAL 👇 */}
                            {currentLesson.tipo === 'video' ? (
                                embedUrl ? (
                                    <iframe src={embedUrl} className="w-full h-full" frameBorder="0" allow="autoplay; fullscreen" allowFullScreen></iframe>
                                ) : (
                                    <CustomVideoPlayer 
                                        src={currentLesson.conteudo} 
                                        title={currentLesson.titulo}
                                        poster={course.cover}
                                        onEnded={() => markLessonAsCompleted(true)}
                                        isCompleted={isCurrentCompleted}
                                        showNotification={showNotification}
                                    />
                                )
                            ) : (
                                <div className="w-full h-full relative bg-[#e5e7eb] flex items-center justify-center overflow-hidden">
                                    {(() => {
                                        const url = fixUrl(currentLesson.conteudo || '');
                                        const lowerUrl = url.toLowerCase();
                                        const isPdf = lowerUrl.includes('.pdf');
                                        const isImage = lowerUrl.match(/\.(jpeg|jpg|gif|png|webp)$/i);

                                        if (isPdf) {
                                            return <iframe src={`${url}#view=FitH`} className="w-full h-full border-none bg-white" title="Material"></iframe>;
                                        } else if (isImage) {
                                            return <img src={url} className="w-full h-full object-contain bg-black" alt="Material" />;
                                        } else {
                                            return (
                                                <div className="flex flex-col items-center justify-center text-center p-6 bg-gradient-to-br from-[#111] to-[#050505] w-full h-full">
                                                    <FileText size={56} className="text-indigo-500 mb-4 opacity-50" />
                                                    <h3 className="text-xl font-bold mb-2 text-white">Material Principal em Anexo</h3>
                                                    <p className="text-sm text-gray-400 max-w-sm mb-6">Este arquivo precisa ser baixado para visualização.</p>
                                                </div>
                                            );
                                        }
                                    })()}

                                    {/* BOTÃO DE DOWNLOAD FLUTUANTE */}
                                    <button 
                                        onClick={(e) => { e.preventDefault(); handleForceDownload(fixUrl(currentLesson.conteudo), currentLesson.titulo); }}
                                        disabled={downloadingUrl === fixUrl(currentLesson.conteudo)}
                                        className="absolute top-3 right-3 sm:top-4 sm:right-4 z-[60] bg-indigo-600 hover:bg-indigo-700 text-white px-4 sm:px-6 py-2 sm:py-2.5 rounded-lg sm:rounded-xl font-bold flex items-center gap-2 transition-all shadow-[0_0_15px_rgba(79,70,229,0.4)] text-xs sm:text-sm disabled:opacity-50 border border-indigo-400/30 backdrop-blur-md"
                                    >
                                        {downloadingUrl === fixUrl(currentLesson.conteudo) ? <div className="w-4 h-4 border-2 border-white/50 border-t-white rounded-full animate-spin"></div> : <Download size={16} />}
                                        <span className="hidden sm:inline">{downloadingUrl === fixUrl(currentLesson.conteudo) ? 'Baixando...' : 'Baixar Material'}</span>
                                    </button>
                                </div>
                            )}
                            {/* 👆 FIM DA LÓGICA DO PDF/IMAGEM NA TELA PRINCIPAL 👆 */}
                        </div>

                        <div className="max-w-5xl w-full mx-auto p-4 sm:p-6 lg:p-10 shrink-0 pb-10 sm:pb-32">
                            
                            <div className="flex flex-wrap items-center justify-between gap-4 mb-8 sm:mb-10 pb-6 border-b border-[#222]">
                                <div>
                                    <p className="text-indigo-500 text-xs font-bold uppercase tracking-widest mb-2">{currentModule.titulo}</p>
                                    <h2 className="text-2xl sm:text-3xl font-black text-white tracking-tight">{currentLesson.titulo}</h2>
                                    
                                    <div className="flex flex-wrap items-center gap-4 mt-4">
                                        <button
                                            onClick={handleToggleFavorite}
                                            className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold transition-all duration-300 border ${
                                                isFavorite 
                                                ? 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30' 
                                                : 'bg-white/5 text-white/60 hover:bg-white/10 hover:text-white border-transparent'
                                            }`}
                                        >
                                            <Star size={16} fill={isFavorite ? "currentColor" : "none"} />
                                            {isFavorite ? 'Favorita' : 'Favoritar'}
                                        </button>

                                        <div className="h-4 w-px bg-white/20 hidden sm:block"></div>

                                        <div className="flex items-center bg-white/5 rounded-full overflow-hidden border border-white/10">
                                            <button
                                                onClick={() => handleLike('like')}
                                                className={`flex items-center gap-2 px-3 py-1.5 text-xs font-bold transition-colors ${
                                                    likeStatus === 'like' 
                                                    ? 'text-indigo-400 bg-indigo-500/20' 
                                                    : 'text-white/60 hover:bg-white/10 hover:text-white'
                                                }`}
                                            >
                                                <ThumbsUp size={16} fill={likeStatus === 'like' ? "currentColor" : "none"} />
                                                Gostei
                                            </button>
                                            <div className="w-px h-4 bg-white/20"></div>
                                            <button
                                                onClick={() => handleLike('dislike')}
                                                className={`flex items-center gap-2 px-3 py-1.5 text-xs transition-colors ${
                                                    likeStatus === 'dislike' 
                                                    ? 'text-red-400 bg-red-500/20' 
                                                    : 'text-white/60 hover:bg-white/10 hover:text-white'
                                                }`}
                                                title="Não gostei"
                                            >
                                                <ThumbsUp size={16} className="rotate-180 mt-1" fill={likeStatus === 'dislike' ? "currentColor" : "none"} />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="flex flex-wrap sm:flex-nowrap items-center gap-3 w-full sm:w-auto mt-4 sm:mt-0">
                                    <button onClick={() => setIsCinemaMode(!isCinemaMode)} className="hidden lg:flex items-center gap-2 px-4 py-2.5 rounded-lg bg-white/5 hover:bg-white/10 text-white/70 hover:text-white transition-colors text-sm font-bold border border-white/10">
                                        {isCinemaMode ? <Minimize size={18} /> : <Maximize size={18} />}
                                        {isCinemaMode ? 'Modo Normal' : 'Modo Cinema'}
                                    </button>
                                    
                                    {currentLesson.tipo === 'video' ? (
                                        <div className={`flex-1 sm:flex-none flex justify-center items-center gap-2 px-6 py-2.5 rounded-lg font-bold text-sm shadow-lg select-none transition-colors ${isCurrentCompleted ? 'bg-green-500/10 text-green-400 border border-green-500/30' : 'bg-white/5 text-white/50 border border-white/10'}`}>
                                            {isCurrentCompleted ? <CheckCircle size={18} /> : <Play size={18} />}
                                            {isCurrentCompleted ? 'Aula Concluída' : 'Assista para Concluir'}
                                        </div>
                                    ) : (
                                        <button 
                                            onClick={() => markLessonAsCompleted(false)} 
                                            disabled={isCurrentCompleted} 
                                            className={`flex-1 sm:flex-none flex justify-center items-center gap-2 px-6 py-2.5 rounded-lg font-bold text-sm transition-all shadow-lg ${isCurrentCompleted ? 'bg-green-500/10 text-green-400 border border-green-500/30 cursor-default' : 'bg-indigo-600 hover:bg-indigo-700 text-white border border-transparent active:scale-95'}`}
                                        >
                                            <CheckCircle size={18} />
                                            {isCurrentCompleted ? 'Material Concluído' : 'Marcar como Lido'}
                                        </button>
                                    )}
                                </div>
                            </div>

                            <div className="flex gap-4 sm:gap-6 border-b border-[#222] mb-6 sm:mb-8 overflow-x-auto whitespace-nowrap hide-scrollbar pb-1">
                                <button onClick={() => setActiveTab('visao_geral')} className={`pb-3 sm:pb-4 text-sm font-bold uppercase tracking-widest transition-colors border-b-2 ${activeTab === 'visao_geral' ? 'border-indigo-500 text-white' : 'border-transparent text-white/40 hover:text-white/80'}`}>Visão Geral</button>
                                <button onClick={() => setActiveTab('materiais')} className={`pb-3 sm:pb-4 text-sm font-bold uppercase tracking-widest transition-colors border-b-2 ${activeTab === 'materiais' ? 'border-indigo-500 text-white' : 'border-transparent text-white/40 hover:text-white/80'}`}>Materiais ({(currentLesson.materiais || []).length})</button>
                                <button onClick={() => setActiveTab('anotacoes')} className={`pb-3 sm:pb-4 text-sm font-bold uppercase tracking-widest transition-colors border-b-2 ${activeTab === 'anotacoes' ? 'border-indigo-500 text-white' : 'border-transparent text-white/40 hover:text-white/80'}`}>Minhas Anotações</button>
                                
                            </div>

                            {activeTab === 'visao_geral' && (
                                <div className="animate-fade-in space-y-6 sm:space-y-8">
                                    <div>
                                        <h3 className="text-lg font-bold mb-3 sm:mb-4 text-white">Sobre esta aula</h3>
                                        <p className="text-white/60 leading-relaxed font-light text-sm sm:text-base whitespace-pre-wrap">
                                            {currentLesson.descricao || "Nenhuma descrição fornecida para esta aula. Assista ao vídeo para absorver todo o conteúdo preparado para o seu desenvolvimento."}
                                        </p>
                                    </div>
                                    <div className="flex flex-col sm:flex-row gap-4 pt-6 border-t border-[#222]">

                                    </div>

<div className="book-page left flex flex-col justify-center items-center text-center p-0 relative overflow-hidden group">

    <ImageIcon size={24} className="mb-2" />
                                                            <span className="text-[10px] font-bold uppercase text-center tracking-widest">Adicionar Capa (Opcional)</span>

                                                    <button onClick={() => turnPage('next')} className="p-3 bg-white shadow-md border border-slate-200 rounded-full text-slate-600"><ArrowRight size={16}/></button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                        </div>

                                </button>
                            </div>

                            <div className="flex-1 w-full h-full relative flex items-center justify-center p-0 md:p-6 bg-[#050505] overflow-hidden">
                                {(() => {
                                    const url = fixUrl(previewMaterial.url || '').toLowerCase();
                                    const type = previewMaterial.tipo || 'arquivo';

                                    if (type === 'image' || url.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
                                        return <img src={url} className="max-w-full max-h-full object-contain rounded-none md:rounded-xl" alt="Preview" />;
                                    } else if (type === 'video' || url.match(/\.(mp4|webm|ogg|mov)$/i)) {
                                        return <video src={url} controls autoPlay className="max-w-full max-h-full object-contain rounded-none md:rounded-xl bg-black" />;
                                    } else {
                                        // O segredo do PDF: tag iframe forçada a ajustar na tela (FitH)
                                        return <iframe src={`${url}#view=FitH`} className="w-full h-full rounded-none md:rounded-xl bg-white border-none"></iframe>;
                                    }
                                })()}
                            </div>
                        </div>
                    </div>
                )}
                {/* 👆 FIM DO MODAL DE PRÉ-VISUALIZAÇÃO 👆 */}

            </div>
        );
    };
    // =================================================================================
    // FIM DO COMPONENTE COURSE PLAYER
    // ================================================================================

    
    
    
    // =================================================================================
    // 3. SEÇÃO DE CERTIFICADOS (CORRIGIDA PARA CONTABILIZAR TODOS OS CURSOS)
    // =================================================================================
    
   // --- COMPONENTE DE CARTÃO (VISUAL LIMPO QUE ABRE O MODAL) ---
    const CertificateCard = ({ user, course, template, customPdf, onExpand }) => {
        const [previewUrl, setPreviewUrl] = useState(null);
        const [userData, setUserData] = useState(user);

        useEffect(() => {
            const fetchExtras = async () => {
                try {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) setUserData(prev => ({ ...prev, ...docSnap.data() }));
                } catch(e) {}
            };
            fetchExtras();
        }, [user]);

        useEffect(() => {
            if (!template?.bgUrl) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = template.bgUrl;

            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                const w = canvas.width;
                const h = canvas.height;
                const centerX = w / 2;

                ctx.drawImage(img, 0, 0);
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                const Y_HEADER = 0.35; 
                const Y_NOME   = 0.45; 
                const Y_CORPO  = 0.55; 
                const Y_CURSO  = 0.62; 
                const Y_DATA   = 0.78; 

                ctx.font = `italic ${Math.floor(w * 0.018)}px 'Merriweather', serif`;
                ctx.fillStyle = "#475569"; 
                ctx.fillText("Certificamos para os devidos fins que", centerX, h * Y_HEADER);

                const nomeAluno = userData.displayName || userData.name || "Nome do Aluno";
                ctx.font = `bold ${Math.floor(w * 0.05)}px 'Merriweather', serif`; 
                ctx.fillStyle = "#0f172a"; 
                ctx.shadowColor = "rgba(0,0,0,0.1)"; 
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                ctx.fillText(nomeAluno, centerX, h * Y_NOME, w * 0.85);
                ctx.shadowColor = "transparent";

                let docText = "";
                if (userData.cpf) docText += `CPF: ${userData.cpf}`;
                if (userData.cpf && userData.rg) docText += "  •  "; 
                if (userData.rg) docText += `RG: ${userData.rg}`;
                
                if (docText) {
                    ctx.font = `${Math.floor(w * 0.014)}px 'Inter', sans-serif`;
                    ctx.fillStyle = "#64748b"; 
                    ctx.fillText(docText, centerX, h * (Y_NOME + 0.06));
                }

                ctx.font = `normal ${Math.floor(w * 0.018)}px 'Inter', sans-serif`;
                ctx.fillStyle = "#334155";
                ctx.fillText("Concluiu com êxito a carga horária do curso profissionalizante de:", centerX, h * Y_CORPO);

                ctx.font = `bold ${Math.floor(w * 0.035)}px 'Merriweather', serif`;
                ctx.fillStyle = "#1e293b"; 
                ctx.fillText(course.title, centerX, h * Y_CURSO, w * 0.8);

                ctx.beginPath();
                ctx.moveTo(centerX - (w * 0.15), h * 0.74);
                ctx.lineTo(centerX + (w * 0.15), h * 0.74);
                ctx.strokeStyle = "#cbd5e1";
                ctx.lineWidth = 2;
                ctx.stroke();

                const dateStr = new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
                ctx.font = `${Math.floor(w * 0.016)}px 'Inter', sans-serif`;
                ctx.fillStyle = "#475569";
                ctx.fillText(`São Paulo, ${dateStr}`, centerX, h * Y_DATA);

                setPreviewUrl(canvas.toDataURL('image/jpeg', 0.5));
            };
        }, [userData, course, template]);

        return (
            <div 
            className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-4 shadow-sm hover:shadow-md transition-all flex flex-col gap-4 group cursor-pointer"
            onClick={() => (template || customPdf) ? onExpand(course, template, customPdf) : null}
        >
                <div 
                    className="relative bg-slate-100 dark:bg-slate-700 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-600 flex items-center justify-center" 
                    style={{ maxHeight: '200px', minHeight: '160px' }}
                >
                    {customPdf ? (
                        <>
                            <div className="absolute inset-0 w-full h-full bg-white dark:bg-slate-800 overflow-hidden flex items-center justify-center pointer-events-none">
                                {customPdf.toLowerCase().includes('.pdf') ? (
                                    <iframe 
                                        src={`${customPdf}#page=1&view=FitH&toolbar=0&navpanes=0&scrollbar=0`} 
                                        className="w-[105%] h-[105%] pointer-events-none border-none select-none" 
                                        scrolling="no"
                                        title="Capa do Certificado PDF"
                                    />
                                ) : (
                                    <img src={customPdf} className="w-full h-full object-cover" alt="Capa do Certificado" />
                                )}
                            </div>

                            <div className="absolute inset-0 z-10 bg-transparent"></div>

                            <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center z-20 gap-3 backdrop-blur-[2px]">
                                <Award size={36} className="text-white drop-shadow-md" />
                                <div className="bg-indigo-600 text-white px-5 py-2.5 rounded-full font-bold shadow-xl transform scale-90 group-hover:scale-100 transition-transform flex items-center gap-2 text-sm">
                                    <Maximize size={18}/> Visualizar Certificado
                                </div>
                            </div>
                        </>
                    ) : template && previewUrl ? (
                        <>
                            <img src={previewUrl} className="w-full h-full object-contain animate-fade-in" alt="Certificado Preview" />
                            <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <div className="bg-white text-slate-800 px-4 py-2 rounded-full font-bold shadow-lg transform scale-90 group-hover:scale-100 transition-transform flex items-center gap-2">
                                    <Maximize size={16}/> Ampliar
                                </div>
                            </div>
                        </>
                    ) : template && !previewUrl ? (
                        <div className="w-full h-full flex flex-col items-center justify-center text-slate-400 animate-pulse py-8">
                            <Award size={48} className="opacity-50 mb-2"/>
                            <span className="text-xs">Gerando Arte...</span>
                        </div>
                    ) : (
                        <div className="w-full h-full flex flex-col items-center justify-center text-slate-500 py-8 px-4 text-center bg-slate-800/50">
                            <Clock size={40} className="opacity-40 mb-3 text-yellow-500"/>
                            <span className="text-xs font-bold text-slate-300">Certificado em elaboração</span>
                            <span className="text-[10px] text-slate-500 mt-1">O instrutor logo disponibilizará a arte oficial.</span>
                        </div>
                    )}
                </div>
                
                <div>
                    <h4 className="font-bold text-slate-800 dark:text-white mb-1 line-clamp-1">{course.title}</h4>
                    <p className="text-xs text-slate-500">{customPdf ? 'PDF Oficial Disponível' : (template ? 'Documento Oficial Liberado' : 'Aguardando Arte do Instrutor')}</p>
                </div>
                
                <button 
                    disabled={!template && !customPdf}
                    className="w-full py-2.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-white rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-colors disabled:opacity-50 disabled:cursor-not-allowed pointer-events-none"
                >
                    {(template || customPdf) ? <><Eye size={16} /> Abrir Certificado</> : <><Lock size={16} /> Indisponível</>}
                </button>
            </div>
        );
    };
    
   // =================================================================================
    // --- SEÇÃO DE CERTIFICADOS (ULTRA COMPACTO NO MOBILE, IGUAL FAVORITOS) ---
    // =================================================================================
    const CertificatesSection = ({ user, courses, userProgress, certificates, customCerts, onGenerate }) => {
        const [expandedCert, setExpandedCert] = useState(null);

            }

            if (!template || !template.bgUrl) return;

            const img = new Image();

                canvas.width = img.width;
                canvas.height = img.height;

                const h = canvas.height;
                const centerX = w / 2;
