        #aem-ia-root ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .aem-widget-enter { animation: aemSlideUp 0.3s ease-out forwards; transform-origin: bottom right; }
        .aem-widget-exit { animation: aemSlideDown 0.3s ease-in forwards; transform-origin: bottom right; }
        @keyframes aemSlideUp { 0% { opacity: 0; transform: scale(0.9) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes aemSlideDown { 0% { opacity: 1; transform: scale(1) translateY(0); } 100% { opacity: 0; transform: scale(0.9) translateY(20px); visibility: hidden; } }
        .aem-typing-dot { animation: aemTyping 1.4s infinite ease-in-out both; }
        .aem-typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .aem-typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes aemTyping { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    `;
    document.head.appendChild(style);

    // Injetar HTML Dinâmico
    const root = document.createElement('div');
    root.id = 'aem-ia-root';
    root.innerHTML = `
        <button id="aem-chat-fab" style="display: none; touch-action: none;" class="pointer-events-auto fixed bottom-6 right-4 sm:bottom-8 sm:right-8 w-14 h-14 sm:w-16 sm:h-16 bg-[#3b82f6] hover:bg-[#2563eb] text-white rounded-full shadow-[0_10px_25px_rgba(59,130,246,0.6)] flex items-center justify-center text-2xl p-0 border-2 border-transparent cursor-move">
            <div id="aem-fab-avatar" class="w-full h-full flex items-center justify-center rounded-full overflow-hidden pointer-events-none">
                <i class="fa-solid fa-robot"></i>
            </div>
            <span class="absolute top-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full z-10 pointer-events-none"></span>
        </button>

        <div id="aem-chat-widget" class="pointer-events-auto fixed bottom-24 right-4 sm:bottom-28 sm:right-8 w-[calc(100vw-2rem)] sm:w-[350px] h-[70vh] sm:h-[550px] max-h-[600px] bg-[#0f172a] rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-gray-700 flex flex-col hidden opacity-0">
            <div class="bg-gray-900 rounded-t-2xl border-b border-gray-700 p-4 flex justify-between items-center shrink-0 relative overflow-hidden">
                <div class="flex items-center gap-3 relative z-10 min-w-0">
                    <div id="aem-header-avatar" class="w-10 h-10 shrink-0 rounded-full bg-blue-500/20 flex items-center justify-center border border-blue-500/50 overflow-hidden"><i class="fa-solid fa-robot text-[#3b82f6]"></i></div>
                    <div class="min-w-0 pr-2">
                        <h3 class="text-base font-bold text-white truncate" id="aem-header-name">A&M.IA</h3>
                        <div class="flex items-center gap-2"><span class="w-2 h-2 shrink-0 rounded-full bg-green-500 animate-pulse"></span><span class="text-[10px] text-gray-400 truncate">Ativa no site</span></div>
                    </div>
                </div>
                <div class="flex items-center gap-2 relative z-10 shrink-0">
                    <button id="aem-ia-restart-btn" class="w-8 h-8 shrink-0 rounded-full bg-gray-800 text-gray-400 hover:text-blue-400 flex items-center justify-center transition-colors" title="Nova Conversa">
                        <i class="fa-solid fa-arrows-rotate"></i>
                    </button>
                    <button onclick="window.AemIaWidget.closeWidget()" class="w-8 h-8 shrink-0 rounded-full bg-gray-800 text-gray-400 hover:text-red-400 flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>
            
            <div id="aem-chat-boxes-wrapper" class="flex-1 overflow-y-auto p-4 scroll-smooth">
                <div id="aem-chat-box-normal" class="space-y-4 flex flex-col justify-end min-h-full pb-2 text-white text-sm">
                    <div class="flex gap-2.5 w-full">
                        <div class="w-8 h-8 shrink-0 rounded-full bg-blue-500/20 border border-blue-500/30 flex items-center justify-center shadow-md overflow-hidden" id="aem-msg-avatar"><i class="fa-solid fa-robot text-[#3b82f6] text-xs"></i></div>
                        <div class="bg-gray-800 p-3.5 rounded-2xl rounded-tl-none max-w-[85%] border border-gray-700 shadow-md" id="aem-welcome-msg">Olá! O que vamos explorar hoje na plataforma?</div>
                    </div>
                </div>
                <div id="aem-typing-indicator" class="hidden flex gap-2 w-full mt-2">
                    <div class="w-6 h-6 shrink-0 rounded-full bg-blue-500/20 flex items-center justify-center text-[#3b82f6] text-[10px] overflow-hidden" id="aem-typing-avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="bg-gray-800 p-2 rounded-xl rounded-tl-none border border-gray-700 flex items-center gap-1 w-12 h-8">
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full aem-typing-dot"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full aem-typing-dot"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full aem-typing-dot"></div>
                    </div>
                </div>
            </div>

            <div class="p-3 bg-gray-900 border-t border-gray-700 shrink-0 rounded-b-2xl">
                <form id="aem-ia-form" class="flex items-center gap-2">
                    <button type="button" id="aem-mic-btn" onclick="window.AemIaWidget.toggleVoice()" class="w-10 h-10 shrink-0 rounded-full bg-gray-800 border border-gray-600 hover:bg-gray-700 text-gray-300 flex items-center justify-center transition-all shadow-md"><i class="fa-solid fa-microphone text-sm"></i></button>
                    <input type="text" id="aem-ia-input" placeholder="Escreva ou fale..." class="flex-1 bg-gray-800 text-white text-sm rounded-full px-4 py-2.5 border border-gray-600 focus:outline-none focus:border-[#3b82f6] transition-all" required autocomplete="off">
                    <button type="submit" id="aem-ia-btn" class="w-10 h-10 shrink-0 rounded-full bg-[#3b82f6] hover:bg-[#2563eb] text-white flex items-center justify-center transition-transform hover:scale-105"><i class="fa-solid fa-paper-plane text-sm"></i></button>
                </form>
                <div class="text-center mt-1"><span id="aem-mic-status" class="text-[9px] text-red-400 font-bold hidden animate-pulse">Ouvindo...</span></div>
            </div>
        </div>
    `;
    document.body.appendChild(root);

    // 👇 INÍCIO DA LÓGICA DE MOVIMENTAÇÃO DO BOTÃO (DRAG AND DROP) 👇
    const fab = document.getElementById('aem-chat-fab');
    let isDragging = false;
    let dragged = false;
    let startX, startY, initialLeft, initialTop;

    // Configura as transições base para cor e sombra, SEM afetar top/left/right/bottom
    fab.style.transition = 'background-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease';

    const onDragStart = (e) => {
        if (e.type === 'touchstart') {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        } else {
            startX = e.clientX;
            startY = e.clientY;
            e.preventDefault(); // Evita seleção de texto no PC
        }

        const rect = fab.getBoundingClientRect();
        
        // Remove right/bottom nativos do Tailwind e converte pra coordenadas absolutas left/top
        fab.style.right = 'auto';
        fab.style.bottom = 'auto';
        fab.style.left = rect.left + 'px';
        fab.style.top = rect.top + 'px';
        
        initialLeft = rect.left;
        initialTop = rect.top;
        
        isDragging = true;
        dragged = false; // Reset da trava de clique
        
        fab.style.transition = 'none'; // Desliga a transição para seguir o dedo suavemente

        document.addEventListener('mousemove', onDragMove, { passive: false });
        document.addEventListener('touchmove', onDragMove, { passive: false });
        document.addEventListener('mouseup', onDragEnd);
        document.addEventListener('touchend', onDragEnd);
    };

    const onDragMove = (e) => {
        if (!isDragging) return;

        let clientX, clientY;
        if (e.type === 'touchmove') {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        const dx = clientX - startX;
        const dy = clientY - startY;

        // Se moveu mais que 5 pixels, consideramos como "arrastar" e não "clique"
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            dragged = true;
        }

        if (dragged) {
            e.preventDefault(); // Impede a tela de rolar no celular enquanto arrasta
            
            let newLeft = initialLeft + dx;
            let newTop = initialTop + dy;

            // Limites da tela para o botão não sumir pra fora
            const maxLeft = window.innerWidth - fab.offsetWidth;
            const maxTop = window.innerHeight - fab.offsetHeight;

            newLeft = Math.max(0, Math.min(newLeft, maxLeft));
            newTop = Math.max(0, Math.min(newTop, maxTop));

            fab.style.left = newLeft + 'px';
            fab.style.top = newTop + 'px';
        }
    };

    const onDragEnd = () => {
        if (!isDragging) return;
        isDragging = false;
        
        // Volta a transição de cores e sombra
        fab.style.transition = 'background-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease';

        document.removeEventListener('mousemove', onDragMove);
        document.removeEventListener('touchmove', onDragMove);
        document.removeEventListener('mouseup', onDragEnd);
        document.removeEventListener('touchend', onDragEnd);
    };

    // Anexa os eventos de Mouse e Touch
    fab.addEventListener('mousedown', onDragStart);
    fab.addEventListener('touchstart', onDragStart, { passive: false });

    // Lógica para separar CLIQUE de ARRASTAR
    fab.addEventListener('click', (e) => {
        if (dragged) {
            // Se ele arrastou o botão, anula o clique
            e.preventDefault();
            e.stopPropagation();
        } else {
            // Se foi só um clique rápido, abre a IA
            window.AemIaWidget.toggleWidget();
        }
    });
    // 👆 FIM DA LÓGICA DO BOTÃO ARRASTÁVEL 👆

    // Lógica de UI do Widget
    let isWidgetOpen = false;
    
    window.AemIaWidget.openWidget = () => {
        isWidgetOpen = true;
        document.getElementById('aem-chat-widget').classList.remove('hidden', 'aem-widget-exit');
        document.getElementById('aem-chat-widget').classList.add('aem-widget-enter');
        document.getElementById('aem-chat-fab').style.transform = 'scale(0)';
        setTimeout(() => document.getElementById('aem-ia-input').focus(), 300);
    };

    window.AemIaWidget.closeWidget = () => {
        isWidgetOpen = false;
        document.getElementById('aem-chat-widget').classList.remove('aem-widget-enter');
        document.getElementById('aem-chat-widget').classList.add('aem-widget-exit');
        document.getElementById('aem-chat-fab').style.transform = 'scale(1)';
        setTimeout(() => document.getElementById('aem-chat-widget').classList.add('hidden'), 300);
    };

    window.AemIaWidget.toggleWidget = () => {
        if (isWidgetOpen) window.AemIaWidget.closeWidget();
        else window.AemIaWidget.openWidget();
    };

    // 👇 INÍCIO DO CÓDIGO DE VOZ OTIMIZADO 👇
    let recognition = null, isListening = false, autoSendTimer = null;
    const micBtn = document.getElementById('aem-mic-btn'), micStatus = document.getElementById('aem-mic-status');

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true; 
        recognition.interimResults = true; // Permite ver o texto enquanto fala
        recognition.lang = 'pt-BR';

        recognition.onstart = function() {
            isListening = true; 
            micBtn.classList.replace('bg-gray-800', 'bg-red-500'); 
            micBtn.classList.replace('text-gray-300', 'text-white');
            micStatus.classList.remove('hidden'); 
            clearTimeout(autoSendTimer);
        };
        
        recognition.onresult = function(event) {
            clearTimeout(autoSendTimer); 
            let transcriptText = '';
            let isFinal = false;

            // Pega o resultado com máxima precisão
            for (let i = 0; i < event.results.length; ++i) {
                transcriptText += event.results[i][0].transcript;
                if (event.results[i].isFinal) isFinal = true;
            }
            
            document.getElementById('aem-ia-input').value = transcriptText;

           // Só envia automaticamente se a IA tiver certeza que o usuário parou de falar (isFinal)
            if (isFinal) {
                autoSendTimer = setTimeout(() => {
                    if (document.getElementById('aem-ia-input').value.trim() !== '') {
                        if (isListening) recognition.stop();
                        document.getElementById('aem-ia-btn').click(); 
                    }
                }, 300); // ⚡ Acelerado para 300ms de respiro
            }
        };
        recognition.onend = stopListening;
    } else { 
        micBtn.style.display = 'none'; 
    }

    function stopListening() {
        isListening = false; 
        clearTimeout(autoSendTimer);
        micBtn.classList.replace('bg-red-500', 'bg-gray-800'); 
        micBtn.classList.replace('text-white', 'text-gray-300');
        micStatus.classList.add('hidden');
    }

    window.AemIaWidget.toggleVoice = () => {
        if (!recognition) return alert("Microfone não suportado no seu navegador.");
        if (isListening) recognition.stop();
        else { document.getElementById('aem-ia-input').value = ''; recognition.start(); }
    };
    // 👆 FIM DO CÓDIGO DE VOZ OTIMIZADO 👆

    // Integração com Backend e Leitura do Site
    function getSiteMap() {
        const elements = document.querySelectorAll('button, a');
        let map = [];
        elements.forEach((el, index) => {
            if(el.closest('#aem-ia-root')) return; // Ignora o próprio widget
            let id = el.id || `ia-target-${index}`; el.id = id;
            let text = el.innerText || el.getAttribute('aria-label') || '';
            text = text.trim().substring(0, 50).replace(/\n/g, ' ');
            if(text) map.push(`{ id: "${id}", tag: "${el.tagName.toLowerCase()}", texto: "${text}" }`);
        });
        return map.join('\n');
    }

    function appendMessage(text, isUser) {
        const box = document.getElementById('aem-chat-box-normal');
        const div = document.createElement('div');
        div.className = `flex gap-2.5 w-full ${isUser ? 'flex-row-reverse' : ''}`;
        
        // Mágica: Puxa a foto salva da IA. Se der erro na imagem, volta o robô padrão.
        const aiAvatarHtml = window.AemIaAvatarUrl && window.AemIaAvatarUrl.length > 5
            ? `<div class="w-8 h-8 rounded-full overflow-hidden shrink-0 border border-blue-500/30 shadow-md bg-blue-500/10 flex items-center justify-center"><img src="${window.AemIaAvatarUrl}" class="w-full h-full object-cover" onerror="this.onerror=null; this.outerHTML='<i class=\\'fa-solid fa-robot text-[#3b82f6] text-xs\\'></i>';" /></div>` 
            : `<div class="w-8 h-8 rounded-full bg-blue-500/20 text-[#3b82f6] flex items-center justify-center shrink-0 border border-blue-500/30 shadow-md"><i class="fa-solid fa-robot text-xs"></i></div>`;
            
        const avatar = isUser ? `<div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-white shrink-0 shadow-md"><i class="fa-solid fa-user text-xs"></i></div>` : aiAvatarHtml;
        
        const contentCls = isUser ? `bg-[#3b82f6] text-white p-3.5 rounded-2xl rounded-tr-none max-w-[85%] shadow-md` : `bg-gray-800 text-white p-3.5 rounded-2xl rounded-tl-none max-w-[85%] border border-gray-700 shadow-md`;
        
        div.innerHTML = `${avatar}<div class="${contentCls}">${text.replace(/\n/g, '<br>')}</div>`;
        box.appendChild(div);
        
        // Rola o chat para o fundo suavemente
        const wrapper = document.getElementById('aem-chat-boxes-wrapper');
        if (wrapper) wrapper.scrollTop = wrapper.scrollHeight;
    }

   // 👇 INÍCIO DO SUPER MOTOR DE IA DE COMANDOS TOTAIS 👇
    document.getElementById('aem-ia-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('aem-ia-input');
        const userMsg = input.value.trim();
        if (!userMsg) return;
        
        input.value = '';
        appendMessage(userMsg, true);
        
        const typing = document.getElementById('aem-typing-indicator');
        if (typing) {
            document.getElementById('aem-chat-boxes-wrapper').appendChild(typing);
            typing.classList.remove('hidden');
        }
        
        const backendUrl = "https://meu-backend-ia.vercel.app"; 
        
        try {
            const nomeDaIA = window.AemIaName || "Assistente Virtual";
            const nomeDaPlataforma = window.AemPlatformName || "Plataforma de Estudos";
            const conhecimentoExtra = window.AemIaSystemPrompt || ""; 

            // CÉREBRO CONVERSACIONAL COM IDENTIDADE A&M Produções E HISTÓRICO
            const systemPrompt = `Você é a ${nomeDaIA}, assistente inteligente e amigável da ${nomeDaPlataforma}.
Fui desenvolvida pela A&M Produções.

${conhecimentoExtra}

[DIRETRIZES DE COMPORTAMENTO]:
1. CONVERSE NORMALMENTE: Aja como um humano prestativo. Leia o [HISTÓRICO DA CONVERSA] abaixo para não repetir as coisas e manter o fluxo natural do bate-papo.
2. PROIBIDO CÓDIGO: Não gere, explique ou corrija códigos de programação (HTML, CSS, JS). Se pedirem, mude de assunto educadamente.
3. IDENTIDADE: Se perguntarem quem te criou, responda apenas: "Fui desenvolvida pela A&M Produções para auxiliar nos seus estudos."

[COMANDOS EXTRAS]:
Se o aluno der uma ORDEM DIRETA (ex: "Abra o curso", "Vá para a loja", "Poste na comunidade"), responda conversando E inclua UM bloco JSON no final.
Se for apenas bate-papo ou dúvida, APENAS converse, NÃO mande JSON.
JSON Permitidos:
1. NAVEGAR: {"action": "navigate", "target": "catalog|my_courses|loja|favorites|certificates|community|support|profile|informacoes"}
2. ABRIR CURSO: {"action": "open_course", "courseName": "NOME DO CURSO"}
3. COMPRAR/LOJA: {"action": "buy_course", "courseName": "NOME"} ou {"action": "buy_product", "productName": "NOME"}
4. CONTROLAR VÍDEO: {"action": "video_control", "command": "play|pause|skip_forward|skip_backward"}
5. ATUALIZAR PERFIL DO ALUNO: {"action": "edit_profile", "field": "name|bio|phone|address|city", "value": "NOVO VALOR"}
6. POSTAR NA COMUNIDADE: {"action": "post_community", "text": "TEXTO DA POSTAGEM"}
7. FAZER ANOTAÇÃO/RESUMO: {"action": "take_notes", "courseName": "NOME DO CURSO", "notes": "RESUMO GERADO AQUI EM HTML"}`;            
            
            // 🧠 LÓGICA DE MEMÓRIA DA IA (HISTÓRICO)
            let chatHistory = JSON.parse(localStorage.getItem('aem_ia_chat_history')) || [];
            chatHistory.push(`Aluno: ${userMsg}`);
            // Lembra das últimas 8 mensagens para não pesar o sistema
            if (chatHistory.length > 8) chatHistory = chatHistory.slice(chatHistory.length - 8); 
            
            const payload = `${systemPrompt}\n\n[HISTÓRICO DA CONVERSA]:\n${chatHistory.join('\n')}\n\n[NOVA MENSAGEM DO ALUNO]:\n${userMsg}\nResponda de forma natural e contínua:`;
            
            const response = await fetch(`${backendUrl}/api/chat`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: payload })
            });
            
            const data = await response.json();
            typing.classList.add('hidden');
            
            let aiReply = data.reply || "Ação processada.";
            
            // 👇 GATILHO DE EXECUÇÃO TOTAL 👇
            let cmdObj = null;
            let stringToHide = "";
            let blockMatch = aiReply.match(/```[a-z]*\s*(\{[\s\S]*?\})\s*```/i) || aiReply.match(/\{[\s\S]*"action"[\s\S]*\}/i);
            
            if (blockMatch) {
                stringToHide = blockMatch[0];
                try { cmdObj = JSON.parse(blockMatch[1] || blockMatch[0]); } catch(e) {}
            }

            if (cmdObj && cmdObj.action) {
                aiReply = aiReply.replace(stringToHide, '').trim();
                let commandExecuted = false;
                let shouldCloseWidget = false;

                if (window.AemGlobalAPI) {
                    switch(cmdObj.action) {
                        case 'navigate':
                            window.AemGlobalAPI.navigate(cmdObj.target);
                            commandExecuted = true;
                            if (cmdObj.target === 'catalog' || cmdObj.target === 'home') {
                                shouldCloseWidget = true;
                            }
                            break;
                        case 'open_course':
                            const result = window.AemGlobalAPI.openCourseByName(cmdObj.courseName);
                            if (result.status === 'not_found') aiReply += "<br><br><small style='color:#f87171'>Não encontrei nenhum portal com esse nome exato.</small>";
                            else if (result.status === 'multiple') aiReply += `<br><br><small style='color:#fbbf24'>Encontrei várias opções. Qual destes você quer?<br>• ${result.data.join('<br>• ')}</small>`;
                            else { aiReply += `<br><br><small style='color:#4ade80'>Abrindo o portal ${result.data}...</small>`; commandExecuted = true; } 
                            break;
                        case 'buy_course':
                            const boughtC = window.AemGlobalAPI.buyCourseByName(cmdObj.courseName);
                            if (!boughtC) aiReply += "<br><br><small style='color:#f87171'>Não encontrei este curso.</small>";
                            else if (boughtC === 'owned') { aiReply += "<br><br><small style='color:#4ade80'>Você já tem acesso! Abrindo...</small>"; commandExecuted = true; }
                            else { commandExecuted = true; }
                            break;
                        case 'buy_product':
                            window.AemGlobalAPI.navigate('loja');
                            setTimeout(() => {
                                if (window.AemGlobalAPI_Marketplace) window.AemGlobalAPI_Marketplace.buyProductByName(cmdObj.productName);
                            }, 1000);
                            commandExecuted = true;
                            break;
                        case 'video_control':
                            if (window.AemVideoControl) {
                                if (cmdObj.command === 'play') window.AemVideoControl.play();
                                else if (cmdObj.command === 'pause') window.AemVideoControl.pause();
                                else if (cmdObj.command === 'skip_forward') window.AemVideoControl.skip(10);
                                else if (cmdObj.command === 'skip_backward') window.AemVideoControl.skip(-10);
                                commandExecuted = true;
                            } else aiReply += "<br><br><small style='color:#f87171'>Nenhum vídeo em reprodução.</small>";
                            break;
                        case 'edit_profile':
                            const profRes = await window.AemGlobalAPI.updateProfileData(cmdObj.field, cmdObj.value);
                            if(profRes) aiReply += `<br><br><small style='color:#4ade80'>Perfil atualizado! Trocamos ${cmdObj.field} para "${cmdObj.value}".</small>`;
                            else aiReply += "<br><br><small style='color:#f87171'>Houve um erro ao atualizar o banco de dados.</small>";
                            commandExecuted = true;
                            break;
                        case 'post_community':
                            const postRes = await window.AemGlobalAPI.postToCommunity(cmdObj.text);
                            if(postRes) aiReply += `<br><br><small style='color:#4ade80'>Mensagem publicada na comunidade!</small>`;
                            commandExecuted = true;
                            break;
                        case 'take_notes':
                            const noteRes = await window.AemGlobalAPI.takeNotesAutomated(cmdObj.courseName, cmdObj.notes);
                            if(noteRes === 'sucesso') { aiReply += `<br><br><small style='color:#4ade80'>Anotação criada e salva no seu diário de bordo premium deste curso!</small>`; commandExecuted = true; }
                            else aiReply += "<br><br><small style='color:#f87171'>Não encontrei o curso para salvar a anotação.</small>";
                            break;
                    }
                }

                if (commandExecuted) {
                    aiReply += "<br><br><small style='color:#4ade80'><i class='fa-solid fa-bolt'></i> Ação concluída com sucesso!</small>";
                    if (shouldCloseWidget) {
                        setTimeout(() => { window.AemIaWidget.closeWidget(); }, 2000);
                    }
                }
            } else {
                aiReply = aiReply.replace(/```[\s\S]*?```/g, '').trim();
            }
            
            appendMessage(aiReply.trim(), false);
            
            // 💾 SALVA A RESPOSTA DA IA NO HISTÓRICO PARA ELA LEMBRAR DEPOIS
            chatHistory.push(`${nomeDaIA}: ${aiReply.replace(/<[^>]*>?/gm, '')}`); // Remove HTML antes de salvar
            localStorage.setItem('aem_ia_chat_history', JSON.stringify(chatHistory));
            
        } catch (err) {
            typing.classList.add('hidden');
            appendMessage("⚠️ Sistema offline ou falha na conexão.", false);
        }
    });
    
    // 👇 INÍCIO DA LÓGICA DO BOTÃO NOVA CONVERSA 👇
    const btnRestartIa = document.getElementById('aem-ia-restart-btn');
    if (btnRestartIa) {
        btnRestartIa.addEventListener('click', () => {
            // 1. Limpa visualmente as mensagens da tela 
            const chatBody = document.getElementById('aem-chat-box-normal');
            if (chatBody) {
                chatBody.innerHTML = ''; 
            }
            
            // 2. Limpa a memória salva no navegador
            localStorage.removeItem('aem_ia_chat_history'); 
            
            // 3. Adiciona um feedback visual no botão de rodar
            btnRestartIa.classList.add('animate-spin');
            setTimeout(() => btnRestartIa.classList.remove('animate-spin'), 500);

            // 4. Manda a IA dar as boas-vindas oficiais puxadas do Banco de Dados
            setTimeout(() => {
                const msgOficial = window.AemIaWelcomeMsg || "Olá! Como posso te ajudar hoje?";
                appendMessage(msgOficial, false);
            }, 300);
        });
    }
    
    
})();
  </script>

</script>
