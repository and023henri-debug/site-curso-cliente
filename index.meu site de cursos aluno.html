                                                                        <button onClick={() => handleSendComment(post.id, post.comments)} disabled={!commentText.trim() || isCommenting} className="absolute right-1 top-1 bottom-1 aspect-square bg-indigo-600 hover:bg-indigo-700 text-white rounded-full transition-all disabled:opacity-50 flex items-center justify-center"><Send size={16}/></button>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    )}

                                    {/* ABA: MEMBROS DA TRIBO ATIVA */}
                                    {activeCommunity && activeCommTab === 'membros' && (
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 pb-20 animate-fade-in pt-2">
                                            {(activeCommunity.members || [activeCommunity.creatorId]).map(uid => {
                                                const memberUser = getMemberData(uid);
                                                return (
                                                    <div key={uid} className="bg-[#111] p-4 rounded-2xl border border-white/10 flex items-center gap-4 hover:bg-[#1a1a24] transition-colors">
                                                        <div className="w-12 h-12 rounded-full overflow-hidden shrink-0 border border-white/20">
                                                            {memberUser.photo ? <img src={memberUser.photo} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center font-bold text-slate-500 bg-slate-800">{memberUser.name.charAt(0)}</div>}
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <h4 className="text-white font-bold text-sm truncate">{memberUser.name}</h4>
                                                            {uid === activeCommunity.creatorId && <span className="text-[10px] text-indigo-400 font-bold uppercase tracking-widest bg-indigo-500/10 px-2 py-0.5 rounded border border-indigo-500/20">Líder</span>}
                                                        </div>
                                                        {uid !== user.uid && (
                                                            <button onClick={() => { setSelectedChatUser(memberUser); setCommunityTab('mensagens'); }} className="p-2.5 bg-white/5 hover:bg-indigo-600 rounded-xl transition-colors text-white border border-white/5" title="Mandar Mensagem Direta">
                                                                <MessageCircle size={18} />
                                                            </button>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}

                                    {/* GRID DE TRIBOS GLOBAL (MOSTRANDO AS FOTOS ATUALIZADAS) */}
                                    {communityTab === 'tribos' && !activeCommunity && (
                                        <div className="animate-fade-in pt-4">
                                            <div className="flex justify-between items-center mb-6">
                                                <h3 className="text-lg font-bold text-white tracking-tight">Grupos Ativos</h3>
                                                <button onClick={() => setIsCreatingComm(true)} className="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl text-xs font-bold shadow-[0_0_15px_rgba(79,70,229,0.4)] transition-all flex items-center gap-2">
                                                    <UserCircle size={16} /> Criar Tribo
                                                </button>
                                            </div>

                                            {studentCommunities.length === 0 ? (
                                                <div className="py-20 text-center border border-dashed border-white/20 rounded-3xl bg-white/5">
                                                    <UserCircle size={48} className="mx-auto mb-4 opacity-20" />
                                                    <p className="text-white/60 font-medium">Nenhum grupo criado. Seja o pioneiro!</p>
                                                </div>
                                            ) : (
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 pb-20">
                                                    {studentCommunities.map(comm => {
                                                        const isCreator = comm.creatorId === user.uid;
                                                        const isMember = (comm.members || []).includes(user.uid) || isCreator;
                                                        const isPending = (comm.pendingRequests || []).includes(user.uid);

                                                        return (
                                                            <div key={comm.id} onClick={() => { if(isMember) { setActiveCommunity(comm); setCommunityTab('feed'); } }} className={`bg-[#111] border border-white/10 rounded-[1.5rem] transition-all group flex flex-col shadow-lg relative overflow-hidden ${isMember ? 'cursor-pointer hover:border-indigo-500/50 hover:shadow-[0_10px_30px_rgba(79,70,229,0.2)] hover:-translate-y-1' : ''}`}>
                                                                
                                                                {/* Mini Capa */}
                                                                <div className="w-full h-24 bg-slate-800 relative">
                                                                    {comm.coverUrl ? (
                                                                        <img src={comm.coverUrl} className={`w-full h-full object-cover ${comm.banned ? 'grayscale opacity-50' : ''}`} alt="Capa" />
                                                                    ) : (
                                                                        <div className="w-full h-full bg-gradient-to-r from-indigo-900 to-purple-900"></div>
                                                                    )}
                                                                    {comm.banned && <div className="absolute top-2 right-2 bg-red-600 text-white text-[9px] font-black px-2 py-1 rounded shadow-md z-10 flex items-center gap-1"><Lock size={10}/> SUSPENSA</div>}
                                                                </div>

                                                                <div className="px-5 pb-5 relative flex flex-col flex-1">
                                                                    {/* Avatar Sobreposto */}
                                                                    <div className="-mt-8 mb-3 relative z-10">
                                                                        <div className={`w-16 h-16 rounded-full overflow-hidden border-4 border-[#111] shrink-0 shadow-lg bg-slate-700 flex items-center justify-center font-black text-xl text-white ${comm.banned ? 'grayscale border-red-900/50 text-red-500' : ''}`}>
                                                                            {comm.avatarUrl ? <img src={comm.avatarUrl} className="w-full h-full object-cover"/> : comm.name.charAt(0).toUpperCase()}
                                                                        </div>
                                                                    </div>

                                                                    <div className="flex-1">
                                                                        <h4 className={`text-lg font-black line-clamp-1 mb-1 tracking-tight ${comm.banned ? 'text-red-400' : 'text-white'}`}>{comm.name}</h4>
                                                                        <p className="text-xs text-white/50 line-clamp-2 leading-relaxed mb-4">{comm.description}</p>
                                                                    </div>

                                                                    <div className="flex items-center gap-3 text-[10px] uppercase tracking-widest text-white/40 font-bold mb-4">
                                                                        <span className="flex items-center gap-1"><UserCircle size={12}/> Líder: {comm.creatorName?.split(' ')[0]}</span>
                                                                        <span className="flex items-center gap-1"><User size={12}/> {(comm.members || [comm.creatorId]).length} Membros</span>
                                                                    </div>

                                                                    <div className="mt-auto border-t border-white/5 pt-4">
                                                                        {isCreator ? (
                                                                            <button onClick={(e) => { e.stopPropagation(); setManagingComm(comm); }} className="w-full py-2.5 bg-white/5 hover:bg-white/10 text-white rounded-xl text-xs font-bold transition-all border border-white/10 flex items-center justify-center gap-2">
                                                                                <Settings size={16} /> Gerenciar
                                                                            </button>
                                                                        ) : isMember ? (
                                                                            <button onClick={() => { setActiveCommunity(comm); setCommunityTab('feed'); }} className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-bold transition-all shadow-md flex items-center justify-center gap-2">
                                                                                <Eye size={16} /> Acessar Tribo
                                                                            </button>
                                                                        ) : isPending ? (
                                                                            <button onClick={(e) => { e.stopPropagation(); handleCancelRequest(comm.id); }} className="w-full py-2.5 bg-yellow-500/20 hover:bg-yellow-500/30 text-yellow-500 rounded-xl text-xs font-bold transition-all border border-yellow-500/30 flex items-center justify-center gap-2">
                                                                                <Clock size={16} /> Cancelar Pedido
                                                                            </button>
                                                                        ) : (
                                                                            <button onClick={(e) => { e.stopPropagation(); handleRequestJoin(comm.id); }} className="w-full py-2.5 bg-white/5 hover:bg-white/10 text-white rounded-xl text-xs font-bold transition-all border border-white/10 flex items-center justify-center gap-2">
                                                                                <User size={16} /> Solicitar Entrada
                                                                            </button>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                </div>
            )}

            {/* CHAT PRIVADO */}
            {communityTab === 'mensagens' && (
                <div className="flex w-full h-full pt-[80px] md:pt-[100px] px-2 md:px-6 pb-4">
                    {renderChatInterface()}
                </div>
            )}
        </div>
    );
};
// =================================================================================
// FIM DO COMPONENTE COMUNIDADE
// =================================================================================

   
   
 // =================================================================================
    // COMPONENTE: MEUS FAVORITOS (MAIOR NO PC, ULTRA COMPACTO NO CELULAR)
    // =================================================================================
    const FavoritesSection = ({ user, courses, onSelectCourse }) => {
        const [favorites, setFavorites] = useState([]);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
            const fetchFavorites = async () => {
                if(!db || !user) return;
                try {
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);
                    
                    if(userSnap.exists()){
                        const data = userSnap.data();
                        const favoriteIds = data.favoriteLessons || [];
                        
                        let favList = [];
                        if (courses && courses.length > 0) {
                            courses.forEach(course => {
                                if(course.modulos) {
                                    course.modulos.forEach((mod, mIdx) => {
                                        if(mod.aulas) {
                                            mod.aulas.forEach((lesson, lIdx) => {
                                                const uniqueId = `${course.id}_m${mIdx}_l${lIdx}`;
                                                if(favoriteIds.includes(uniqueId)) {
                                                    favList.push({
                                                        ...lesson,
                                                        courseId: course.id,
                                                        courseData: course,
                                                        courseName: course.title || course.titulo,
                                                        moduleName: mod.titulo
                                                    });
                                                }
                                            });
                                        }
                                    });
                                }
                            });
                        }
                        setFavorites(favList);
                    }
                } catch(e) {
                    console.error("Erro ao carregar favoritos", e);
                } finally {
                    setLoading(false);
                }
            };
            fetchFavorites();
        }, [user, courses]);

        if(loading) return <div className="flex justify-center items-center h-64"><div className="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div></div>;

        return (
            <div className="space-y-4 md:space-y-10 animate-fade-in max-w-[100rem] mx-auto mt-16 md:mt-28 mb-10 px-3 md:px-8 lg:px-12 font-sans">
                
                {/* HEADER (Mais compacto no mobile) */}
                <div className="flex items-center gap-2 md:gap-5 mb-3 md:mb-8 px-1">
                    <div className="p-2 md:p-5 bg-pink-100 dark:bg-pink-900/30 text-pink-600 dark:text-pink-400 rounded-lg md:rounded-2xl shadow-inner">
                        <Heart className="w-5 h-5 md:w-8 md:h-8" />
                    </div>
                    <div>
                        <h2 className="text-xl md:text-4xl font-black text-slate-800 dark:text-white tracking-tight">Aulas Favoritas</h2>
                        <p className="text-slate-500 dark:text-slate-400 text-[10px] md:text-base mt-0.5 md:mt-1.5">Seus conteúdos salvos para acesso rápido.</p>
                    </div>
                </div>

                {/* CASO NÃO TENHA FAVORITOS */}
                {favorites.length === 0 ? (
                    <div className="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl md:rounded-3xl p-8 md:p-16 flex flex-col items-center justify-center text-center bg-slate-50/50 dark:bg-slate-900/50 min-h-[200px] md:min-h-[300px]">
                        <div className="w-12 h-12 md:w-20 md:h-20 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-400 mb-3 md:mb-6 shadow-inner">
                            <Heart className="w-6 h-6 md:w-10 md:h-10" />
                        </div>

 // =================================================================================
// COMPONENTE: CARTEIRA DE PONTOS E RECOMPENSAS (COM GAMIFICAÇÃO E MOEDA PERSONALIZADA)
// =================================================================================
const PointsWalletSection = ({ user, courses, purchasedIds, userPoints, db, setPurchasedIds, showNotification, requestConfirmation }) => {
    const [isProcessing, setIsProcessing] = useState(false);
    
    // Novos Estados para buscar as configurações e os Níveis do Banco de Dados
    const [coinName, setCoinName] = useState({ s: 'Ponto', p: 'Pontos' });
    const [levels, setLevels] = useState([]);
    const [userTotalEarned, setUserTotalEarned] = useState(0);

    useEffect(() => {
        if (!db) return;
        
        // 1. Busca o nome personalizado da Moeda
        getDoc(doc(db, "config", "general_settings")).then(snap => {
            if (snap.exists()) {
                const data = snap.data();
                setCoinName({ s: data.coinNameSingular || 'Ponto', p: data.coinNamePlural || 'Pontos' });
            }
        });

        // 2. Busca a Escada de Níveis (Ordenada do menor pro maior)
        const unsubLevels = onSnapshot(query(collection(db, "student_levels"), orderBy("requiredPoints", "asc")), snap => {
            setLevels(snap.docs.map(d => ({id: d.id, ...d.data()})));
        });

        // 3. Busca o Total Histórico ganho pelo usuário (para calcular o nível)
        const unsubUser = onSnapshot(doc(db, "users", user.uid), snap => {
            if (snap.exists()) {
                setUserTotalEarned(snap.data().pointsEarned || 0);
            }
        });

        return () => { unsubLevels(); unsubUser(); };
    }, [db, user.uid]);

    // O Sistema descobre em qual Nível o aluno está:
    const currentLevel = [...levels].sort((a,b) => (b.requiredPoints || 0) - (a.requiredPoints || 0)).find(l => userTotalEarned >= (l.requiredPoints || 0));

    const handleExchange = async (course) => {
        if (userPoints < course.pointsCost) {
            showNotification(`Saldo insuficiente. Faltam ${course.pointsCost - userPoints} ${coinName.p.toLowerCase()}.`, "error");
            return;
        }
        
        requestConfirmation(
            "Confirmar Troca",
            `Deseja investir ${course.pointsCost} ${coinName.p.toLowerCase()} para liberar o curso "${course.title || course.titulo}"?`,
            "Confirmar Troca",
            async () => {
                setIsProcessing(true);
                try {
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);
                    if (userSnap.exists()) {
                        const uData = userSnap.data();
                        await updateDoc(userRef, {
                            pointsSpent: (Number(uData.pointsSpent) || 0) + Number(course.pointsCost),
                            pointsBalance: (Number(uData.pointsBalance) || 0) - Number(course.pointsCost)
                        });
                    }

                    await addDoc(collection(db, "transactions"), {
                        courseId: course.id, courseTitle: course.title || course.titulo, userId: user.uid, userName: user.displayName || 'Aluno',
                        userEmail: user.email, valor: 0, status: 'pago', method: 'points_exchange', pointsCost: course.pointsCost,
                        createdAt: new Date(), updatedAt: new Date()
                    });

                    setPurchasedIds(prev => [...prev, course.id]);
                    showNotification("Troca realizada com sucesso! O curso já está liberado.", "success");
                } catch (error) {
                    showNotification("Erro ao processar a troca. Tente novamente.", "error");
                } finally {
                    setIsProcessing(false);
                }
            }
        ); 
    };

    const rewardCourses = courses.filter(c => Number(c.pointsCost) > 0);

    return (
        <div className="space-y-4 md:space-y-8 animate-fade-in max-w-[100rem] mx-auto pt-2 md:pt-6 pb-10 px-3 md:px-8 lg:px-12 font-sans">
            
            <div className="bg-gradient-to-br from-amber-500/20 to-[#0a0a0f] border border-amber-500/30 rounded-[1.5rem] md:rounded-[2rem] p-5 md:p-12 shadow-[0_0_40px_rgba(245,158,11,0.1)] relative overflow-hidden flex flex-col md:flex-row items-center justify-between gap-4 md:gap-8">
                <div className="absolute top-0 right-0 w-32 h-32 md:w-64 md:h-64 bg-amber-500/10 blur-[40px] md:blur-[80px] rounded-full pointer-events-none"></div>
                
                <div className="relative z-10 flex items-center gap-3 md:gap-6 w-full md:w-auto">
                    <div className="w-12 h-12 md:w-20 md:h-20 bg-amber-500/20 rounded-full flex items-center justify-center border border-amber-500/50 shadow-[0_0_20px_rgba(245,158,11,0.4)] shrink-0">
                        <Star className="w-6 h-6 md:w-10 md:h-10 text-amber-400 fill-amber-400" />
                    </div>
                    <div>
                        <h2 className="text-xl md:text-4xl font-black text-white tracking-tight">Sua Carteira</h2>
                        <p className="text-amber-400/80 font-medium mt-0.5 md:mt-1 text-[9px] md:text-sm uppercase tracking-widest">Saldo Disponível</p>
                    </div>
                </div>

                {/* Bloco de Nível e Saldo da Moeda Personalizada */}
                <div className="flex flex-col md:flex-row items-center gap-4 relative z-10">
                    {/* Exibição Dinâmica do Nível (Gamificação) */}
                    {currentLevel && (
                        <div className="flex items-center gap-3 bg-black/40 backdrop-blur-md px-4 py-2 md:px-6 md:py-3 rounded-2xl border border-white/10">
                            <div className="w-10 h-10 md:w-14 md:h-14 rounded-full overflow-hidden border border-amber-500 shadow-[0_0_15px_rgba(245,158,11,0.5)]">
                                <img src={currentLevel.badgeUrl} alt="Emblema" className="w-full h-full object-cover" />
                            </div>
                            <div className="text-left">
                                <p className="text-[8px] md:text-[10px] text-amber-400 font-bold uppercase tracking-widest">Seu Nível Atual</p>
                                <h3 className="text-base md:text-xl font-black text-white leading-none">{currentLevel.name}</h3>
                            </div>
                        </div>
                    )}

                    <div className="text-center md:text-right bg-black/40 backdrop-blur-md px-6 md:px-8 py-3 md:py-4 rounded-2xl md:rounded-3xl border border-white/10 w-full md:w-auto">
                        <span className="block text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-amber-500 drop-shadow-sm">
                            {userPoints}
                        </span>
                        <span className="text-white/50 text-[8px] md:text-[10px] font-bold uppercase tracking-widest mt-1 block">{coinName.p} Acumulados</span>
                    </div>
                </div>
            </div>

            <div>
                <div className="flex items-center gap-2 md:gap-3 mb-3 md:mb-6 px-1">
                    <ShoppingBag className="w-4 h-4 md:w-6 md:h-6 text-white/60" />
                    <h3 className="text-lg md:text-2xl font-black text-white tracking-tight">Loja de Recompensas</h3>
                </div>

                {rewardCourses.length === 0 ? (
                    <div className="border border-dashed border-white/10 rounded-2xl md:rounded-3xl p-8 md:p-12 text-center bg-white/[0.02]">
                        <p className="text-white/50 text-xs md:text-lg">Nenhum curso disponível para troca no momento.</p>
                    </div>
                ) : (
                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-2 md:gap-6">
                        {rewardCourses.map(course => {
                            const isOwned = purchasedIds.includes(course.id);
                            const canAfford = userPoints >= course.pointsCost;

                            return (
                                <div key={course.id} className="group relative w-full aspect-[2/3] rounded-xl md:rounded-2xl overflow-hidden shadow-lg hover:shadow-[0_15px_30px_rgba(245,158,11,0.2)] hover:-translate-y-1 transition-all duration-500 border border-white/10 bg-[#0a0a0f]">
                                    <img src={course.cover || "https://via.placeholder.com/600"} alt={course.title} className="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:scale-110 transition-transform duration-700" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/70 to-transparent opacity-100 transition-opacity duration-500"></div>

                                    <div className="absolute top-2 md:top-3 left-1/2 -translate-x-1/2 bg-[#0a0a0f]/90 backdrop-blur-md border border-amber-500/40 px-2.5 py-1 md:px-3 md:py-1.5 rounded-full flex items-center gap-1 md:gap-1.5 shadow-[0_0_15px_rgba(245,158,11,0.5)] z-20">
                                        <Star className="w-3 h-3 md:w-3.5 md:h-3.5 text-amber-400 fill-amber-400" />
                                        <span className="text-amber-400 font-bold text-[9px] md:text-[10px] whitespace-nowrap">{course.pointsCost} {coinName.s.toLowerCase()}</span>
                                    </div>

                                    <div className="absolute inset-x-0 bottom-0 p-3 md:p-4 flex flex-col z-20">
                                        <h4 className="text-white font-bold text-xs md:text-[13px] mb-2 md:mb-3 line-clamp-2 leading-tight drop-shadow-md text-left">{course.title || course.titulo}</h4>
                                        {isOwned ? (
                                            <button disabled className="w-full py-2 md:py-2.5 rounded-lg md:rounded-xl bg-green-500/10 text-green-400 border border-green-500/20 font-bold text-[9px] md:text-[10px] uppercase tracking-widest flex items-center justify-center gap-1.5 backdrop-blur-md">
                                                <CheckCircle className="w-3.5 h-3.5 md:w-4 md:h-4" /> Resgatado
                                            </button>
                                        ) : (
                                            <button onClick={() => handleExchange(course)} disabled={!canAfford || isProcessing} className={`w-full py-2 md:py-2.5 rounded-lg md:rounded-xl font-bold text-[9px] md:text-[10px] uppercase tracking-widest flex items-center justify-center gap-1.5 transition-all backdrop-blur-sm ${canAfford ? 'bg-amber-500 hover:bg-amber-400 text-black shadow-[0_0_15px_rgba(245,158,11,0.4)]' : 'bg-white/5 text-white/30 border border-white/10 cursor-not-allowed'}`}>
                                                {isProcessing ? <div className="w-3.5 h-3.5 border-2 border-current border-t-transparent rounded-full animate-spin"></div> : canAfford ? <>Trocar</> : <><Lock className="w-3 h-3 md:w-3.5 md:h-3.5 opacity-60" /> Faltam {coinName.p}</>}
                                            </button>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}
            </div>
        </div>
    );
};

    // =================================================================================

       useEffect(() => {

               openCourseByName: (courseName) => {
                   const matches = allCourses.filter(c => (c.title || c.titulo || '').toLowerCase().includes(courseName.toLowerCase()));
                   if (matches.length === 1) {

                       if (purchasedIds.includes(matches[0].id)) setView('course_player');

                   return { status: 'not_found' };
               },
               buyCourseByName: (courseName) => {
                   const found = allCourses.find(c => (c.title || c.titulo || '').toLowerCase().includes(courseName.toLowerCase()));
                   if (found) {
                       if (purchasedIds.includes(found.id)) {
                           setSelectedCourse(found); setView('course_player'); return "owned";
                       } else {
                           let price = typeof found.price === 'number' ? found.price : parseFloat(String(found.price || "0").replace(/\./g, '').replace(',', '.'));
                           if (isNaN(price)) price = 0;
                           const promo = promotions.find(p => p.discountTargetId === found.id && p.discountTargetType === 'course' && p.conditionType === 'none');
                           let discountInfo = { hasDiscount: false, originalPrice: price, finalPrice: price };
                           if (promo) {
                               let finalPrice = promo.discountType === 'percentage' ? price - (price * (promo.discountValue / 100)) : price - promo.discountValue;
                               discountInfo = { hasDiscount: true, originalPrice: price, finalPrice: Math.max(0, finalPrice), tag: promo.discountType === 'percentage' ? `-${promo.discountValue}%` : `-R$${promo.discountValue}` };

       const generateCertificate = async (courseId, courseName) => {
           const modelo = certificates.find(c => c.courseId === courseId);
           if (!modelo || !modelo.bgUrl) return showNotification("Erro: Modelo de certificado não encontrado.", "error");
           showNotification("Gerando arquivo de alta definição...", "info");
           const canvas = document.createElement('canvas');
           const ctx = canvas.getContext('2d');
           const img = new Image();
           img.crossOrigin = "Anonymous"; 
           img.src = modelo.bgUrl;
           img.onload = () => {
               canvas.width = img.width; canvas.height = img.height;
               const w = canvas.width; const h = canvas.height; const centerX = w / 2;
               ctx.drawImage(img, 0, 0); ctx.textAlign = "center"; ctx.textBaseline = "middle";
               ctx.font = `italic ${Math.floor(w * 0.018)}px 'Merriweather', serif`; ctx.fillStyle = "#475569"; ctx.fillText("Certificamos para os devidos fins que", centerX, h * 0.35);
               ctx.font = `bold ${Math.floor(w * 0.05)}px 'Merriweather', serif`; ctx.fillStyle = "#0f172a"; ctx.fillText(realProfile.name, centerX, h * 0.45, w * 0.85);
               getDoc(doc(db, "users", user.uid)).then(docSnap => {
                   const finalUser = docSnap.exists() ? { ...user, ...docSnap.data() } : user;
                   let docText = ""; if (finalUser.cpf) docText += `CPF: ${finalUser.cpf}`; if (finalUser.cpf && finalUser.rg) docText += "  •  "; if (finalUser.rg) docText += `RG: ${finalUser.rg}`;
                   if (docText) { ctx.font = `${Math.floor(w * 0.014)}px 'Inter', sans-serif`; ctx.fillStyle = "#64748b"; ctx.fillText(docText, centerX, h * 0.51); }
                   ctx.font = `normal ${Math.floor(w * 0.018)}px 'Inter', sans-serif`; ctx.fillStyle = "#334155"; ctx.fillText("Concluiu com êxito a carga horária do curso profissionalizante de:", centerX, h * 0.55);
                   ctx.font = `bold ${Math.floor(w * 0.035)}px 'Merriweather', serif`; ctx.fillStyle = "#1e293b"; ctx.fillText(courseName, centerX, h * 0.62, w * 0.8);
                   const dateStr = new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
                   ctx.font = `${Math.floor(w * 0.016)}px 'Inter', sans-serif`; ctx.fillStyle = "#475569"; ctx.fillText(`São Paulo, ${dateStr}`, centerX, h * 0.78);
                   try { const dataUrl = canvas.toDataURL('image/png', 1.0); const link = document.createElement('a'); link.download = `Certificado_${courseName.replace(/\s+/g, '_')}.png`; link.href = dataUrl; document.body.appendChild(link); link.click(); document.body.removeChild(link); showNotification("Certificado baixado!", "success"); } catch (err) { console.error(err); }
               });
           };

       useEffect(() => {
            const checkPaymentReturn = async () => {

                const paymentStatus = params.get('payment_status');

       useEffect(() => {

    // --- COMPONENTE DE BARREIRA DE ERRO ---
    // Se algum componente quebrar, isso mostra o erro na tela em vez de deixar tudo branco.
    class ErrorBoundary extends React.Component {
        constructor(props) {
            super(props);
            this.state = { hasError: false, error: null, errorInfo: null };
        }

        static getDerivedStateFromError(error) {
            return { hasError: true, error };
        }

        componentDidCatch(error, errorInfo) {
            console.error("ERRO CRÍTICO REACT:", error, errorInfo);
            this.setState({ errorInfo });
        }

        render() {
            if (this.state.hasError) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-red-50 p-8 font-sans">
                        <div className="bg-white p-8 rounded-2xl shadow-xl border border-red-200 max-w-2xl w-full text-center">
                            <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">

                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">Ops! Ocorreu um erro.</h2>
                            <p className="text-slate-600 mb-6">O sistema encontrou um problema técnico.</p>
                            
                            <div className="bg-slate-900 text-left p-4 rounded-lg overflow-auto mb-6 border border-slate-700 max-h-60">
                                <p className="text-red-400 font-mono text-xs font-bold mb-2">Erro Técnico:</p>
                                <pre className="text-white font-mono text-xs whitespace-pre-wrap">
                                    {this.state.error && this.state.error.toString()}
                                </pre>
                            </div>

                            <button onClick={() => window.location.reload()} className="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition-all">
                                Tentar Recarregar
                            </button>
                        </div>
                    </div>
                );
            }
            return this.props.children; 
        }
    }

   
// =================================================================================
// INÍCIO DO COMPONENTE ALUNO: TRANSMISSÃO AO VIVO COM CHAT EM TEMPO REAL (DELAY 2s-3s LISO)
// =================================================================================
const StudentLivePlayer = ({ db, settings, showNotification, user }) => {
    // --- LÓGICA DO VÍDEO E CHUNKS ---
    const videoRef = React.useRef(null);
    const mediaSourceRef = React.useRef(null);
    const sourceBufferRef = React.useRef(null);
    const queueRef = React.useRef([]);
    const isAppendingRef = React.useRef(false);
    const processedChunks = React.useRef(new Set());
    
    const [hasError, setHasError] = React.useState(false);
    const [isConnected, setIsConnected] = React.useState(false);

    // --- LÓGICA DO CHAT ---
    const chatEndRef = React.useRef(null);
    const [messages, setMessages] = React.useState([]);
    const [newMessage, setNewMessage] = React.useState('');
    const [isSending, setIsSending] = React.useState(false);

    const isLiveActive = settings?.liveActive;
    const currentLiveId = settings?.currentLiveId || 'live_global_default';
    const isChatActive = settings?.liveChatActive !== false; 

    // 1. CARREGA O VÍDEO COM GESTÃO INTELIGENTE DE BUFFER (CRAVADO EM 2~3 SEGUNDOS)
    React.useEffect(() => {
        if (!isLiveActive) {
            setIsConnected(false);
            return;
        }

        let unsubscribe = () => {};

        const initLive = async () => {
            try {
                const ms = new MediaSource();
                mediaSourceRef.current = ms;
                if (videoRef.current) videoRef.current.src = URL.createObjectURL(ms);

                ms.addEventListener('sourceopen', async () => {
                    try {
                        const sb = ms.addSourceBuffer('video/webm; codecs="vp8,opus"');
                        sourceBufferRef.current = sb;

                        sb.addEventListener('updateend', () => {
                            isAppendingRef.current = false;

                            // 👇 O SEGREDO DOS 2 SEGUNDOS SEM TRAVAR 👇
                            if (videoRef.current && videoRef.current.buffered.length > 0) {
                                const video = videoRef.current;
                                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                                const delay = bufferedEnd - video.currentTime;
                                
                                // 1. Se o delay passar de 6 segundos (ex: a internet do aluno caiu e voltou)
                                // Faz um salto direto, mas DEIXA 2.5s de margem de segurança.
                                if (delay > 6.0) {
                                    video.currentTime = bufferedEnd - 2.5; 
                                } 
                                // 2. Se o delay estiver entre 3.5s e 6s, acelera suavemente (1.1x)
                                else if (delay > 3.5) {
                                    video.playbackRate = 1.1;
                                } 
                                // 3. A MÁGICA ANTI-CARREGAMENTO: Se estiver muito perto do fim (menos de 1.5s),
                                // desacelera (0.9x) para dar tempo do próximo bloco baixar SEM PAUSAR O VÍDEO!
                                else if (delay < 1.5) {
                                    video.playbackRate = 0.9;
                                } 
                                // 4. Zona perfeita: delay cravado entre 1.5s e 3.5s (Velocidade Normal)
                                else {
                                    video.playbackRate = 1.0;
                                }
                                
                                // Força o play caso o navegador tenha pausado por falta de dados
                                if (video.paused && video.currentTime > 0 && !video.ended) {
                                    video.play().catch(e => console.warn("Auto-play protegido:", e));
                                }
                            }
                            // 👆 FIM DA NOVA LÓGICA 👆

                            processQueue(); 
                        });

                        if (settings?.initChunkUrl) {
                            try {
                                const res = await fetch(settings.initChunkUrl, { cache: 'no-store' });
                                const buf = await res.arrayBuffer();
                                isAppendingRef.current = true;
                                sb.appendBuffer(buf);
                                processedChunks.current.add(settings.initChunkUrl);
                                setIsConnected(true);
                            } catch (e) { console.error("Erro cabeçalho", e); }
                        }

                        const q = query(collection(db, "live_chunks"), where("liveId", "==", currentLiveId), orderBy("timestamp", "asc"));
                        unsubscribe = onSnapshot(q, (snap) => {
                            snap.docChanges().forEach(async (change) => {
                                if (change.type === 'added') {
                                    const chunkData = change.doc.data();
                                    if (processedChunks.current.has(chunkData.url)) return;
                                    processedChunks.current.add(chunkData.url);
                                    try {
                                        const res = await fetch(chunkData.url, { cache: 'no-store' });
                                        const buf = await res.arrayBuffer();
                                        queueRef.current.push(buf);
                                        processQueue();
                                    } catch (e) {}
                                }
                            });
                        });
                    } catch (err) {
                        setHasError(true);
                    }
                });
            } catch (e) { setHasError(true); }
        };

        initLive();
        return () => unsubscribe();
    }, [isLiveActive, currentLiveId, db]);

    const processQueue = () => {
        if (isAppendingRef.current || queueRef.current.length === 0 || !sourceBufferRef.current || sourceBufferRef.current.updating) return;
        const nextChunk = queueRef.current.shift();

        try {

        } catch(e) {

    // 2. A função que vai secretamente ao Mercado Pago verificar se o PIX do curso foi pago
    const verifyPendingCoursePayments = async () => {
        if (isCheckingCoursesRef.current || pendingCourseOrders.length === 0) return;
        
        // Puxa a chave de acesso do Mercado Pago configurada no Painel Admin
        const mpToken = genSettings?.mercadoPagoAccessToken || genSettings?.mercadopagoAccessToken || 'APP_USR-5078406563096978-100721-63ed85c89b2cb57e85109eb14514462c-336516116';
        if (!mpToken) return;

        isCheckingCoursesRef.current = true;

        try {
            for (let order of pendingCourseOrders) {
                let mpStatus = null;
                let mpData = null;

                const mpId = order.mpPaymentId || order.paymentId || order.payment_id;
                
                // Tentativa 1: Busca pelo ID direto do Mercado Pago (se já existir)
                if (mpId && mpId !== 'N/A') {
                    const resId = await fetch(`https://api.mercadopago.com/v1/payments/${String(mpId).trim()}`, { 
                        headers: { 'Authorization': `Bearer ${mpToken}` } 
                    });
                    if (resId.ok) { 
                        mpData = await resId.json(); 
                        mpStatus = String(mpData.status).toLowerCase(); 
                    }
                }

                // Tentativa 2: MÁGICA! Busca pelo seu ID do Firebase (external_reference) igual no sistema de Produtos
                if (!mpStatus) {
                    const searchUrl = `https://api.mercadopago.com/v1/payments/search?sort=date_created&criteria=desc&external_reference=${order.id}`;
                    const resSearch = await fetch(searchUrl, { 
                        headers: { 'Authorization': `Bearer ${mpToken}` } 
                    });
                    if (resSearch.ok) {
                        const searchData = await resSearch.json();
                        if (searchData.results && searchData.results.length > 0) { 
                            mpData = searchData.results[0]; 
                            mpStatus = String(mpData.status).toLowerCase(); 
                        }
                    }
                }

                // Se encontrou o status real no Mercado Pago, faz a liberação
                if (mpStatus) {
                    let novoStatus = order.status;
                    // Traduz o status do MP para o nosso sistema
                    if (['approved', 'accredited'].includes(mpStatus)) novoStatus = 'pago'; 
                    else if (['rejected', 'cancelled', 'refunded', 'charged_back'].includes(mpStatus)) novoStatus = 'cancelado'; 
                    
                    // Se o status mudou para PAGO, atualiza no Banco de Dados
                    if (novoStatus !== order.status) {
                        await updateDoc(doc(db, "transactions", order.id), { 
                            status: novoStatus, 
                            mpPaymentId: mpData ? String(mpData.id) : order.mpPaymentId, 
                            updatedAt: serverTimestamp() 
                        });
                        
                        // Notifica o aluno e já libera!
                        if (novoStatus === 'pago') {
                            if(showNotification) showNotification(`🎉 Pagamento aprovado! O curso "${order.courseTitle || 'Adquirido'}" já está liberado.`, "success");
                        }
                    }

      const applyThemeToDOM = (settings) => {
          if (!settings) return;
          const root = document.documentElement;

          const darkenHex = (hex, percent) => {
              if (!hex) return '#000000';
              hex = hex.replace('#', '');
              if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
              let r = parseInt(hex.substring(0, 2), 16);
              let g = parseInt(hex.substring(2, 4), 16);
              let b = parseInt(hex.substring(4, 6), 16);
              r = Math.max(0, Math.floor(r * (100 - percent) / 100));
              g = Math.max(0, Math.floor(g * (100 - percent) / 100));
              b = Math.max(0, Math.floor(b * (100 - percent) / 100));
              return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
          };

          // Aplica todas as cores
          if (settings.colorPrimary) {
              root.style.setProperty('--color-primary', settings.colorPrimary);
              root.style.setProperty('--color-primary-hover', darkenHex(settings.colorPrimary, 15)); 
              root.style.setProperty('--color-primary-soft', settings.colorPrimary + '26');

          if (settings.colorBgLight) root.style.setProperty('--background-light', settings.colorBgLight);
          if (settings.colorBgDark) root.style.setProperty('--background-dark', settings.colorBgDark);
          if (settings.colorTextLight) root.style.setProperty('--text-light', settings.colorTextLight);
          if (settings.colorTextDark) root.style.setProperty('--text-dark', settings.colorTextDark);
          if (settings.colorTitleLight) root.style.setProperty('--title-light', settings.colorTitleLight);
          if (settings.colorTitleDark) root.style.setProperty('--title-dark', settings.colorTitleDark);
          if (settings.colorSubtitleLight) root.style.setProperty('--subtitle-light', settings.colorSubtitleLight);
          if (settings.colorSubtitleDark) root.style.setProperty('--subtitle-dark', settings.colorSubtitleDark);

          // Aplica fontes com peso completo (sem dar erro de weight missing)
          const loadGoogleFont = (fontName) => {
              if (!fontName) return;
              const fontId = `gfont-${fontName.replace(/\s+/g, '-').toLowerCase()}`;
              if (!document.getElementById(fontId)) {
                  const link = document.createElement('link');
                  link.id = fontId; 
                  link.rel = 'stylesheet';
                  link.href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/\s+/g, '+')}:wght@300;400;500;600;700;800;900&display=swap`;
                  document.head.appendChild(link);
              }
          };
          
          [settings.siteNameFont, settings.heroTitleFont, settings.heroSubtitleFont, settings.bodyFont].forEach(loadGoogleFont);
      };

      // 1. CARREGAMENTO EM TEMPO REAL DO BANCO DE DADOS
      useEffect(() => {
          let unsubSettings;
          
          if (typeof isFirebaseAvailable !== 'undefined' && isFirebaseAvailable && db) {
              const docRef = doc(db, "config", "general_settings");
              unsubSettings = onSnapshot(docRef, (docSnap) => {
                  if (docSnap.exists()) {
                      const data = docSnap.data();
                      setGenSettings(data);


                      setTimeout(() => {
                            if (window.initMeusCursosCarousel) {
                                // Forçamos o 'true' para garantir que os vídeos sempre apareçam 
                                // caso haja algum vídeo cadastrado no Admin
                                window.initMeusCursosCarousel(true, data.landingVideos);
                            }
                        }, 500);

                      const heroImgUrl = data.heroBgUrl || data.heroBackground;
                      if (heroImgUrl) {
                          const img = new Image();
                          img.src = heroImgUrl;
                          img.onload = () => setBgLoaded(true);
                          img.onerror = () => setBgLoaded(true); 
                      } else {
                          setBgLoaded(true);
                      }

                      applyThemeToDOM(data); 
                  }
              }, (error) => console.warn("Erro ao ouvir config em tempo real:", error));
          }

          if (typeof isFirebaseAvailable !== 'undefined' && isFirebaseAvailable && db) {
              try {
                 const unsubCerts = onSnapshot(collection(db, "certificates"), (snap) => {
                     setCertificados(snap.docs.map(d => ({id: d.id, ...d.data()})));
                 }, (error) => console.log("Erro Certificados:", error));

                 const qCourses = query(collection(db, "courses"), where("ativo", "==", true));
                 const unsubCourses = onSnapshot(qCourses, (snap) => {
                     setCursos(snap.docs.map(d => ({id: d.id, ...d.data()})));
                 });

                 // 👇 BUSCA PROMOÇÕES AQUI PARA O APP INTEIRO 👇
                 const qPromos = query(collection(db, "promotions"), where("active", "==", true));
                 const unsubPromos = onSnapshot(qPromos, (snap) => {
                     setPromocoes(snap.docs.map(d => ({id: d.id, ...d.data()})));
                 });

                 return () => { unsubCerts(); unsubCourses(); unsubPromos(); if(unsubSettings) unsubSettings(); };
              } catch(e) { console.log("Erro listeners firestore", e); }
          }
      }, []);

      // 2. MODO PREVIEW AO VIVO E HANDSHAKE (Gatilho Inteligente)
      useEffect(() => {
          const handleMessage = (event) => {
              if (event.data && event.data.type === 'UPDATE_PREVIEW') {
                  const newSettings = event.data.settings;
                  
                  // Forçamos a leitura das variáveis corretas caso os nomes venham diferentes
                  const mappedSettings = {
                      ...newSettings,
                      colorPrimary: newSettings.colorPrimary || newSettings.sitePrimaryColor,
                      colorSecondary: newSettings.colorSecondary || newSettings.siteSecondaryColor
                  };
                  
                  setGenSettings(prev => ({ ...prev, ...mappedSettings }));
                  applyThemeToDOM(mappedSettings); 
              }
          };
          window.addEventListener('message', handleMessage);
          
          // O SEGREDO: O Iframe avisa o Painel Admin que ele terminou de montar o React e está pronto!
          if (isPreview) {
              window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
          }
          
          return () => window.removeEventListener('message', handleMessage);
      }, [isPreview]); 
      // --- FIM DO MOTOR DE TEMA DINÂMICO ---

       // --- MODO PREVIEW FORÇADO (Detecta se está dentro do Iframe do Admin) ---
       const urlParams = new URLSearchParams(window.location.search);
       const isPreview = urlParams.get('preview');

       // 2. Autenticação com Timeout de Segurança (Desativado no modo Preview)
       useEffect(() => {
         // Se estiver em modo preview, não precisa autenticar nem carregar
         if (isPreview) {
             setLoading(false);
             return;
         }

         let unsubscribeAuth;
         
         // A) Tenta conectar com Firebase Auth
         if (typeof isFirebaseAvailable !== 'undefined' && isFirebaseAvailable && auth) {
             unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
               setUser(currentUser);
               if (currentUser) setShowAuth(false);
               setLoading(false); // Sucesso
             }, (error) => {
                 console.error("Erro Auth:", error);
                 setLoading(false); // Erro, mas libera o load
             });
         } else {
             // Se não tiver firebase, libera o load após um breve delay
             setTimeout(() => setLoading(false), 1000);
         }
         
         // B) TRAVA DE SEGURANÇA (TIMEOUT)
         const safetyTimer = setTimeout(() => {
             if (loading) {
                 console.warn("⚠️ Timeout de Carregamento: Forçando abertura.");
                 setLoading(false);
             }
         }, 7000); 

         return () => { 
             if(unsubscribeAuth) unsubscribeAuth(); 
             clearTimeout(safetyTimer);
         };
       }, [loading, isPreview]);

       // =======================================================
       // ROTEAMENTO DE TELAS E MODO PREVIEW
       // =======================================================

       // 1. SE ESTIVER NO MODO PREVIEW (Vindo do Painel Admin)
       if (isPreview) {
           if (isPreview === 'login') {
               return <AuthScreen onLogin={() => {}} onBack={() => {}} settings={genSettings} />;
           }
           return <PublicLanding onLoginClick={() => {}} settings={genSettings} courses={cursos} promotions={promocoes} />;
       }

       // 👇 INÍCIO DO BLOCO DE CARREGAMENTO E ROTEAMENTO 👇
       // 2. TELA DE CARREGAMENTO NEUTRA DA A&M Produções / A&M
       if (loading) {
           return (
               <div className="flex flex-col items-center justify-center min-h-screen bg-[#050505] transition-colors duration-300">
                   <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                   <p className="text-gray-300 font-medium animate-pulse">
                       Carregando Sistema...
                   </p>
               </div>
           );
       }

       // 3. FLUXO NORMAL DA APLICAÇÃO (Aluno Autenticado ou Visitante)
       // 👇 AQUI A MÁGICA FINAL: O APP PASSA A LISTA DE PROMOÇÕES (promotions={promocoes}) PARA O DASHBOARD 👇
       if (user) {
           return <StudentDashboard user={user} settings={genSettings} certificates={certificados} promotions={promocoes} onLogout={() => { if(auth) signOut(auth); else setUser(null); }} />;
       }
       
       if (showAuth) {
           return <AuthScreen onLogin={(u) => setUser(u)} onBack={() => setShowAuth(false)} settings={genSettings} />;
       }
       
       // 4. TRAVA DE SEGURANÇA CONTRA TELA PISCANDO
       if (!genSettings || (!user && !showAuth && !bgLoaded)) {
           return (
               <div className="flex flex-col items-center justify-center min-h-screen bg-[#050505]">
                   <div className="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
               </div>
           );
       }

       return <PublicLanding onLoginClick={() => setShowAuth(true)} settings={genSettings} courses={cursos} promotions={promocoes} />;
       // 👆 FIM DO BLOCO DE CARREGAMENTO E ROTEAMENTO 👆
    };
    
    try {
        const container = document.getElementById('root');
        if (container) {
            const root = createRoot(container);
            root.render(
                <ErrorBoundary>
                    <App />
                </ErrorBoundary>
            );
            console.log("React montado com sucesso.");
        } else {
            document.body.innerHTML = "<h1 style='color:red; text-align:center; padding: 20px;'>ERRO FATAL: Div 'root' não encontrada.</h1>";
        }
    } catch (error) {
        console.error("Erro fatal na inicialização do React:", error);
        document.body.innerHTML = "<h1 style='color:red; text-align:center; padding: 20px;'>Erro fatal ao carregar a plataforma. Verifique o console do navegador.</h1>";
    }
  
  
  </script>

<script>
(function() {
    if (window.AemIaWidget && window.AemIaWidget.initialized) return;
    window.AemIaWidget = { initialized: true };

    // ⚡ DESPERTADOR DA IA: Acorda o servidor silenciosamente enquanto o aluno navega
    // Isso evita a lentidão de 5 a 10s na primeira mensagem do dia (Vercel Cold Start)
    fetch("https://meu-backend-ia.vercel.app").catch(() => {});

    // Injetar CSS Seguro do Widget

    // Injetar CSS Seguro do Widget
    const style = document.createElement('style');
    style.innerHTML = `
        #aem-ia-root { font-family: ui-sans-serif, system-ui, sans-serif; pointer-events: none; position: fixed; inset: 0; z-index: 99999; }
