// =================================================================================
// INÍCIO DO COMPONENTE: SINO DE NOTIFICAÇÕES (ÁREA DO ALUNO)
// =================================================================================
const NotificationBell = ({ db, user }) => {
    const [notifications, setNotifications] = React.useState([]);
    const [isOpen, setIsOpen] = React.useState(false);
    
    // ESTADO: Controla qual mídia foi clicada para abrir em tela cheia
    const [selectedMedia, setSelectedMedia] = React.useState(null); 
    
    const dropdownRef = React.useRef(null);

    // FUNÇÃO VITAL: Corrige links antigos do Cloudflare para a imagem carregar
    const fixUrl = (url) => {
        if (!url) return null;
        const wrongDomain = "https://pub-2ece542306d80259e71a793d20f91a60.r2.dev";
        const rightDomain = "https://pub-263c6a7252164111a104a68e6835cfc4.r2.dev";
        if (url.includes(wrongDomain)) return url.replace(wrongDomain, rightDomain);
        return url;
    };

    React.useEffect(() => {
        if (!db || !user) return;
        const q = query(
            collection(db, "system_notifications")
        );

        const unsubscribe = onSnapshot(q, (snap) => {
            const docs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const validDocs = docs.filter(n => n.targetMode === 'all' || n.targetUserId === user.uid);
            validDocs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
            setNotifications(validDocs);
        });

        return () => unsubscribe();
    }, [db, user]);

    React.useEffect(() => {
        const handleClickOutside = (event) => {
            if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                setIsOpen(false);
            }
        };
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
    }, []);

    // Nova função: Marca todas as notificações visíveis como lidas de uma vez
    const markAllAsRead = async () => {
        const unreadNotifs = notifications.filter(n => !(n.readBy || []).includes(user.uid));
        if (unreadNotifs.length === 0) return;

        try {
            const promises = unreadNotifs.map(notif => {
                const docRef = doc(db, "system_notifications", notif.id);
                return updateDoc(docRef, { readBy: arrayUnion(user.uid) });
            });
            await Promise.all(promises);
        } catch (e) {
            console.error("Erro ao marcar todas como lidas", e);
        }
    };

    const unreadCount = notifications.filter(n => {
        return !(n.readBy || []).includes(user.uid);
    }).length;

    const formatTimeAgo = (timestamp) => {
        if(!timestamp) return '';
        const date = timestamp.seconds ? new Date(timestamp.seconds * 1000) : new Date(timestamp);
        const diffInSeconds = Math.floor((new Date() - date) / 1000);
        if (diffInSeconds < 60) return 'Agora';
        if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)}m atrás`;
        if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)}h atrás`;
        return `${Math.floor(diffInSeconds / 86400)}d atrás`;
    };

    return (
        <div className="relative" ref={dropdownRef}>
            {/* Botão do Sino de Notificações */}
            <button 
                onClick={() => {
                    const willOpen = !isOpen;
                    setIsOpen(willOpen);
                    // Quando abrir o menu e tiver não lidas, marca todas como lidas
                    if (willOpen && unreadCount > 0) {
                        markAllAsRead();
                    }
                }} 
                className="relative p-2.5 rounded-full bg-slate-100/5 hover:bg-slate-100/10 dark:bg-[#1a1a1a] dark:hover:bg-[#222] transition-colors border border-transparent dark:border-white/5"
            >
                <Bell className="w-5 h-5 text-white/80 hover:text-white transition-colors" />
                
                {/* Badge Vermelho de Notificações Não Lidas */}
                {unreadCount > 0 && (
                    <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center shadow-lg border border-red-400 z-10 animate-fade-in">
                        {unreadCount > 9 ? '9+' : unreadCount}
                    </span>
                )}
            </button>

            {/* --- INÍCIO DO POPUP DE NOTIFICAÇÕES (CORRIGIDO PARA MOBILE E DESKTOP) --- */}
            {isOpen && (
                <div className="
                    fixed top-[75px] right-2 w-[320px] max-w-[95vw] 
                    md:absolute md:top-auto md:right-0 md:mt-4 md:w-96 md:max-w-none 
                    bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl z-[9999] overflow-hidden animate-fade-in origin-top-right
                ">
                    <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-[#0a0a0f] shrink-0">
                        <h3 className="font-bold text-white">Avisos</h3>
                        {unreadCount > 0 && <span className="text-[10px] uppercase font-bold bg-indigo-500/20 text-indigo-400 px-2 py-1 rounded-md">{unreadCount} Não Lidas</span>}
                    </div>
                    
                    <div className="max-h-[60vh] md:max-h-[400px] overflow-y-auto custom-scrollbar bg-slate-900">
                        {notifications.length === 0 ? (
                            <div className="p-10 text-center flex flex-col items-center justify-center">
                                <div className="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center mb-3"><Bell className="w-5 h-5 text-slate-500" /></div>
                                <p className="text-sm font-bold text-slate-300">Tudo limpo!</p>
                                <p className="text-xs text-slate-500 mt-1">Nenhum aviso no momento.</p>
                            </div>
                        ) : (
                            notifications.map(notif => {
                                const isUnread = !(notif.readBy || []).includes(user.uid);
                                
                                // Processamento flexível para anexos novos e antigos
                                let mediaList = [];
                                if (notif.attachments && notif.attachments.length > 0) {
                                    mediaList = notif.attachments;
                                } else if (notif.attachmentUrl) {
                                    mediaList = [{ url: notif.attachmentUrl, type: notif.attachmentType || 'image', name: 'Anexo' }];
                                }
                                const hasMedia = mediaList.length > 0;
                                
                                return (
                                    <div 
                                        key={notif.id} 
                                        onClick={() => { if(isUnread) markAsRead(notif); }}
                                        className={`p-4 border-b border-slate-800 transition-all cursor-pointer flex flex-col gap-3 ${isUnread ? 'bg-indigo-500/10 hover:bg-indigo-500/20' : 'hover:bg-white/5 opacity-70 hover:opacity-100'}`}
                                    >
                                        <div className="flex gap-4">
                                            <div className="shrink-0 mt-1">
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center ${notif.targetMode === 'all' ? 'bg-indigo-500/20 text-indigo-400' : 'bg-emerald-500/20 text-emerald-400'}`}>
                                                    {notif.targetMode === 'all' ? <Megaphone className="w-4 h-4"/> : <MessageSquare className="w-4 h-4"/>}
                                                </div>
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex justify-between items-start gap-2">
                                                    <h4 className={`text-sm font-bold truncate ${isUnread ? 'text-white' : 'text-slate-300'}`}>{notif.title}</h4>
                                                    {isUnread && <div className="w-2 h-2 rounded-full bg-indigo-500 shrink-0 mt-1.5 shadow-[0_0_8px_rgba(99,102,241,0.8)]"></div>}
                                                </div>
                                                <p className={`text-xs mt-1 line-clamp-2 leading-relaxed ${isUnread ? 'text-slate-300' : 'text-slate-500'}`}>{notif.message}</p>
                                            </div>
                                        </div>

                                        {/* ÁREA DA FOTO / VÍDEO */}
                                        {hasMedia && (
                                            <div className="mt-2 ml-12">
                                                <button 
                                                    onClick={(e) => {
                                                        e.preventDefault();
                                                        e.stopPropagation();
                                                        if (isUnread) markAsRead(notif);
                                                        setSelectedMedia(mediaList[0]);
                                                        setIsOpen(false);
                                                    }}
                                                    className="text-[10px] font-bold text-indigo-400 hover:text-indigo-300 mb-1.5 uppercase tracking-widest flex items-center gap-1 cursor-pointer transition-colors outline-none"
                                                >
                                                    <Camera size={12} /> Veja a Postagem
                                                </button>
                                                
                                                <div className="flex gap-2 overflow-x-auto pb-1 custom-scrollbar">
                                                    {mediaList.map((att, idx) => (
                                                        <div 
                                                            key={idx} 
                                                            onClick={(e) => {
                                                                e.preventDefault();
                                                                e.stopPropagation();
                                                                if (isUnread) markAsRead(notif);
                                                                setSelectedMedia(att);
                                                                setIsOpen(false);
                                                            }} 
                                                            className="relative group shrink-0 w-24 h-16 rounded-lg overflow-hidden border border-slate-700 block cursor-pointer"
                                                        >
                                                            {att.type === 'video' ? (
                                                                <>
                                                                    <video src={fixUrl(att.url)} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" />
                                                                    <div className="absolute inset-0 flex items-center justify-center bg-black/30 group-hover:bg-black/10 transition-colors">
                                                                        <Play size={16} fill="currentColor" className="text-white" />
                                                                    </div>
                                                                </>
                                                            ) : (
                                                                <img src={fixUrl(att.url)} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" alt="Anexo" />
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <span className="text-[9px] font-bold uppercase tracking-widest text-slate-500 mt-1 ml-12 block">{formatTimeAgo(notif.createdAt)}</span>
                                    </div>
                                )
                            })
                        )}
                    </div>
                </div>
            )}
            {/* --- FIM DO POPUP DE NOTIFICAÇÕES --- */}

            {/* --- INÍCIO DO MODAL DE VISUALIZAÇÃO DE MÍDIA (TAMANHO REDUZIDO E CENTRALIZADO) --- */}
            {selectedMedia && (
                <div
                    className="fixed top-0 left-0 w-[100vw] h-[100vh] z-[9999999] flex items-center justify-center bg-black/95 backdrop-blur-md p-4 sm:p-8 animate-fade-in"
                    onClick={(e) => {
                        e.stopPropagation();
                        setSelectedMedia(null);
                    }}
                >
                    {/* Botão Fechar */}
                    <button
                        onClick={(e) => { e.stopPropagation(); setSelectedMedia(null); }}
                        className="absolute top-6 right-6 md:top-8 md:right-8 z-[100000] bg-white/10 hover:bg-red-500 text-white p-3 rounded-full border border-white/20 transition-all shadow-2xl cursor-pointer backdrop-blur-md"
                    >
                        <X size={24} />
                    </button>

                    {/* Container Flex (Tamanho máximo reduzido de 4xl para 3xl) */}
                    <div 
                        className="relative z-10 flex items-center justify-center w-full max-w-3xl"
                        onClick={e => e.stopPropagation()}
                    >
                        {selectedMedia.type === 'video' ? (
                            <video 
                                src={fixUrl(selectedMedia.url)} 
                                controls 
                                autoPlay 
                                /* Aqui está a mágica: max-w-[85vw] e max-h-[60vh] no celular, e max-w-2xl max-h-[70vh] no PC */
                                className="w-auto h-auto max-w-[85vw] md:max-w-2xl max-h-[60vh] md:max-h-[70vh] object-contain rounded-xl shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-white/10 bg-black" 
                            />
                        ) : (
                            <img 
                                src={fixUrl(selectedMedia.url)} 
                                alt="Visualização Completa" 
                                /* Aqui está a mágica: max-w-[85vw] e max-h-[60vh] no celular, e max-w-2xl max-h-[70vh] no PC */
                                className="w-auto h-auto max-w-[85vw] md:max-w-2xl max-h-[60vh] md:max-h-[70vh] object-contain rounded-xl shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-white/10 bg-transparent" 
                            />
                        )}
                    </div>
                </div>
            )}
            
        </div>
    );
};
// =================================================================================
// FIM DO COMPONENTE: SINO DE NOTIFICAÇÕES (ÁREA DO ALUNO)
    
    // =================================================================================
    // COMPONENTE: ABA DE SUPORTE (WHATSAPP CLONE - ATUALIZADO)
    // =================================================================================
    const SupportSection = ({ user, settings }) => {
        const [messages, setMessages] = useState([]);
        const [input, setInput] = useState('');
        
        // Estados de Áudio e Mídia
        const [isRecording, setIsRecording] = useState(false);
        const [isLoadingMic, setIsLoadingMic] = useState(false);
        const [recordingTime, setRecordingTime] = useState(0); 
        const [audioPreview, setAudioPreview] = useState(null);
        const [audioBlob, setAudioBlob] = useState(null);
        const [isSending, setIsSending] = useState(false);
        
        // Estados de UI
        const [showEmojiPicker, setShowEmojiPicker] = useState(false);
        const [showAttachments, setShowAttachments] = useState(false);
        const [msgToDelete, setMsgToDelete] = useState(null);
        
        // 👇 NOVO: Estado do Menu de Contexto Flutuante (estilo WhatsApp) 👇
        const [contextMenuMsgId, setContextMenuMsgId] = useState(null);

        // Estados de Edição
        const [editingMsgId, setEditingMsgId] = useState(null);
        const [editingText, setEditingText] = useState('');

        const messagesEndRef = useRef(null);
        const mediaRecorderRef = useRef(null);
        const audioChunksRef = useRef([]);
        const timerRef = useRef(null);

        // 1. Carregar Mensagens
        useEffect(() => {
            if (!user || !db) return;
            const chatDocRef = doc(db, 'support_chats', user.uid);
            const unsubscribe = onSnapshot(chatDocRef, (docSnap) => {
                if (docSnap.exists()) { 
                    const allMsgs = docSnap.data().messages || [];
                    const visibleMsgs = allMsgs.filter(m => !m.hiddenFor || !m.hiddenFor.includes(user.uid));
                    setMessages(visibleMsgs); 
                    if (docSnap.data().unreadStudent > 0) updateDoc(chatDocRef, { unreadStudent: 0 });
                } else { 
                   setMessages([{ id: 'welcome', text: `Olá ${user.displayName}! Como podemos ajudar hoje?`, sender: 'admin', timestamp: new Date().toISOString() }]); 
                }
            });
            return () => unsubscribe();
        }, [user]);

        // 2. Scroll automático
        useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, audioPreview, isRecording, editingMsgId]);

        // 3. Funções de Edição e Cópia
        const startEditing = (msg) => {
            setEditingMsgId(msg.id);
            setEditingText(msg.text);
            setShowEmojiPicker(false);
        };

        const cancelEditing = () => {
            setEditingMsgId(null);
            setEditingText('');
        };

        const saveEdit = async () => {
            if (!editingText.trim()) return;
            try {
                const chatRef = doc(db, 'support_chats', user.uid);
                const docSnap = await getDoc(chatRef);
                if (docSnap.exists()) {
                    const currentMsgs = docSnap.data().messages;
                    const updatedMsgs = currentMsgs.map(m => {
                        if (m.id === editingMsgId) { return { ...m, text: editingText, edited: true }; }
                        return m;
                    });
                    await updateDoc(chatRef, { messages: updatedMsgs });
                    setEditingMsgId(null);
                    setEditingText('');
                }
            } catch (error) { console.error("Erro ao editar:", error); }
        };

        const handleCopy = (text) => {
            navigator.clipboard.writeText(text);
            setContextMenuMsgId(null);
        };

        // 4. Funções de Deletar
        const handleDeleteForMe = async () => { 
            if (!msgToDelete) return; 
            const chatRef = doc(db, 'support_chats', user.uid); 
            try { 
                const docSnap = await getDoc(chatRef); 
                if (docSnap.exists()) { 
                    const currentMsgs = docSnap.data().messages; 
                    const updatedMsgs = currentMsgs.map(m => m.id === msgToDelete.id ? { ...m, hiddenFor: [...(m.hiddenFor || []), user.uid] } : m); 
                    await updateDoc(chatRef, { messages: updatedMsgs }); 
                } 
                setMsgToDelete(null); 
            } catch (e) { console.error(e); } 
        };

        const handleDeleteForEveryone = async () => { 
            if (!msgToDelete) return; 
            const chatRef = doc(db, 'support_chats', user.uid); 
            try { 
                const docSnap = await getDoc(chatRef); 
                if (docSnap.exists()) { 
                    const currentMsgs = docSnap.data().messages; 
                    const updatedMsgs = currentMsgs.map(m => { 
                        if (m.id === msgToDelete.id) { return { ...m, deleted: true, text: "", fileUrl: null }; } 
                        return m; 
                    }); 
                    await updateDoc(chatRef, { messages: updatedMsgs }); 
                } 
                setMsgToDelete(null); 
            } catch (e) { console.error(e); } 
        };

        // 5. Enviar Mensagem
        const sendMessageToFirebase = async (msgData) => {
             const chatDocRef = doc(db, 'support_chats', user.uid);
             const docSnap = await getDoc(chatDocRef);
             // Adicionado status: delivered: true
             const newMessage = { id: Date.now().toString(), sender: 'student', studentName: user.displayName, timestamp: new Date().toISOString(), read: false, delivered: true, hiddenFor: [], ...msgData };
             const updateData = { studentName: user.displayName, studentEmail: user.email, userAvatar: user.photoURL, lastUpdated: serverTimestamp(), unreadAdmin: (docSnap.exists() ? (docSnap.data().unreadAdmin || 0) + 1 : 1) };
             if (!docSnap.exists()) await setDoc(chatDocRef, { studentId: user.uid, createdAt: serverTimestamp(), messages: [newMessage], unreadStudent: 0, ...updateData });
             else await updateDoc(chatDocRef, { messages: arrayUnion(newMessage), ...updateData });
        };
        
        const handleSendText = async (e) => { 
            e?.preventDefault(); 
            if (!input.trim()) return; 
            await sendMessageToFirebase({ text: input, type: 'text' }); 
            setInput(''); 
            setShowEmojiPicker(false); 
        };
        
        const handleFileUpload = async (file) => {
             if (!file) return; 
             setIsSending(true); setShowAttachments(false); setAudioPreview(null); setAudioBlob(null);
             try {
                const data = await uploadToCustomDrive(file, 'Chat/Aluno/');
                let type = 'file'; 
                if (file.type.includes('image')) type = 'image'; 
                else if (file.type.includes('video')) type = 'video'; 
                else if (file.type.includes('audio') || file.name.endsWith('.webm')) type = 'audio';
                
                await sendMessageToFirebase({ text: type === 'image' ? '📷 Imagem' : (type === 'audio' ? '🎤 Áudio' : file.name), fileUrl: data.url, fileType: type, fileName: data.name });
             } catch (e) { alert("Erro envio: " + e.message); } finally { setIsSending(false); }
        };

        const startRecording = async () => {
            if (!navigator.mediaDevices) return alert("Sem suporte.");
            setIsLoadingMic(true);
            try { 
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
                let options = { mimeType: 'audio/webm' };
                if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) { options = { mimeType: 'audio/webm;codecs=opus' }; }
                const recorder = new MediaRecorder(stream, options); 
                audioChunksRef.current = []; 
                recorder.ondataavailable = e => { if (e.data.size > 0) audioChunksRef.current.push(e.data); }; 
                recorder.onstop = () => { 
                    const blob = new Blob(audioChunksRef.current, { type: 'audio/webm' }); 
                    if (blob.size > 100) { setAudioPreview(URL.createObjectURL(blob)); setAudioBlob(blob); } 
                    stream.getTracks().forEach(t => t.stop()); 
                    clearInterval(timerRef.current); setRecordingTime(0);
                }; 
                recorder.start(); mediaRecorderRef.current = recorder; setIsRecording(true); setIsLoadingMic(false);
                setRecordingTime(0); timerRef.current = setInterval(() => { setRecordingTime(prev => prev + 1); }, 1000);
            } catch (e) { alert("Erro mic."); setIsLoadingMic(false); setIsRecording(false); }
        };

        const stopRecording = () => { if (mediaRecorderRef.current?.state === "recording") mediaRecorderRef.current.stop(); setIsRecording(false); clearInterval(timerRef.current); };
        const cancelAudio = () => { setAudioPreview(null); setAudioBlob(null); setRecordingTime(0); };
        const sendAudio = () => { if (audioBlob) handleFileUpload(new File([audioBlob], `voice_${Date.now()}.webm`, { type: 'audio/webm' })); };
        
        const formatDuration = (sec) => { const m = Math.floor(sec / 60); const s = sec % 60; return `${m}:${s < 10 ? '0' : ''}${s}`; };
        const addEmoji = (emoji) => setInput(prev => prev + emoji);
        const quickEmojis = ["😀", "😂", "🥰", "👍", "🙏", "✅", "🔥", "🤔"];
        
        return (
            <div className="max-w-4xl mx-auto h-[60vh] md:h-[70vh] min-h-[450px] max-h-[800px] mt-2 md:mt-24 lg:mt-32 mb-4 md:mb-12 animate-fade-in flex flex-col relative drop-shadow-2xl font-sans" onClick={() => setContextMenuMsgId(null)}>
                
                {/* MODAL DE CONFIRMAÇÃO DE EXCLUSÃO */}
                {msgToDelete && (
                    <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4 animate-fade-in">
                        <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-2xl w-full max-w-sm border border-slate-200 dark:border-slate-700">
                            <h3 className="text-lg font-bold mb-4 text-slate-800 dark:text-white text-center">Apagar mensagem?</h3>
                            <div className="flex flex-col gap-2">
                                {msgToDelete.sender === 'student' && (
                                    <button onClick={handleDeleteForEveryone} className="w-full py-3 rounded-xl bg-red-100 text-red-600 font-bold hover:bg-red-200 transition-colors text-sm">Apagar para todos</button>
                                )}
                                <button onClick={handleDeleteForMe} className="w-full py-3 rounded-xl bg-blue-50 text-blue-700 font-bold hover:bg-blue-100 transition-colors text-sm">Apagar para mim</button>
                                <button onClick={() => setMsgToDelete(null)} className="w-full py-3 rounded-xl border border-slate-200 text-slate-500 font-bold hover:bg-slate-50 transition-colors mt-2 text-sm">Cancelar</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* HEADER DO CHAT WHATSAPP CLONE */}
                <div className="bg-[#00a884] dark:bg-[#1f2c34] p-4 md:p-5 rounded-t-2xl shadow-sm flex items-center gap-3 shrink-0 z-20">
                    <div className="w-10 h-10 bg-white/20 text-white rounded-full flex items-center justify-center shrink-0"><MessageCircle size={22} /></div>
                    <div>
                        <h2 className="text-lg font-bold text-white leading-tight">Suporte Técnico</h2>
                        <p className="text-xs text-white/80">Online agora</p>
                    </div>
                </div>
                
                {/* CORPO DO CHAT */}
                <div className="flex-1 bg-[#efeae2] dark:bg-[#0b141a] overflow-y-auto p-3 md:p-6 space-y-3 relative custom-scrollbar z-10">
                    <div className="absolute inset-0 opacity-10 pointer-events-none" style={{backgroundImage: "url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')", backgroundRepeat: 'repeat', backgroundSize: '400px'}}></div>
                    
                    {messages.map((msg, i) => {
                        if (msg.deleted) return null;

                        const isMe = msg.sender === 'student';
                        const isEditingThis = editingMsgId === msg.id;

                        return (
                            <div key={i} className={`flex flex-col max-w-[85%] sm:max-w-[75%] ${isMe ? 'self-end items-end ml-auto' : 'self-start items-start'} relative z-10 group`}>
                                <div className={`p-2 rounded-2xl text-sm shadow-[0_1px_1px_rgba(0,0,0,0.1)] min-w-[120px] relative ${isMe ? 'bg-[#d9fdd3] dark:bg-[#005c4b] text-slate-900 dark:text-white rounded-tr-none' : 'bg-white dark:bg-[#202c33] text-slate-800 dark:text-slate-200 rounded-tl-none'}`}>
                                    
                                    {/* Botão de Opções do WhatsApp (Seta pra Baixo) */}
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); setContextMenuMsgId(contextMenuMsgId === msg.id ? null : msg.id); }}
                                        className={`absolute top-1 right-2 p-1 text-slate-400 hover:text-slate-600 dark:text-white/50 dark:hover:text-white transition-opacity z-20 ${contextMenuMsgId === msg.id ? 'opacity-100 bg-black/5 dark:bg-white/5 rounded-full' : 'opacity-0 group-hover:opacity-100'}`}
                                    >
                                        <ChevronDown size={18} />
                                    </button>

                                    {/* Context Menu Flutuante Estilo WhatsApp */}
                                    {contextMenuMsgId === msg.id && (
                                        <div className={`absolute top-8 ${isMe ? 'right-0' : 'left-0'} w-40 bg-white dark:bg-[#233138] rounded-xl shadow-2xl border border-slate-200 dark:border-white/5 py-2 z-[999] animate-fade-in`}>
                                            <button onClick={(e) => { e.stopPropagation(); setInput(`> Respondendo:\n${msg.text || 'Arquivo'}\n\n`); setContextMenuMsgId(null); }} className="w-full text-left px-4 py-2.5 hover:bg-slate-100 dark:hover:bg-[#111b21] text-sm flex items-center gap-3 text-slate-700 dark:text-slate-200"><CornerUpLeft size={16}/> Responder</button>
                                            {msg.text && <button onClick={(e) => { e.stopPropagation(); handleCopy(msg.text); }} className="w-full text-left px-4 py-2.5 hover:bg-slate-100 dark:hover:bg-[#111b21] text-sm flex items-center gap-3 text-slate-700 dark:text-slate-200"><Copy size={16}/> Copiar</button>}
                                            {isMe && !msg.fileUrl && <button onClick={(e) => { e.stopPropagation(); startEditing(msg); setContextMenuMsgId(null); }} className="w-full text-left px-4 py-2.5 hover:bg-slate-100 dark:hover:bg-[#111b21] text-sm flex items-center gap-3 text-slate-700 dark:text-slate-200"><Edit size={16}/> Editar</button>}
                                            {isMe && <button onClick={(e) => { e.stopPropagation(); setMsgToDelete(msg); setContextMenuMsgId(null); }} className="w-full text-left px-4 py-2.5 hover:bg-slate-100 dark:hover:bg-[#111b21] text-sm flex items-center gap-3 text-red-500"><Trash2 size={16}/> Apagar</button>}
                                        </div>
                                    )}

                                    <div className="pr-6 pl-1 pt-1 pb-0">
                                        {isEditingThis ? (
                                            <div className="flex flex-col gap-2 min-w-[200px]">
                                                <input 
                                                    value={editingText} 
                                                    onChange={(e) => setEditingText(e.target.value)} 
                                                    className="w-full px-2 py-1.5 rounded border border-blue-400 text-slate-900 text-sm focus:outline-none bg-white"
                                                    autoFocus
                                                    onKeyDown={(e) => e.key === 'Enter' && saveEdit()}
                                                />
                                                <div className="flex justify-end gap-2 mt-1">
                                                    <button onClick={cancelEditing} className="text-xs text-red-500 font-bold px-2">Cancelar</button>
                                                    <button onClick={saveEdit} className="bg-green-500 text-white p-1 rounded-full"><CheckCircle size={14}/></button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col">
                                                {msg.fileUrl && (
                                                    <div className="mb-2 mt-1">
                                                        {msg.fileType === 'audio' ? (
                                                            <div className="min-w-[200px]"><MiniAudioPlayer src={msg.fileUrl} isMe={isMe} avatarUrl={isMe ? user.photoURL : 'https://ui-avatars.com/api/?name=Suporte&background=00a884&color=fff'} /></div>
                                                        ) : msg.fileType === 'image' ? (
                                                            <a href={msg.fileUrl} target="_blank" rel="noopener noreferrer">
                                                                <img src={msg.fileUrl} className="w-full h-auto max-h-64 object-cover rounded-lg" alt="Imagem"/>
                                                            </a>
                                                        ) : (
                                                            <a href={msg.fileUrl} target="_blank" rel="noopener noreferrer" className={`flex items-center gap-3 p-3 rounded-lg ${isMe ? 'bg-black/10' : 'bg-slate-100 dark:bg-black/20'}`}>
                                                                <div className="bg-white/50 dark:bg-white/10 p-2 rounded-full"><FileText size={20} /></div>
                                                                <div className="overflow-hidden">
                                                                    <p className="text-xs font-bold truncate">{msg.fileName || 'Documento'}</p>
                                                                    <p className="text-[10px] opacity-70 uppercase mt-0.5">{msg.fileType}</p>
                                                                </div>
                                                            </a>
                                                        )}
                                                    </div>
                                                )}
                                                {msg.text && <p className="whitespace-pre-wrap leading-relaxed text-[15px]">{msg.text}</p>}
                                            </div>
                                        )}
                                    </div>

                                    {/* Metadados e Vzinhos */}
                                    <div className="flex items-center justify-end gap-1 mt-1 opacity-70 select-none pr-1">
                                        {msg.edited && <span className="text-[9px] italic">editado</span>}
                                        <span className="text-[10px]">
                                            {msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}
                                        </span>
                                        {isMe && (
                                            <span className="ml-0.5">
                                                {msg.read ? (
                                                    <CheckCheck size={14} className="text-blue-500" />
                                                ) : msg.delivered ? (
                                                    <CheckCheck size={14} className="text-gray-500 dark:text-gray-400" />
                                                ) : (
                                                    <Check size={14} className="text-gray-500 dark:text-gray-400" />
                                                )}
                                            </span>
                                        )}
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                    <div ref={messagesEndRef} />
                </div>
                
                {/* FOOTER DE INPUT */}
                <div className="bg-[#f0f2f5] dark:bg-[#202c33] px-3 py-3 flex items-end gap-2 rounded-b-2xl shadow-sm z-20 shrink-0">
                    {isLoadingMic ? (
                        <div className="flex-1 flex items-center justify-center gap-2 text-slate-500 animate-pulse text-sm py-2"><Mic size={18} /> <span>Iniciando gravação...</span></div>
                    ) : audioPreview ? (
                        <div className="flex items-center gap-3 w-full bg-white dark:bg-[#2a3942] p-2 rounded-2xl animate-fade-in">
                            <button onClick={cancelAudio} className="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-full transition-colors"><Trash2 size={20} /></button>
                            <div className="flex-1"><MiniAudioPlayer src={audioPreview} isMe={true} avatarUrl={user?.photoURL} /></div>
                            <button onClick={sendAudio} disabled={isSending} className="p-3 bg-[#00a884] text-white rounded-full shadow-md transition-transform hover:scale-105 active:scale-95">{isSending ? '...' : <Send size={18} className="ml-0.5"/>}</button>
                        </div>
                    ) : (
                        <>
                            {!isRecording ? (
                                <>
                                    <div className="relative shrink-0 flex gap-1">
                                        <button onClick={() => setShowEmojiPicker(!showEmojiPicker)} className="p-2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 rounded-full"><Smile size={24}/></button>
                                        <button onClick={() => { setShowAttachments(!showAttachments); setShowEmojiPicker(false); }} className="p-2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 rounded-full"><Paperclip size={22} className="-rotate-45"/></button>
                                        
                                        {/* Menus Flutuantes de Anexo */}
                                        {showAttachments && <div className="absolute bottom-full left-0 mb-3 bg-white dark:bg-[#233138] p-2 rounded-xl shadow-xl flex flex-col gap-2 w-40 animate-fade-in-up z-50">
                                            <label className="cursor-pointer flex items-center gap-3 p-3 hover:bg-slate-100 dark:hover:bg-white/5 rounded-lg text-sm text-slate-700 dark:text-slate-200"><div className="bg-purple-100 text-purple-600 p-2 rounded-full"><Camera size={18}/></div> Galeria <input type="file" className="hidden" accept="image/*,video/*" onChange={(e) => handleFileUpload(e.target.files[0])} /></label>
                                            <label className="cursor-pointer flex items-center gap-3 p-3 hover:bg-slate-100 dark:hover:bg-white/5 rounded-lg text-sm text-slate-700 dark:text-slate-200"><div className="bg-blue-100 text-blue-600 p-2 rounded-full"><FileText size={18}/></div> Documento <input type="file" className="hidden" accept=".pdf,.doc,.docx" onChange={(e) => handleFileUpload(e.target.files[0])} /></label>
                                        </div>}
                                        
                                        {showEmojiPicker && <div className="absolute bottom-full left-0 mb-3 bg-white dark:bg-[#233138] p-3 rounded-xl shadow-xl grid grid-cols-4 gap-2 w-64 animate-fade-in-up z-50">
                                            {quickEmojis.map(e => <button key={e} onClick={() => { addEmoji(e); setShowEmojiPicker(false); }} className="text-2xl hover:bg-slate-100 dark:hover:bg-white/5 rounded p-1 transition-colors">{e}</button>)}
                                        </div>}
                                    </div>

                                    <form onSubmit={handleSendText} className="flex-1 bg-white dark:bg-[#2a3942] rounded-full flex items-center px-4 shadow-sm min-h-[44px]">
                                        <input value={input} onChange={(e) => setInput(e.target.value)} className="w-full py-2 bg-transparent border-none focus:ring-0 text-sm dark:text-white placeholder-slate-400 outline-none" placeholder="Mensagem" />
                                    </form>

                                    <div className="shrink-0">
                                        {input.trim() ? (
                                            <button onClick={handleSendText} disabled={isSending} className="w-11 h-11 bg-[#00a884] text-white rounded-full shadow-md flex items-center justify-center transition-transform hover:scale-105 active:scale-95 disabled:opacity-50"><Send size={20} className="ml-1" /></button>
                                        ) : (
                                            <button onClick={startRecording} className="w-11 h-11 bg-[#00a884] text-white rounded-full shadow-md flex items-center justify-center transition-transform hover:scale-105 active:scale-95"><Mic size={22} /></button>
                                        )}
                                    </div>
                                </>
                            ) : (
                                <div className="flex-1 bg-white dark:bg-[#2a3942] rounded-full flex items-center justify-between p-1.5 shadow-sm animate-fade-in pl-4 pr-1">
                                    <div className="flex items-center gap-3 text-red-500">
                                        <Mic size={18} className="animate-pulse" />
                                        <span className="text-sm font-mono text-slate-800 dark:text-white w-12">{formatDuration(recordingTime)}</span>
                                        <div className="text-xs text-slate-400">Gravando...</div>
                                    </div>
                                    <button onClick={stopRecording} className="w-10 h-10 bg-red-500 text-white rounded-full flex items-center justify-center hover:bg-red-600 transition-colors shadow-md"><Square size={14} fill="currentColor" /></button>
                                </div>
                            )}
                        </>
                    )}
                </div>
            </div>
        );
    };
    // =================================================================================
    // FIM DO COMPONENTE: ABA DE SUPORTE
    // =================================================================================

    

   // =================================================================================
    // MOTOR DE ANIMAÇÃO DE SCROLL (REVEAL) - CORPORATIVO PREMIUM
    // =================================================================================
    const Reveal = ({ children, delay = 0, direction = 'up' }) => {
        const [isVisible, setIsVisible] = useState(false);
        const ref = useRef(null);

        useEffect(() => {
            const observer = new IntersectionObserver(
                ([entry]) => {
                    if (entry.isIntersecting) {
                        setIsVisible(true);
                        observer.unobserve(entry.target); // Anima apenas uma vez
                    }
                },
                { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
            );

            if (ref.current) observer.observe(ref.current);
            return () => { if (ref.current) observer.unobserve(ref.current); };
        }, []);

        const getTransform = () => {
            if (direction === 'up') return 'translateY(30px)';
            if (direction === 'down') return 'translateY(-30px)';
            return 'translateY(0)';
        };

        return (
            <div 
                ref={ref}
                style={{
                    opacity: isVisible ? 1 : 0,
                    transform: isVisible ? 'translateY(0)' : getTransform(),
                    transition: `all 0.8s cubic-bezier(0.17, 0.55, 0.55, 1) ${delay}ms`
                }}
            >
                {children}
            </div>
        );
    };
   

// =================================================================================
    // COMPONENTE AUXILIAR: BACKGROUND VIDEO FORÇADO (Bypass Autoplay Block do Navegador)
    // =================================================================================
    const BackgroundVideo = ({ src, className, style, innerRef }) => {
        const videoRef = useRef(null);

        useEffect(() => {
            if (videoRef.current) {
                // Força o mudo direto no motor do navegador antes do play
                videoRef.current.defaultMuted = true;
                videoRef.current.muted = true;
                videoRef.current.play().catch(e => console.warn("Autoplay bloqueado pelo navegador:", e));
            }
        }, [src]);

        return (
            <video
                ref={(el) => {
                    videoRef.current = el;
                    if (innerRef) innerRef.current = el; // Repassa a ref pro efeito Parallax
                }}
                src={src}
                autoPlay
                loop
                muted
                playsInline
                className={className}
                style={style}
            />
        );
    };


// --- COMPONENTE LANDING PAGE (APENAS TEXTOS DESTAQUE E IMAGENS) ---
    const PublicLanding = ({ onLoginClick, settings }) => {
 
        const title = settings?.heroTitle || "Desperte a Sua Verdadeira Essência";
        const subtitle = settings?.heroSubtitle || "Uma egrégora de transformação profunda. Eleve sua consciência, cure suas emoções e acesse o seu potencial infinito através de metodologias ancestrais e contemporâneas.";
        const btnText = settings?.heroButtonText || "Iniciar Minha Jornada";
        const siteName = settings?.siteName || "Instituto Essência";
        
        const heroBg = settings?.heroBgUrl || settings?.heroBackground || "";
        const secondaryBg = settings?.heroSecondaryBgUrl || heroBg; 
        const tertiaryBg = settings?.heroTertiaryBgUrl || secondaryBg; 

        const logo = settings?.siteLogoUrl || settings?.logoUrl;
        const footerLogo = settings?.siteFooterLogoUrl || logo; 

        const opacityMain = settings?.heroOverlayOpacity !== undefined ? (settings.heroOverlayOpacity / 100) : 0.4;

        const isVideo = (url) => {
            if (!url) return false;
            return !!url.toLowerCase().match(/\.(mp4|webm|ogg|mov)(?:\?.*)?$/);
        };
        
        const wrapperRef1 = useRef(null);
        const bgRef1 = useRef(null);
        const wrapperRef2 = useRef(null);
        const bgRef2 = useRef(null);

        useEffect(() => {
            let ticking = false;
            const handleScroll = () => {
                const windowHeight = window.innerHeight;
                if (wrapperRef1.current && bgRef1.current) {
                    const rect1 = wrapperRef1.current.getBoundingClientRect();
                    let progress1 = 1 - (rect1.top / windowHeight);
                    if (progress1 < 0) progress1 = 0;
                    if (progress1 > 1) progress1 = 1;
                    bgRef1.current.style.opacity = progress1 * 0.45;      
                    bgRef1.current.style.transform = `scale(${1.1 - (0.1 * progress1)})`;
                    bgRef1.current.style.filter = `blur(${10 - (10 * progress1)}px)`;
                }
                if (wrapperRef2.current && bgRef2.current) {
                    const rect2 = wrapperRef2.current.getBoundingClientRect();
                    let progress2 = 1 - (rect2.top / windowHeight);
                    if (progress2 < 0) progress2 = 0;
                    if (progress2 > 1) progress2 = 1;
                    bgRef2.current.style.opacity = progress2 * 0.45;      
                    bgRef2.current.style.transform = `scale(${1.1 - (0.1 * progress2)})`;
                    bgRef2.current.style.filter = `blur(${10 - (10 * progress2)}px)`;
                }
            };
            window.addEventListener('scroll', () => {
                if (!ticking) { window.requestAnimationFrame(() => { handleScroll(); ticking = false; }); ticking = true; }
            });
            handleScroll(); 
            return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        // 👇 ADICIONADO: LÓGICA DO CARROSSEL DE VÍDEOS INTEGRADA AO REACT 👇
        useEffect(() => {
            const container = document.getElementById('meuscursos-carousel-container');
            const video = document.getElementById('carousel-video-player');
            
            if (!container || !video) return;

            const playBtn = document.getElementById('carousel-play-btn');
            const muteBtn = document.getElementById('carousel-mute-btn');
            const prevBtn = document.getElementById('carousel-prev-btn');
            const nextBtn = document.getElementById('carousel-next-btn');
            const progressBar = document.getElementById('carousel-progress-bar');
            const progressBg = document.getElementById('carousel-progress-bg');
            const timeDisplay = document.getElementById('carousel-time');
            const counterDisplay = document.getElementById('carousel-counter');

            const iconPlay = document.getElementById('icon-play');
            const iconPause = document.getElementById('icon-pause');
            const iconVolOn = document.getElementById('icon-vol-on');
            const iconVolOff = document.getElementById('icon-vol-off');

            let currentIndex = 0;
            // Puxa o array de vídeos, ou usa Vídeos Estéticos de Demonstração se o admin não cadastrou nenhum
            let videosData = (settings?.landingVideos && settings.landingVideos.length > 0) 
                ? settings.landingVideos 
                : [
                    { url: 'https://cdn.pixabay.com/video/2023/10/22/186005-876823906_large.mp4', duration: 12 },
                    { url: 'https://cdn.pixabay.com/video/2020/05/25/40134-424750130_large.mp4', duration: 15 }
                  ]; 

            function loadVideo(index) {
                const currentData = videosData[index];
                if (!currentData || !currentData.url) return;
                
                video.src = currentData.url;
                if (counterDisplay) counterDisplay.innerText = `${index + 1}/${videosData.length}`;
                
                // Força o vídeo a tocar no mudo (Bypass do bloqueio do Google Chrome)
                video.muted = true;
                if (iconVolOn) iconVolOn.classList.add('hidden');
                if (iconVolOff) iconVolOff.classList.remove('hidden');

                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => updatePlayPauseIcons()).catch((err) => console.log('Autoplay bloqueado', err));
                } else {
                    updatePlayPauseIcons();
                }
            }

            function updatePlayPauseIcons() {
                if (!iconPlay || !iconPause) return;
                if (video.paused) {
                    iconPlay.classList.remove('hidden');
                    iconPause.classList.add('hidden');
                } else {
                    iconPlay.classList.add('hidden');
                    iconPause.classList.remove('hidden');
                }
            }

            if (playBtn) playBtn.onclick = () => { video.paused ? video.play() : video.pause(); updatePlayPauseIcons(); };
            video.onclick = () => { video.paused ? video.play() : video.pause(); updatePlayPauseIcons(); };
            
            if (muteBtn) {
                muteBtn.onclick = () => {
                    video.muted = !video.muted;
                    if (video.muted) { iconVolOn.classList.add('hidden'); iconVolOff.classList.remove('hidden'); } 
                    else { iconVolOn.classList.remove('hidden'); iconVolOff.classList.add('hidden'); }
                };
            }

            function nextVideo() { currentIndex = (currentIndex + 1) % videosData.length; loadVideo(currentIndex); }
            function prevVideo() { currentIndex = (currentIndex - 1 + videosData.length) % videosData.length; loadVideo(currentIndex); }

            if (videosData.length > 1) {
                if(nextBtn) { nextBtn.classList.remove('hidden'); nextBtn.onclick = nextVideo; }
                if(prevBtn) { prevBtn.classList.remove('hidden'); prevBtn.onclick = prevVideo; }
            } else {
                if(nextBtn) nextBtn.classList.add('hidden');
                if(prevBtn) prevBtn.classList.add('hidden');
            }

            function formatTime(seconds) {
                let m = Math.floor(seconds / 60); let s = Math.floor(seconds % 60);
                return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            }

            video.ontimeupdate = () => {
                if (!videosData[currentIndex] || isNaN(video.duration)) return;
                const timeLimit = videosData[currentIndex].duration || video.duration;
                const currentTime = video.currentTime;
                
                if (progressBar) progressBar.style.width = `${(currentTime / timeLimit) * 100}%`;
                if (timeDisplay) timeDisplay.innerText = `${formatTime(currentTime)} / ${formatTime(timeLimit)}`;

                if (currentTime >= timeLimit) nextVideo();
            };

            if (progressBg) {
                progressBg.onclick = (e) => {
                    const timeLimit = videosData[currentIndex].duration || video.duration;
                    const rect = progressBg.getBoundingClientRect();
                    const pos = (e.clientX - rect.left) / progressBg.offsetWidth;
                    video.currentTime = pos * timeLimit;
                };
            }

            // Ativa o primeiro vídeo da fila
            loadVideo(0);

        }, [settings?.landingVideos]); 

        return (
            <div className="min-h-screen bg-siteBg-dark font-sans selection:bg-primary selection:text-white relative transition-colors duration-500">

                {/* NAVBAR */}
                <nav className="fixed top-0 w-full z-50 bg-siteBg-dark/40 backdrop-blur-2xl border-b border-white/5 transition-all duration-500">
                    <div className="max-w-[90rem] mx-auto px-4 md:px-12 h-16 md:h-24 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            {logo && <img src={logo} alt="Logo" className="h-8 md:h-12 w-auto object-contain opacity-90 rounded-md" />}
                            <div className="text-lg md:text-2xl tracking-[0.2em] uppercase ml-1" style={{ color: settings?.colorTitleDark || 'var(--title-dark)', fontFamily: settings?.siteNameFont ? `"${settings.siteNameFont}", sans-serif` : '"Montserrat", sans-serif', fontSize: settings?.siteNameSize || 'inherit', fontWeight: '500' }}>
                                {siteName}
                            </div>
                        </div>
                        <div className="flex items-center gap-4 md:gap-8">
                            <button onClick={onLoginClick} className="hidden md:block text-xs font-medium tracking-[0.15em] uppercase opacity-70 hover:opacity-100 transition-opacity text-white">
                                Já sou membro
                            </button>
                            <button onClick={onLoginClick} className="bg-primary text-white px-5 md:px-8 py-2 md:py-3.5 rounded-none font-bold tracking-[0.1em] uppercase text-[10px] md:text-xs transition-all duration-500 hover:bg-primary-hover shadow-lg shadow-primary/30 border border-white/10 flex items-center gap-2">
                                Acessar <ArrowRight size={14} className="hidden sm:block" />
                            </button>
                        </div>
                    </div>
                </nav>

                {/* HERO SECTION COM DESTAQUE NA COR DA MARCA */}
                <header className="relative w-full h-[70vh] md:h-[80vh] flex items-center justify-center text-center overflow-hidden z-20 bg-siteBg-dark transition-colors duration-500">
                    <div className="absolute inset-0 z-0 overflow-hidden">
                        {isVideo(heroBg) ? (
                            <BackgroundVideo src={heroBg} className="w-full h-full object-cover object-[center_20%]" />
                        ) : (
                            <div className="w-full h-full" style={{ backgroundImage: `url(${heroBg})`, backgroundSize: 'cover', backgroundPosition: 'center 20%', backgroundRepeat: 'no-repeat' }}></div>
                        )}
                    </div>
                    <div className="absolute inset-0 z-10 pointer-events-none" style={{ backgroundColor: `rgba(0,0,0,${opacityMain})` }}></div>
                    <div className="absolute -bottom-1 left-0 w-full h-[150px] md:h-[250px] z-20 pointer-events-none" style={{ background: 'linear-gradient(to bottom, transparent 0%, var(--background-dark) 80%, var(--background-dark) 100%)' }}></div>

                    <div className="relative z-30 max-w-5xl mx-auto px-4 md:px-6 flex flex-col items-center w-full mt-10">
                        <Reveal delay={100}>
                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-primary to-purple-400 tracking-[0.2em] md:tracking-[0.3em] text-[10px] md:text-sm font-black uppercase mb-4 md:mb-6 block drop-shadow-lg">
                                Elevando o Padrão da Consciência
                            </span>
                        </Reveal>
                        <Reveal delay={200}>
                            <h1 className="text-4xl sm:text-5xl md:text-6xl lg:text-[6rem] font-black tracking-tighter mb-4 md:mb-6 leading-[1.1] drop-shadow-2xl text-transparent bg-clip-text bg-gradient-to-r from-white via-indigo-100 to-slate-400" style={{ fontFamily: settings?.heroTitleFont ? `"${settings.heroTitleFont}", sans-serif` : '"Montserrat", sans-serif' }}>
                                {title}
                            </h1>
                        </Reveal>
                        <Reveal delay={400}>
                            <p className="text-sm sm:text-base md:text-xl font-light max-w-2xl mx-auto mb-8 md:mb-10 leading-relaxed tracking-wide px-2 drop-shadow-md text-slate-300" style={{ fontFamily: settings?.heroSubtitleFont ? `"${settings.heroSubtitleFont}", sans-serif` : '"Inter", sans-serif' }}>
                                {subtitle}
                            </p>
                        </Reveal>
                        <Reveal delay={600}>
                            <div className="flex flex-col items-center gap-4 md:gap-6 w-full px-4 sm:w-auto">
                                <button onClick={onLoginClick} className="w-full sm:w-auto px-10 md:px-14 py-4 md:py-5 bg-gradient-to-r from-primary to-purple-600 hover:from-primary-hover hover:to-purple-700 text-white font-black uppercase tracking-[0.1em] md:tracking-[0.15em] transition-all duration-300 hover:scale-105 shadow-[0_0_30px_rgba(79,70,229,0.4)] text-xs md:text-sm rounded-md border border-white/10">
                                    {btnText}
                                </button>
                            </div>
                        </Reveal>
                    </div>
                </header>

                <div ref={wrapperRef1} className="relative z-10 bg-siteBg-dark transition-colors duration-500">
                    <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">
                        <div className="sticky top-0 w-full h-screen overflow-hidden bg-siteBg-dark">
                            {isVideo(secondaryBg) ? (
                                <BackgroundVideo innerRef={bgRef1} src={secondaryBg} className="w-full h-full object-cover" style={{ opacity: 0, transform: 'scale(1.1)', filter: 'blur(10px)', willChange: 'opacity, transform, filter' }} />
                            ) : (
                                <img ref={bgRef1} src={secondaryBg} className="w-full h-full object-cover" alt="Fundo Secundário" style={{ opacity: 0, transform: 'scale(1.1)', filter: 'blur(10px)', willChange: 'opacity, transform, filter' }}/>
                            )}

    // --- TELA DE LOGIN / CADASTRO (CORRIGIDA - OTIMIZADA PARA CELULAR) ---
    // 👇 NOVO CÓDIGO AQUI 👇
    const AuthScreen = ({ onLogin, onBack, settings }) => {
      const [isLogin, setIsLogin] = useState(true); 
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [isLoaded, setIsLoaded] = useState(false);
      
      const logoUrl = settings?.siteLogoUrl;
      const bgImage = settings?.siteLoginBgUrl;

      // 👇 VALIDADOR DE VÍDEO AQUI 👇
      const isVideo = (url) => {
          if (!url) return false;
          return !!url.toLowerCase().match(/\.(mp4|webm|ogg|mov)(?:\?.*)?$/);
      };

      const [formData, setFormData] = useState({ 
          email: '', password: '', name: ''
      });
      const [showLoginPassword, setShowLoginPassword] = useState(false);

      useEffect(() => {
          const timer = setTimeout(() => setIsLoaded(true), 50); 
          return () => clearTimeout(timer);
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true); setError('');
        if (!auth) {
            setError("Erro de conexão. Verifique sua internet.");
            setLoading(false); return;
        }

        try {
          if (isLogin) {
            await signInWithEmailAndPassword(auth, formData.email, formData.password);
          } else {
             if (!formData.name) throw new Error("Preencha seu nome completo.");
             
             const cred = await createUserWithEmailAndPassword(auth, formData.email, formData.password);
             await updateProfile(cred.user, { displayName: formData.name });
             
             if (db) {
                 await setDoc(doc(db, "users", cred.user.uid), { 
                     name: formData.name, 
                     email: cred.user.email, 
                     role: 'student', 
                     createdAt: serverTimestamp(), 
                     profileComplete: false 
                 });
             }
          }
        } catch (err) { 
            let msg = err.message || "Erro desconhecido";
            const errCode = err.code || "";
            if(errCode === "auth/invalid-credential" || errCode === "auth/user-not-found" || errCode === "auth/wrong-password") {
                msg = "E-mail ou senha incorretos.";
            } else if(errCode === "auth/email-already-in-use") {
                msg = "Este e-mail já possui cadastro.";
            } else if(errCode === "auth/weak-password") {
                msg = "A senha deve ter pelo menos 6 caracteres.";
            }
            setError(msg); setLoading(false); 
        }
      };

      const handleGoogleLogin = async () => {
        if (!auth) return setError("Erro de conexão.");
        setLoading(true); setError('');
        const provider = new GoogleAuthProvider();
        try {
          const result = await signInWithPopup(auth, provider);
          if (db) {
              const docSnap = await getDoc(doc(db, "users", result.user.uid));
              if (!docSnap.exists()) {
                  await setDoc(doc(db, "users", result.user.uid), { 
                      name: result.user.displayName, email: result.user.email, role: 'student', 
                      createdAt: serverTimestamp(), photoBase64: result.user.photoURL, profileComplete: false 
                  });
              }
          }
        } catch (err) { setError("Erro ao entrar com Google."); setLoading(false); }
      };

      return (
        <div className={`min-h-screen flex items-center justify-center p-4 bg-siteBg-light dark:bg-siteBg-dark relative overflow-hidden font-sans transition-colors duration-300 ${isLoaded ? 'is-loaded' : ''}`}>
          
          {bgImage ? (
              <div className="absolute inset-0 z-0 login-bg-anim">
                  {isVideo(bgImage) ? (
                      <BackgroundVideo src={bgImage} className="w-full h-full object-cover opacity-100" />
                  ) : (
                      <img src={bgImage} className="w-full h-full object-cover opacity-100" alt="Background" />
                  )}
                  <div className="absolute inset-0 bg-slate-900/70 backdrop-blur-sm"></div>
              </div>
          ) : (
              <div className="absolute inset-0 z-0 bg-siteBg-light dark:bg-siteBg-dark login-bg-anim"></div>
          )}

          {/* AQUI FOI FEITA A REDUÇÃO DE TAMANHO (w-[92%] max-w-[340px] sm:max-w-sm) */}
          <div className={`relative z-10 bg-white dark:bg-slate-900 w-[92%] max-w-[340px] sm:max-w-sm rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.2)] overflow-hidden transition-all duration-500 border border-slate-200 dark:border-slate-800 login-card-anim`}>
            
            <div className="px-6 pt-8 pb-2 text-center stagger-item delay-1">
                {logoUrl ? (
                    <img src={logoUrl} alt="Logo" className="h-10 mx-auto mb-5 object-contain" />
                ) : (
                    <div className="w-12 h-12 bg-primary rounded-lg mx-auto flex items-center justify-center font-bold text-xl text-white mb-5 shadow-sm">
                         {(settings?.siteName || "A").charAt(0)}
                    </div>
                )}
                
                <h2 className="text-xl font-extrabold text-slate-900 dark:text-white tracking-tight">{isLogin ? 'Bem-vindo de volta' : 'Crie sua conta'}</h2>
                <p className="text-slate-500 dark:text-slate-400 text-xs mt-1.5">{isLogin ? 'Insira seus dados para acessar a plataforma.' : 'Preencha os dados abaixo para iniciar.'}</p>
            </div>

            <div className="px-6 pb-6 pt-4">
                {error && (
                    <div className="bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 p-3 text-xs rounded-lg mb-5 font-medium border border-red-100 dark:border-red-900/50 flex items-start gap-2 stagger-item delay-2">
                        <AlertCircle size={16} className="shrink-0 mt-0.5"/> 
                        <span>{error}</span>
                    </div>
                )}

                {isLogin && (
                    <div className="mb-5 stagger-item delay-2">
                        <Button onClick={handleGoogleLogin} variant="secondary" className="w-full h-10 text-xs flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-4 h-4" alt="Google" /> Continuar com Google
                        </Button>
                        <div className="relative flex py-4 items-center">
                            <div className="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
                            <span className="flex-shrink-0 mx-3 text-slate-400 text-[9px] font-bold uppercase tracking-widest">Ou com e-mail</span>
                            <div className="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
                        </div>
                    </div>
                )}

                <form onSubmit={handleSubmit} className="space-y-5">
                    <div className="space-y-4 stagger-item delay-3">
                        
                        {!isLogin && (
                            <div className="space-y-1.5 text-left">
                                <label className="block text-[10px] font-bold text-primary uppercase tracking-widest ml-1">Nome Completo</label>
                                <input 
                                    type="text" 
                                    value={formData.name} 
                                    onChange={e=>setFormData({...formData, name:e.target.value})} 
                                    className="w-full px-4 py-3 bg-white border border-transparent rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/30 transition-all text-sm shadow-inner" 
                                    placeholder="Seu nome e sobrenome" 
                                    required={!isLogin} 
                                />
                            </div>

    // --- MODAL DE COMPLETAR CADASTRO (CORRIGIDO - ALTO CONTRASTE) ---
    const CompleteRegistrationModal = ({ user, onSuccess }) => {
        const [formData, setFormData] = useState({
            cpf: '', phone: '', zipCode: '', address: '', number: '', neighborhood: '', city: '', state: '' 
        });
        const [loading, setLoading] = useState(false);

        const handleCpfChange = (e) => {
            let v = e.target.value.replace(/\D/g, '').slice(0, 11);
            v = v.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            setFormData(prev => ({ ...prev, cpf: v }));
        };
        const handlePhoneChange = (e) => {
             let v = e.target.value.replace(/\D/g, '').slice(0, 11);
             v = v.replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d)(\d{4})$/, '$1-$2');
             setFormData(prev => ({ ...prev, phone: v }));
        };
        const handleCepChange = async (e) => {
            let v = e.target.value.replace(/\D/g, '').slice(0, 8);
            v = v.replace(/^(\d{5})(\d)/, '$1-$2');
            setFormData(prev => ({ ...prev, zipCode: v }));
            if (v.replace(/\D/g, '').length === 8) {
                try {
                    const res = await fetch(`https://viacep.com.br/ws/${v.replace('-','')}/json/`);
                    const data = await res.json();
                    if (!data.erro) setFormData(prev => ({ ...prev, address: data.logradouro, neighborhood: data.bairro, city: data.localidade, state: data.uf }));
                } catch (err) {}
            }
        };

        const handleSave = async (e) => {
            e.preventDefault();
            setLoading(true);
            try {
                await setDoc(doc(db, "users", user.uid), { ...formData, updatedAt: serverTimestamp() }, { merge: true });
                onSuccess();
            } catch (error) {
                console.error("Erro ao salvar:", error);
                alert("Erro ao salvar dados.");
            } finally { setLoading(false); }
        };

        return (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in">
                {/* CORREÇÃO: Fundo escuro (dark:bg-slate-900) e texto claro (dark:text-white) */}
                <div className="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-2xl shadow-2xl p-8 overflow-y-auto max-h-[90vh] border border-transparent dark:border-slate-700">
                    <div className="text-center mb-6">
                        <div className="w-16 h-16 bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 dark:text-yellow-400 rounded-full flex items-center justify-center mx-auto mb-4">
                            <ShieldCheck size={32} />
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800 dark:text-white">Finalize seu Cadastro</h2>
                        <p className="text-slate-500 dark:text-slate-400 mt-2">Identificamos que faltam alguns dados obrigatórios. Complete abaixo para liberar seu acesso.</p>
                    </div>

                    <form onSubmit={handleSave} className="space-y-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <Input label="CPF" value={formData.cpf} onChange={handleCpfChange} placeholder="000.000.000-00" required />
                            <Input label="Telefone" value={formData.phone} onChange={handlePhoneChange} placeholder="(00) 00000-0000" required />
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <Input label="CEP" value={formData.zipCode} onChange={handleCepChange} placeholder="00000-000" required />
                            <div className="md:col-span-2">
                                <Input label="Endereço" value={formData.address} onChange={e=>setFormData({...formData, address:e.target.value})} required />
                            </div>
                        </div>

                        <div className="grid grid-cols-3 gap-4">
                            <Input label="Número" value={formData.number} onChange={e=>setFormData({...formData, number:e.target.value})} required />
                            <Input label="Bairro" value={formData.neighborhood} onChange={e=>setFormData({...formData, neighborhood:e.target.value})} required />
                            <Input label="Cidade" value={formData.city} onChange={e=>setFormData({...formData, city:e.target.value})} required />
                        </div>

                        <Button type="submit" disabled={loading} className="w-full h-12 text-base mt-4 shadow-lg bg-indigo-600 hover:bg-indigo-700">
                            {loading ? 'Salvando...' : 'Confirmar e Acessar'}
                        </Button>
                    </form>
                </div>
            </div>
        );
    };
