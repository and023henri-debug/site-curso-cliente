// =================================================================================
// NOVO COMPONENTE: HOME DO ALUNO (DASHBOARD FUTURISTA E IA INTEGRADA COM ÁUDIO, QUIZ E MAPA MENTAL)
// =================================================================================
const HomeSection = ({ user, courses, purchasedIds, userProgress, db, setView, onSelectCourse }) => {
    const [notifications, setNotifications] = useState([]);
    const [notifFilter, setNotifFilter] = useState('all');
    
    // IA Tarefas States
    const [iaMessages, setIaMessages] = useState([]);
    const [iaInput, setIaInput] = useState('');
    const [isIaTyping, setIsIaTyping] = useState(false);
    const [isListening, setIsListening] = useState(false);
    
    const chatContainerRef = useRef(null);
    const recognitionRef = useRef(null);
    const autoSendTimerRef = useRef(null);

    const [selectedDay, setSelectedDay] = useState(null);

    // --- ESTADOS DO QUIZ IA ---
    const [quizState, setQuizState] = useState('idle'); // idle, loading, playing, result, unavailable
    const [quizQuestions, setQuizQuestions] = useState([]);
    const [currentQ, setCurrentQ] = useState(0);
    const [quizScore, setQuizScore] = useState(0);
    const [quizLeaderboard, setQuizLeaderboard] = useState([]);
    const [activeQuizCourseId, setActiveQuizCourseId] = useState('');

    const myActiveCourses = courses.filter(c => purchasedIds.includes(c.id)).map(c => {
        const prog = userProgress[c.id];
        return { ...c, progress: prog ? prog.percentage : 0, lastAccessed: prog?.lastAccessed?.toDate() || new Date() };
    }).sort((a, b) => b.lastAccessed - a.lastAccessed);

    useEffect(() => {
        if (myActiveCourses.length > 0 && !activeQuizCourseId) {
            setActiveQuizCourseId(myActiveCourses[0].id);
        }
    }, [myActiveCourses]);

    // Inicializa o Reconhecimento de Voz (Microfone)
    useEffect(() => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition && !recognitionRef.current) {
            recognitionRef.current = new SpeechRecognition();
            recognitionRef.current.continuous = true;
            recognitionRef.current.interimResults = true;
            recognitionRef.current.lang = 'pt-BR';
        }
    }, []);

    useEffect(() => {
        if (!db || !user) return;
        const q = query(collection(db, "system_notifications"));
        const unsubscribe = onSnapshot(q, (snap) => {
            const docs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const validDocs = docs.filter(n => n.targetMode === 'all' || n.targetUserId === user.uid);
            validDocs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
            setNotifications(validDocs);
        });
        return () => unsubscribe();
    }, [db, user]);

    // Traz o Leaderboard do Quiz do curso selecionado (COM TRATAMENTO DE ERRO DE INDEX)
    useEffect(() => {
        if (!db || !activeQuizCourseId) return;
        const q = query(collection(db, "quiz_scores"), where("courseId", "==", activeQuizCourseId), orderBy("score", "desc"), limit(5));
        
        const unsub = onSnapshot(q, (snap) => {
            setQuizLeaderboard(snap.docs.map(d => d.data()));
        }, (error) => {
            // Tratamento silencioso para o erro de Index do Firebase
            console.warn("⚠️ O Ranking do Quiz precisa de um Índice no Firebase. Clique no link que apareceu no console para criar.");
        });
        
        return () => unsub();
    }, [db, activeQuizCourseId]);

    const startNewIaConversation = () => {
        const name = user.displayName?.split(' ')[0] || 'Membro';
        const dica = "\n\n💡 Dica: Peça ações diretas como 'Me leve para a loja', 'Faça um resumo do curso', 'Poste bom dia na comunidade' ou 'Mude meu nome'.";
        const proactivePrompts = [
            `Olá, ${name}! 🌟 Analisei seu progresso. Você tem ${myActiveCourses.length} portais ativos.\n\nSugestão de hoje:\n- Continue seus estudos para não perder o ritmo.\n\nQual a sua principal meta de estudos para hoje?` + dica,
            `Oi, ${name}! Pronta(o) para dar mais um passo na sua jornada? 🚀\nEstou aqui para te ajudar a focar. Em qual curso vamos mergulhar hoje?` + dica,
            `Saudações! Percebi que você está construindo uma trilha incrível de conhecimento. 🧠\nQuer bater um papo, tirar uma dúvida ou ir para alguma área específica?` + dica,
            `Ei, ${name}! Dica do dia: constância vale mais que intensidade. 💧\nMe diga o que você precisa agora que eu te guio.` + dica
        ];
        const randomText = proactivePrompts[Math.floor(Math.random() * proactivePrompts.length)];
        setIaMessages([{ id: Date.now().toString(), sender: 'ai', text: randomText }]);
    };

    useEffect(() => {
        startNewIaConversation();
        // eslint-disable-next-line react-hooks/exhaustive-deps
    }, []);

    useEffect(() => {
        if (chatContainerRef.current) {
            chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
        }
    }, [iaMessages, isIaTyping]);

    // O MOTOR EXECUTIVO DA IA DA HOME
    const handleSendIa = async (e = null, textOverride = null) => {
        if (e) e.preventDefault();
        const textToSend = textOverride !== null ? textOverride : iaInput;
        
        if (!textToSend.trim() || isIaTyping) return;
        
        const userMsg = { id: Date.now().toString(), sender: 'user', text: textToSend };
        setIaMessages(prev => [...prev, userMsg]);
        setIaInput('');
        setIsIaTyping(true);

        try {
            const backendUrl = "https://meu-backend-ia.vercel.app";
            const baseDeConhecimento = window.AemIaSystemPrompt || "";
            
            // SUPER PROMPT DE DISTINÇÃO
            const context = `Você é a IA assistente da plataforma. O aluno está na tela Home.
            ${baseDeConhecimento}
            
            REGRAS DE OURO PARA AÇÕES: 
            1. SE FOR SAUDAÇÃO OU BATE-PAPO (ex: "Oi", "Tudo bem?"): Responda normalmente SEM JSON.
            2. SE FOR ORDEM (ex: "Me leve", "Faça resumo", "Mude meu nome", "Abra o curso"): Responda e INCLUA OBRIGATORIAMENTE um bloco JSON no final.
            
            AÇÕES JSON:
            - Navegar: {"action": "navigate", "target": "catalog|my_courses|loja|favorites|certificates|community|support|profile|informacoes"}
            - Abrir Curso: {"action": "open_course", "courseName": "NOME"}
            - Editar Perfil: {"action": "edit_profile", "field": "name|bio|city", "value": "NOVO VALOR"}
            - Postar Comunidade: {"action": "post_community", "text": "MENSAGEM"}
            - Fazer Anotação Resumo: {"action": "take_notes", "courseName": "CURSO", "notes": "Resumo detalhado..."}`;

            const response = await fetch(`${backendUrl}/api/chat`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: `${context}\n\n[ALUNO]: ${textToSend}` })
            });
            const data = await response.json();
            
            let aiReply = data.reply || "Processado.";
            let cmdObj = null;
            let stringToHide = "";
            let blockMatch = aiReply.match(/```[a-z]*\s*(\{[\s\S]*?\})\s*```/i);
            
            if (blockMatch) {
                stringToHide = blockMatch[0];
                try { cmdObj = JSON.parse(blockMatch[1]); } catch(e) {}
            } else {
                let rawMatch = aiReply.match(/\{[\s\S]*"action"[\s\S]*\}/i);
                if (rawMatch) {
                    stringToHide = rawMatch[0];
                    try { cmdObj = JSON.parse(rawMatch[0]); } catch(e) {}
                }
            }

            if (cmdObj && cmdObj.action) {
                aiReply = aiReply.replace(stringToHide, '').trim();
                let commandExecuted = false;

                if (window.AemGlobalAPI) {
                    switch(cmdObj.action) {
                        case 'navigate':
                            window.AemGlobalAPI.navigate(cmdObj.target);
                            commandExecuted = true;
                            break;
                        case 'open_course':
                        case 'buy_course':
                            const opened = window.AemGlobalAPI.openCourseByName(cmdObj.courseName);
                            if (!opened) aiReply += "\n\n⚠️ Poxa, não encontrei nenhum curso com esse nome.";
                            else commandExecuted = true;
                            break;
                        case 'buy_product':
                            window.AemGlobalAPI.navigate('loja');
                            setTimeout(() => {
                                if (window.AemGlobalAPI_Marketplace) window.AemGlobalAPI_Marketplace.buyProductByName(cmdObj.productName);
                            }, 1000);
                            commandExecuted = true;
                            break;
                        case 'edit_profile':
                            window.AemGlobalAPI.updateProfileData(cmdObj.field, cmdObj.value);
                            commandExecuted = true;
                            break;
                        case 'post_community':
                            window.AemGlobalAPI.postToCommunity(cmdObj.text);
                            commandExecuted = true;
                            break;
                        case 'take_notes':
                            window.AemGlobalAPI.takeNotesAutomated(cmdObj.courseName, cmdObj.notes);
                            commandExecuted = true;
                            break;
                    }
                }
                if (commandExecuted) {
                    aiReply += "\n\n⚡ Ação concluída com sucesso!";
                }
            } else {
                aiReply = aiReply.replace(/```[\s\S]*?```/g, '').trim();
            }

            setIaMessages(prev => [...prev, { id: Date.now().toString(), sender: 'ai', text: aiReply }]);
        } catch(err) {
            setIaMessages(prev => [...prev, { id: Date.now().toString(), sender: 'ai', text: "⚠️ Desculpe, estou offline no momento." }]);
        } finally {
            setIsIaTyping(false);
        }
    };

    // MOTOR DO QUIZ IA
    const handleGenerateQuiz = async () => {
        const selectedCourse = myActiveCourses.find(c => c.id === activeQuizCourseId);
        if (!selectedCourse) return;

        const desc = selectedCourse.description || selectedCourse.descricao || "";
        
        if (desc.trim().length < 10) {
            setQuizState('unavailable');
            return;
        }

        setQuizState('loading');

        try {
            const prompt = `Você é um gerador de quiz educacional super criativo e divertido. Crie 4 perguntas de múltipla escolha para testar o conhecimento do aluno sobre o curso "${selectedCourse.title || selectedCourse.titulo}".
A descrição oficial do curso é: "${desc}". Baseie-se nesta descrição e no seu conhecimento sobre o tema.
Retorne APENAS um array JSON puro (SEM crases, SEM formatação markdown), com esta exata estrutura:
[
  { "pergunta": "Texto da pergunta", "opcoes": ["Opção 1", "Opção 2", "Opção 3", "Opção 4"], "respostaCorreta": 0 }
]`;

            const backendUrl = "https://meu-backend-ia.vercel.app";
            const response = await fetch(`${backendUrl}/api/chat`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: prompt })
            });
            const data = await response.json();
            
            let reply = data.reply || "";
            let jsonStr = reply.replace(/```json/g, '').replace(/```/g, '').trim();
            let startIndex = jsonStr.indexOf('[');
            let endIndex = jsonStr.lastIndexOf(']') + 1;
            let finalJson = jsonStr.substring(startIndex, endIndex);

            const parsedQuestions = JSON.parse(finalJson);
            
            setQuizQuestions(parsedQuestions);
            setQuizScore(0);
            setCurrentQ(0);
            setQuizState('playing');
        } catch (error) {
            console.error("Erro ao gerar quiz:", error);
            setQuizState('unavailable');
        }
    };

    const handleAnswerQuiz = async (optIndex) => {
        let newScore = quizScore;
        if (optIndex === quizQuestions[currentQ].respostaCorreta) {
            newScore += 25; // 25 pontos por acerto (100 total)
            setQuizScore(newScore);
        }

        if (currentQ < quizQuestions.length - 1) {
            setCurrentQ(currentQ + 1);
        } else {
            setQuizState('result');
            // Salvar Pontuação no Firebase
            try {
                const docRef = doc(db, "quiz_scores", `${user.uid}_${activeQuizCourseId}`);
                const docSnap = await getDoc(docRef);
                let shouldSave = true;
                if (docSnap.exists() && docSnap.data().score >= newScore) {
                    shouldSave = false;
                }
                
                if (shouldSave) {
                    await setDoc(docRef, {
                        userId: user.uid,
                        userName: user.displayName || 'Membro',
                        userPhoto: user.photoURL || null,
                        courseId: activeQuizCourseId,
                        score: newScore,
                        timestamp: serverTimestamp()
                    });
                }
            } catch (err) { console.error("Erro ao salvar recorde", err); }
        }
    };

    // Configuração dos Eventos do Microfone
    useEffect(() => {
        if (!recognitionRef.current) return;

        recognitionRef.current.onstart = () => setIsListening(true);
        recognitionRef.current.onend = () => setIsListening(false);
        
        recognitionRef.current.onresult = (event) => {
            let transcriptText = '';
            let isFinal = false;
            for (let i = 0; i < event.results.length; ++i) {
                transcriptText += event.results[i][0].transcript;
                if (event.results[i].isFinal) isFinal = true;
            }
            
            setIaInput(transcriptText);

            if (isFinal) {
                clearTimeout(autoSendTimerRef.current);
                autoSendTimerRef.current = setTimeout(() => {
                    if (transcriptText.trim() !== '') {
                        recognitionRef.current.stop();
                        handleSendIa(null, transcriptText); 
                    }
                }, 300);
            }
        };
    }, [iaInput]);

    const toggleListening = (e) => {
        e.preventDefault();
        if (!recognitionRef.current) return alert("Reconhecimento de voz não suportado neste navegador.");
        if (isListening) recognitionRef.current.stop();
        else { setIaInput(''); recognitionRef.current.start(); }
    };

    const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
    const today = new Date().getDate();

    return (
        <div className="space-y-6 md:space-y-8 animate-fade-in max-w-[100rem] mx-auto pb-10 px-4 md:px-8 lg:px-12 font-sans mt-4 lg:mt-8">
            <div className="relative p-6 md:p-10 rounded-[2rem] bg-gradient-to-br from-indigo-900/40 via-purple-900/20 to-black border border-white/10 shadow-[0_15px_40px_rgba(79,70,229,0.15)] overflow-hidden">
                <div className="absolute top-0 right-0 w-64 h-64 bg-indigo-500/20 blur-[80px] rounded-full pointer-events-none"></div>
                <div className="relative z-10 flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
                    <div>
                        <h1 className="text-3xl md:text-5xl font-black text-white tracking-tight mb-2">
                            Bem-vindo de volta, <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">{user.displayName?.split(' ')[0] || 'Membro'}</span>!
                        </h1>
                        <p className="text-slate-400 text-sm md:text-base max-w-xl leading-relaxed">
                            Seu ecossistema de evolução está pronto. Verifique suas tarefas, continue seus portais e fique por dentro das novidades.
                        </p>
                    </div>
                    {/* 👇 O BOTÃO DO MAPA MENTAL VOLTOU AQUI 👇 */}
                    <div className="flex flex-col sm:flex-row gap-3 mt-4 md:mt-0 w-full sm:w-auto">
                        <button onClick={() => setView('catalog')} className="w-full sm:w-auto px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold transition-all shadow-[0_0_20px_rgba(79,70,229,0.4)] flex items-center justify-center gap-2 hover:-translate-y-1 active:scale-95">
                            <Search size={18}/> Explorar Portais
                        </button>
                        <button onClick={() => setView('mindmap')} className="w-full sm:w-auto px-6 py-3 rounded-xl bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold transition-all shadow-[0_0_20px_rgba(217,70,239,0.4)] flex items-center justify-center gap-2 hover:-translate-y-1 active:scale-95 border border-fuchsia-400/30">
                            <Share2 size={18}/> Mapa Mental
                        </button>
                    </div>
                    {/* 👆 ===================================== 👆 */}
                </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
                {/* COLUNA ESQUERDA */}
                <div className="lg:col-span-8 space-y-6 md:space-y-8">
                    
                    {/* IA Chat */}
                    <div className="bg-[#0a0a0f] border border-white/10 rounded-[2rem] p-5 md:p-8 shadow-xl flex flex-col relative overflow-hidden h-[450px]">
                        <div className="absolute top-0 left-0 w-32 h-32 bg-purple-500/10 blur-[50px] rounded-full pointer-events-none"></div>
                        <div className="flex justify-between items-center mb-6 relative z-10 border-b border-white/5 pb-4">
                            <div className="flex items-center gap-3">
                                <div className="p-2.5 bg-gradient-to-br from-purple-600 to-indigo-600 rounded-xl shadow-lg">
                                    <Sparkles size={20} className="text-white" />
                                </div>
                                <div>
                                    <h2 className="text-xl font-black text-white tracking-tight">Minhas Tarefas & Dicas</h2>
                                    <p className="text-[10px] text-purple-400 font-bold uppercase tracking-widest">Gerenciado por IA</p>
                                </div>
                            </div>
                            <button onClick={startNewIaConversation} className="p-2 bg-white/5 hover:bg-white/10 rounded-full transition-colors text-slate-400 hover:text-white" title="Iniciar Nova Conversa">
                                <RotateCcw size={18} />
                            </button>
                        </div>

                        <div ref={chatContainerRef} className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-4 mb-4 relative z-10 scroll-smooth">
                            {iaMessages.map(msg => (
                                <div key={msg.id} className={`flex gap-3 ${msg.sender === 'user' ? 'flex-row-reverse' : ''}`}>
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 border ${msg.sender === 'user' ? 'bg-slate-800 border-slate-600 text-slate-300' : 'bg-purple-900/50 border-purple-500/50 text-purple-300 shadow-[0_0_10px_rgba(147,51,234,0.3)]'}`}>
                                        {msg.sender === 'user' ? <User size={14}/> : <Zap size={14}/>}
                                    </div>
                                    <div className={`p-3.5 rounded-2xl max-w-[85%] text-sm leading-relaxed whitespace-pre-wrap ${msg.sender === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white/5 border border-white/10 text-slate-300 rounded-tl-none'}`}>
                                        {msg.text}
                                    </div>
                                </div>
                            ))}
                            {isIaTyping && (
                                <div className="flex gap-3">
                                    <div className="w-8 h-8 rounded-full bg-purple-900/50 border border-purple-500/50 flex items-center justify-center text-purple-300"><Zap size={14}/></div>
                                    <div className="bg-white/5 border border-white/10 p-3 rounded-2xl rounded-tl-none flex items-center gap-1.5 w-16">
                                        <div className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0ms'}}></div>
                                        <div className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '150ms'}}></div>
                                        <div className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '300ms'}}></div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <form onSubmit={handleSendIa} className="relative z-10 flex gap-2 items-center">
                            <button 
                                type="button"
                                onClick={toggleListening}
                                className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all ${isListening ? 'bg-red-500 text-white animate-pulse shadow-[0_0_15px_rgba(239,68,68,0.5)]' : 'bg-white/10 text-slate-300 hover:bg-white/20'}`}
                                title={isListening ? "Parar de ouvir" : "Falar com a IA"}
                            >
                                <Mic size={18} />
                            </button>

                            <input 
                                value={iaInput} 
                                onChange={e => setIaInput(e.target.value)}
                                placeholder={isListening ? "Ouvindo... Fale agora." : "Responda ou faça um pedido..."}
                                className={`flex-1 bg-white/5 border rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none transition-all ${isListening ? 'border-red-500/50 ring-1 ring-red-500/50' : 'border-white/10 focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/50'}`}
                            />
                            
                            <button type="submit" disabled={!iaInput.trim() || isIaTyping} className="w-12 h-12 bg-purple-600 hover:bg-purple-500 text-white rounded-xl flex items-center justify-center transition-all disabled:opacity-50">
                                <Send size={18} className="ml-1" />
                            </button>
                        </form>
                    </div>

                    {/* QUIZ INTERATIVO DA IA */}
                    {myActiveCourses.length > 0 && (
                        <div className="bg-gradient-to-br from-[#1a1a2e] to-[#0a0a0f] border border-blue-500/20 rounded-[2rem] p-5 md:p-8 shadow-[0_15px_40px_rgba(59,130,246,0.1)] flex flex-col relative overflow-hidden">
                            <div className="absolute -top-10 -right-10 w-40 h-40 bg-blue-500/10 blur-[50px] rounded-full pointer-events-none"></div>
                            
                            <div className="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center gap-4 mb-6 relative z-10">
                                <div className="flex items-center gap-3">
                                    <div className="p-2.5 bg-blue-600 rounded-xl shadow-lg shadow-blue-600/30">
                                        <Award size={20} className="text-white" />
                                    </div>
                                    <div>
                                        <h2 className="text-xl font-black text-white tracking-tight">Quiz IA Desafio</h2>
                                        <p className="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Ranking Global</p>
                                    </div>
                                </div>
                                <select 
                                    className="bg-white/10 border border-white/20 text-white text-xs px-3 py-2 rounded-lg outline-none max-w-[200px] cursor-pointer"
                                    value={activeQuizCourseId}
                                    onChange={(e) => { setActiveQuizCourseId(e.target.value); setQuizState('idle'); }}
                                >
                                    {myActiveCourses.map(c => <option key={c.id} value={c.id} className="bg-slate-900">{c.title || c.titulo}</option>)}
                                </select>
                            </div>

                            <div className="relative z-10 flex-1 min-h-[220px] bg-black/40 rounded-2xl border border-white/5 p-6 flex flex-col justify-center">
                                {quizState === 'idle' && (
                                    <div className="text-center animate-fade-in">
                                        <div className="w-16 h-16 bg-blue-500/20 text-blue-400 rounded-full flex items-center justify-center mx-auto mb-4"><Zap size={28}/></div>
                                        <h3 className="text-lg font-bold text-white mb-2">Teste seus conhecimentos!</h3>
                                        <p className="text-sm text-slate-400 mb-6 max-w-sm mx-auto">A Inteligência Artificial vai gerar 4 perguntas exclusivas agora mesmo baseadas no curso que você escolheu.</p>
                                        <button onClick={handleGenerateQuiz} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-bold shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-transform hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-2 mx-auto">
                                            <Play size={16} fill="currentColor"/> Começar Quiz
                                        </button>
                                    </div>
                                )}

                                {quizState === 'loading' && (
                                    <div className="flex flex-col items-center justify-center text-center animate-pulse">
                                        <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                        <p className="text-sm text-blue-400 font-bold uppercase tracking-widest">A IA está criando as perguntas...</p>
                                    </div>
                                )}

                                {quizState === 'unavailable' && (
                                    <div className="text-center animate-fade-in">
                                        <div className="w-12 h-12 bg-slate-800 text-slate-500 rounded-full flex items-center justify-center mx-auto mb-3"><XCircle size={20}/></div>
                                        <h3 className="text-white font-bold mb-1">Quiz no momento indisponível</h3>
                                        <p className="text-xs text-slate-400 max-w-xs mx-auto">Aguarde o administrador adicionar uma descrição oficial a este curso para a IA gerar o quiz.</p>
                                        <button onClick={() => setQuizState('idle')} className="mt-4 text-xs text-blue-400 font-bold hover:underline">Voltar</button>
                                    </div>
                                )}

                                {quizState === 'playing' && quizQuestions.length > 0 && (
                                    <div className="w-full max-w-lg mx-auto animate-fade-in flex flex-col">
                                        <div className="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">
                                            <span>Pergunta {currentQ + 1} de {quizQuestions.length}</span>
                                            <span className="text-emerald-400">Placar: {quizScore}</span>
                                        </div>
                                        <h3 className="text-lg sm:text-xl font-bold text-white mb-6 leading-relaxed">{quizQuestions[currentQ]?.pergunta}</h3>
                                        <div className="space-y-3">
                                            {quizQuestions[currentQ]?.opcoes?.map((op, idx) => (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => handleAnswerQuiz(idx)}
                                                    className="w-full text-left px-5 py-3.5 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-blue-500/50 rounded-xl text-sm text-slate-200 transition-all font-medium group flex items-center gap-3"
                                                >
                                                    <span className="w-6 h-6 rounded-full bg-black/50 border border-white/20 flex items-center justify-center text-xs text-slate-400 group-hover:bg-blue-600 group-hover:text-white group-hover:border-blue-500 shrink-0">{['A','B','C','D'][idx]}</span>
                                                    {op}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {quizState === 'result' && (
                                    <div className="text-center animate-fade-in flex flex-col items-center">
                                        <div className="w-20 h-20 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(16,185,129,0.5)] mb-4 animate-bounce">
                                            <Award size={36} className="text-white" />
                                        </div>
                                        <h3 className="text-2xl font-black text-white mb-1">Fim de Jogo!</h3>
                                        <p className="text-slate-400 mb-6">Sua pontuação final foi:</p>
                                        <div className="text-5xl font-black text-emerald-400 mb-8">{quizScore} pts</div>
                                        <button onClick={() => setQuizState('idle')} className="bg-white/10 hover:bg-white/20 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition-all border border-white/10">Jogar Novamente</button>
                                    </div>
                                )}
                            </div>

                            {/* LEADERBOARD (Ranking) */}
                            <div className="mt-6 pt-6 border-t border-white/5 relative z-10">
                                <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Top 5 - {myActiveCourses.find(c=>c.id===activeQuizCourseId)?.title || 'Curso'}</h4>
                                {quizLeaderboard.length === 0 ? (
                                    <p className="text-xs text-slate-600 italic">Nenhum aluno jogou ainda. Seja o primeiro no ranking!</p>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        {quizLeaderboard.map((lb, idx) => (
                                            <div key={idx} className="flex items-center gap-3 bg-black/20 p-2.5 rounded-lg border border-white/5">
                                                <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black shrink-0 ${idx === 0 ? 'bg-yellow-500 text-black shadow-[0_0_10px_rgba(234,179,8,0.5)]' : idx === 1 ? 'bg-slate-300 text-black' : idx === 2 ? 'bg-orange-400 text-black' : 'bg-slate-800 text-slate-400'}`}>
                                                    {idx + 1}º
                                                </div>
                                                <div className="w-8 h-8 rounded-full overflow-hidden bg-slate-800 shrink-0 border border-white/10">
                                                    {lb.userPhoto ? <img src={lb.userPhoto} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-xs font-bold">{lb.userName?.charAt(0)}</div>}
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <p className="text-xs font-bold text-white truncate">{lb.userName}</p>
                                                    <p className="text-[10px] text-emerald-400 font-bold">{lb.score} pts</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* MEU PROGRESSO (Cursos em andamento) */}
                    <div className="bg-[#0a0a0f] border border-white/10 rounded-[2rem] p-5 md:p-8 shadow-xl">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-black text-white tracking-tight flex items-center gap-2">
                                <TrendingUp className="text-emerald-500"/> Meu Progresso Atual
                            </h2>
                            <button onClick={() => setView('my_courses')} className="text-xs font-bold text-slate-500 hover:text-white transition-colors">Ver todos</button>
                        </div>
                        {myActiveCourses.length === 0 ? (
                            <div className="text-center py-10 bg-white/5 rounded-2xl border border-dashed border-white/10">
                                <p className="text-slate-500 text-sm">Você ainda não iniciou nenhum curso.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                {myActiveCourses.slice(0, 4).map(c => (
                                    <div key={c.id} onClick={() => onSelectCourse(c)} className="bg-white/5 hover:bg-white/10 border border-white/5 hover:border-white/20 rounded-2xl p-4 flex gap-4 cursor-pointer transition-all group">
                                        <img src={c.cover} className="w-16 h-16 rounded-xl object-cover border border-white/10 shrink-0" alt="capa" />
                                        <div className="flex-1 min-w-0 flex flex-col justify-center">
                                            <h4 className="font-bold text-sm text-white truncate mb-2">{c.title}</h4>
                                            <div className="flex items-center gap-3">
                                                <div className="flex-1 h-1.5 bg-black/50 rounded-full overflow-hidden">
                                                    <div className="h-full bg-emerald-500 rounded-full" style={{width: `${c.progress}%`}}></div>
                                                </div>
                                                <span className="text-[10px] font-black text-emerald-400">{c.progress}%</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>

                {/* COLUNA DIREITA */}
                <div className="lg:col-span-4 space-y-6 md:space-y-8 flex flex-col">
                    <div className="bg-gradient-to-b from-[#111] to-[#0a0a0f] border border-white/10 rounded-[2rem] p-5 md:p-8 shadow-xl relative overflow-hidden min-h-[400px]">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-lg font-black text-white tracking-tight flex items-center gap-2">
                                <CalendarDays className="text-blue-500"/> Agenda & Eventos
                            </h2>
                        </div>
                        <div className="bg-black/40 rounded-2xl p-4 border border-white/5 mb-6 relative overflow-hidden">

// =================================================================================
// COMPONENTE AUXILIAR: CARROSSEL DE CATEGORIAS (LOOP INFINITO + DRAG ESTILO NETFLIX)
// =================================================================================
const CategoryCarousel = ({ categoryTitle, coursesList, rowIndex, onSelectCourse, onBuyCourse, purchasedIds, getDiscountInfo }) => {
    const scrollRef = React.useRef(null);
    const [isHovered, setIsHovered] = React.useState(false);
    const [isDragging, setIsDragging] = React.useState(false);
    const [startX, setStartX] = React.useState(0);
    const [scrollLeft, setScrollLeft] = React.useState(0);
    const [dragDist, setDragDist] = React.useState(0);

    const isReverse = rowIndex % 2 !== 0;
    const displayCourses = [...coursesList, ...coursesList, ...coursesList, ...coursesList, ...coursesList, ...coursesList];

    React.useEffect(() => {
        const el = scrollRef.current;
        if (!el || coursesList.length === 0) return;

        let animationId;
        let speed = isReverse ? -0.7 : 0.7;

        if (isReverse && el.scrollLeft <= 0) { el.scrollLeft = el.scrollWidth / 2; }

        const scrollLoop = () => {
            if (!isHovered && !isDragging && el) {
                el.scrollLeft += speed;
                const segmentWidth = el.scrollWidth / 6;
                if (!isReverse && el.scrollLeft >= segmentWidth * 4) {
                    el.scrollLeft -= segmentWidth * 2;
                } else if (isReverse && el.scrollLeft <= segmentWidth) {
                    el.scrollLeft += segmentWidth * 2;
                }
            }
            animationId = requestAnimationFrame(scrollLoop);
        };

        animationId = requestAnimationFrame(scrollLoop);
        return () => cancelAnimationFrame(animationId);
    }, [isHovered, isDragging, isReverse, coursesList.length]);

    const handleMouseDown = (e) => {
        setIsDragging(true); setDragDist(0);
        setStartX(e.pageX - scrollRef.current.offsetLeft);
        setScrollLeft(scrollRef.current.scrollLeft);
    };

    const handleMouseLeaveOrUp = () => {
        setIsDragging(false);
        setTimeout(() => setIsHovered(false), 500);
    };

    const handleMouseMove = (e) => {
        if (!isDragging) return;
        e.preventDefault();
        const x = e.pageX - scrollRef.current.offsetLeft;
        const walk = (x - startX) * 1.5; 
        setDragDist(Math.abs(walk)); 
        scrollRef.current.scrollLeft = scrollLeft - walk;
    };

    const handleManualScroll = (direction) => {
        if (scrollRef.current) {
            setIsHovered(true); 
            const scrollAmount = window.innerWidth > 768 ? 600 : 300;
            scrollRef.current.scrollBy({ left: direction === 'left' ? -scrollAmount : scrollAmount, behavior: 'smooth' });
            setTimeout(() => setIsHovered(false), 1000);
        }
    };

    const handleCourseClick = (course, isOwned, isFree, discountInfo) => {
        if (dragDist > 10) return; 
        if (!isOwned && !isFree) onBuyCourse({...course, appliedDiscount: discountInfo});
        else onSelectCourse(course);
    };

    return (
        <div id={`category-${categoryTitle.replace(/\s+/g, '-')}`} className="relative group/carousel mb-6 md:mb-12 pt-4 pb-4">
            <h3 className="text-xl md:text-3xl font-black text-white mb-2 px-4 md:px-12 flex items-center gap-3 drop-shadow-md">
                <span className="w-1.5 h-6 md:h-8 bg-indigo-500 rounded-full inline-block shadow-[0_0_10px_rgba(99,102,241,0.8)]"></span>
                {categoryTitle}
            </h3>

            <button onClick={() => handleManualScroll('left')} className="absolute left-2 md:left-6 top-[55%] -translate-y-1/2 z-30 w-12 h-12 md:w-14 md:h-14 bg-black/70 hover:bg-black text-white rounded-full hidden md:flex items-center justify-center opacity-0 group-hover/carousel:opacity-100 transition-all border border-white/20 backdrop-blur-md shadow-[0_0_20px_rgba(0,0,0,0.8)] focus:outline-none hover:scale-110">
                <ChevronDown className="w-6 h-6 md:w-8 md:h-8 rotate-90 ml-1" />
            </button>
            <button onClick={() => handleManualScroll('right')} className="absolute right-2 md:right-6 top-[55%] -translate-y-1/2 z-30 w-12 h-12 md:w-14 md:h-14 bg-black/70 hover:bg-black text-white rounded-full hidden md:flex items-center justify-center opacity-0 group-hover/carousel:opacity-100 transition-all border border-white/20 backdrop-blur-md shadow-[0_0_20px_rgba(0,0,0,0.8)] focus:outline-none hover:scale-110">
                <ChevronDown className="w-6 h-6 md:w-8 md:h-8 -rotate-90 mr-1" />
            </button>

            <div 
                ref={scrollRef} 
                onMouseEnter={() => setIsHovered(true)} 
                onMouseLeave={handleMouseLeaveOrUp}
                onTouchStart={() => setIsHovered(true)}
                onTouchEnd={() => setIsHovered(false)}
                onMouseDown={handleMouseDown}
                onMouseUp={handleMouseLeaveOrUp}
                onMouseMove={handleMouseMove}
                className={`flex gap-4 md:gap-6 overflow-x-auto px-4 md:px-12 py-8 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none] ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
            >
                {displayCourses.map((course, idx) => {
                    const isOwned = purchasedIds.includes(course.id);
                    const discountInfo = getDiscountInfo(course.id, 'course', course.price);
                    const isFree = discountInfo.finalPrice <= 0 || discountInfo.originalPrice <= 0;

                    return (
                        <div 
                            key={`${course.id}_${idx}`} 
                            className="group relative w-[180px] sm:w-[220px] md:w-[280px] shrink-0 aspect-[2/3] rounded-2xl overflow-hidden border border-white/10 bg-[#0a0a0f] transition-all duration-500 shadow-lg hover:shadow-[0_25px_50px_rgba(79,70,229,0.5)] hover:scale-[1.07] hover:-translate-y-2 hover:z-20 flex flex-col justify-end select-none" 
                            onClick={() => handleCourseClick(course, isOwned, isFree, discountInfo)}
                        >
                            <img src={course.thumbnailUrl || course.cover || "https://images.unsplash.com/photo-1616469829941-c7200edec809?q=80&w=600"} alt={course.title} draggable="false" className="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none" />
                            <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/40 to-transparent opacity-90 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>

                            {!isFree && discountInfo.hasDiscount && !isOwned && (
                                <div className="absolute top-3 left-3 z-20 pointer-events-none">
                                    <span className="bg-pink-600 text-white px-2.5 py-1 rounded-md text-[10px] md:text-xs font-black shadow-lg shadow-pink-600/40 animate-pulse border border-pink-400">{discountInfo.tag} OFF</span>
                                </div>
                            )}
                            
                            <div className="absolute top-3 right-3 z-20 pointer-events-none">
                                {isOwned ? <div className="w-2.5 h-2.5 bg-purple-500 rounded-full shadow-[0_0_10px_rgba(168,85,247,1)] md:hidden"></div> : <Lock size={12} className="text-white/50 md:hidden drop-shadow-md" />}
                                <div className="hidden md:block">
                                    <span className="bg-black/60 backdrop-blur-md text-[10px] px-3 py-1.5 rounded-full text-white font-bold border border-white/10 uppercase tracking-widest shadow-sm">{isOwned ? 'Liberado' : 'Premium'}</span>
                                </div>
                            </div>

                            <div className="relative z-20 p-4 md:p-6 flex flex-col transform transition-transform duration-500 md:translate-y-12 md:group-hover:translate-y-0 pointer-events-none">
                                <h3 className="text-white font-black text-sm md:text-xl mb-1 md:mb-2 line-clamp-2 leading-tight drop-shadow-lg">{course.title || course.titulo}</h3>
                                {!isFree ? (
                                    <div className="mt-1">
                                        {discountInfo.hasDiscount ? (
                                            <div className="flex flex-col">
                                                <span className="text-[10px] md:text-xs text-slate-400 line-through decoration-red-500/50">R$ {discountInfo.originalPrice.toFixed(2).replace('.', ',')}</span>
                                                <span className="text-emerald-400 font-black text-lg md:text-2xl drop-shadow-md">R$ {discountInfo.finalPrice.toFixed(2).replace('.', ',')}</span>
                                            </div>
                                        ) : <span className="text-emerald-400 font-black text-lg md:text-2xl drop-shadow-md">R$ {discountInfo.originalPrice.toFixed(2).replace('.', ',')}</span>}
                                    </div>
                                ) : !isOwned && <div className="mt-1"><span className="text-emerald-400 font-black text-lg md:text-2xl drop-shadow-md uppercase tracking-widest">Gratuito</span></div>}

                                <div className="w-full mt-4 py-2.5 md:py-3 bg-indigo-600/90 text-white rounded-xl font-bold text-[10px] md:text-xs flex items-center justify-center gap-2 transition-all md:opacity-0 md:group-hover:opacity-100 duration-300 shadow-[0_0_15px_rgba(79,70,229,0.5)] backdrop-blur-sm pointer-events-auto">
                                    <Play size={14} fill="currentColor" /> {isOwned ? 'Acessar Agora' : 'Garantir Vaga'}
                                </div>
                            </div>
                        </div>
                    );
                })}
            </div>
        </div>
    );
};

// =================================================================================
// COMPONENTE CATÁLOGO PRINCIPAL (PORTAIS) - COM FILTRO DE CATEGORIAS
// =================================================================================
const CatalogSection = ({ onSelectCourse, onBuyCourse, purchasedIds = [], allCourses = [], settings, userPoints, currentUser, user, showNotification, db, setPurchasedIds, promotions = [] }) => {
    const [searchTerm, setSearchTerm] = React.useState('');
    const [purchasedProducts, setPurchasedProducts] = React.useState([]);
    const [selectedCategory, setSelectedCategory] = React.useState('Todas'); // NOVO ESTADO: Filtro de categoria
    
    const activeUser = currentUser || user; 

    React.useEffect(() => {
        if (!db || !activeUser) return;
        const unsubProds = onSnapshot(query(collection(db, "marketplace_orders"), where("userId", "==", activeUser.uid), where("status", "in", ["aprovado", "pago", "approved"])), snap => {
            setPurchasedProducts(snap.docs.map(d => d.data().productId));
        });
        return () => unsubProds();
    }, [db, activeUser]);

    const getDiscountInfo = (itemId, itemType, originalPrice) => {
        let price = typeof originalPrice === 'number' ? originalPrice : parseFloat(String(originalPrice || "0").replace(/\./g, '').replace(',', '.'));
        if (isNaN(price) || price <= 0) return { hasDiscount: false, originalPrice: price || 0, finalPrice: price || 0 };

        const promo = promotions.find(p => p.discountTargetId === itemId && p.discountTargetType === itemType);
        if (!promo) return { hasDiscount: false, originalPrice: price, finalPrice: price };

        if (promo.conditionType === 'buy_other') {
            if (promo.conditionTargetType === 'course' && !purchasedIds.includes(promo.conditionTargetId)) return { hasDiscount: false, originalPrice: price, finalPrice: price };
            if (promo.conditionTargetType === 'product' && !purchasedProducts.includes(promo.conditionTargetId)) return { hasDiscount: false, originalPrice: price, finalPrice: price };
        }

        let finalPrice = promo.discountType === 'percentage' ? price - (price * (promo.discountValue / 100)) : price - promo.discountValue;

        return {
            hasDiscount: true, originalPrice: price, finalPrice: Math.max(0, finalPrice),
            tag: promo.discountType === 'percentage' ? `-${promo.discountValue}%` : `-R$${promo.discountValue}`
        };
    };

    const heroBg = settings?.heroBgUrl || settings?.heroBackground || ""; 
    const heroTitle = settings?.heroTitle || "Sua Jornada de Autoconhecimento";
    const heroSubtitle = settings?.heroSubtitle || "Explore os caminhos disponíveis.";
    const courseTitle = settings?.coursesSectionTitle || "Seus Caminhos de Transformação";
    const courseSubtitle = settings?.coursesSectionSubtitle || "Portais Disponíveis";

    const isVideo = (url) => !!url && !!url.toLowerCase().match(/\.(mp4|webm|ogg|mov)(?:\?.*)?$/);

    // Filtragem por busca de texto
    const filteredCourses = allCourses.filter(course => (course.title || course.titulo || '').toLowerCase().includes(searchTerm.toLowerCase()));

    // Agrupamento por Categoria Inteligente
    const categoriesMap = {};
    filteredCourses.filter(curso => curso.ativo !== false).forEach(course => {
        const cat = course.categoria || course.category || course.categoryName || 'Cursos e Formações';
        if (!categoriesMap[cat]) categoriesMap[cat] = [];
        categoriesMap[cat].push(course);
    });

    // Converte e ordena (categorias com mais cursos aparecem primeiro)
    const categoryEntries = Object.entries(categoriesMap).sort((a, b) => b[1].length - a[1].length);

    // APLICA O FILTRO DA CATEGORIA CLICADA
    const displayedCategories = selectedCategory === 'Todas' 
        ? categoryEntries 
        : categoryEntries.filter(([catName]) => catName === selectedCategory);

    return (
        <div className="animate-fade-in w-full bg-black min-h-screen pb-20">
            {/* HERO SECTION DA LOJA */}
            <div className="relative w-full h-[55vh] min-h-[400px] md:h-[70vh] md:min-h-[500px] max-h-[850px] flex items-center justify-center overflow-hidden bg-black">
                <div className="absolute inset-0 z-10">
                    {isVideo(heroBg) ? (
                        <BackgroundVideo src={heroBg} className="w-full h-full object-cover object-[center_20%]" />
                    ) : (
                        <div className="w-full h-full" style={{ backgroundImage: `url(${heroBg})`, backgroundSize: 'cover', backgroundRepeat: 'no-repeat', backgroundPosition: 'center 20%' }}></div>
                    )}
                </div>
                <div className="absolute inset-0 z-20 pointer-events-none" style={{ background: 'linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.4))' }}></div>
                <div className="absolute -bottom-1 left-0 w-full h-[120px] md:h-[200px] z-20 pointer-events-none" style={{ background: 'linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.7) 60%, #000000 95%, #000000 100%)' }}></div>
                <div className="relative z-30 text-center px-6 max-w-5xl mx-auto flex flex-col items-center justify-center w-full h-full pt-16">
                    <h1 className="text-3xl sm:text-4xl md:text-6xl lg:text-7xl font-bold text-white tracking-tighter mb-4 drop-shadow-[0_5px_15px_rgba(0,0,0,1)] leading-tight" style={{ fontFamily: settings?.heroTitleFont || 'Montserrat' }}>{heroTitle}</h1>
                    <p className="text-sm sm:text-base md:text-xl text-white/90 font-light max-w-2xl leading-relaxed drop-shadow-[0_3px_10px_rgba(0,0,0,1)]" style={{ fontFamily: settings?.heroSubtitleFont || 'Inter' }}>{heroSubtitle}</p>
                </div>
            </div>

            <div className="w-full relative z-20 bg-black pt-8">
                
                {/* MENU DE NAVEGAÇÃO DE CATEGORIAS COM FILTRO ATIVO */}
                {categoryEntries.length > 1 && (
                    <div className="relative z-[40] bg-transparent border-y border-white/10 shadow-sm mb-4">
                        <div className="max-w-[100rem] mx-auto px-4 md:px-12 flex gap-3 md:gap-4 overflow-x-auto py-4 snap-x [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
                            
                            {/* Botão para mostrar "Todas" as categorias */}
                            <button 
                                onClick={() => setSelectedCategory('Todas')}
                                className={`snap-start px-5 py-2.5 md:px-6 md:py-3 rounded-full text-xs md:text-sm font-bold whitespace-nowrap transition-all border shrink-0 ${
                                    selectedCategory === 'Todas' 
                                    ? 'bg-indigo-600 text-white border-indigo-500 shadow-[0_0_15px_rgba(79,70,229,0.5)]' 
                                    : 'bg-white/5 hover:bg-indigo-600 text-white/80 hover:text-white border-white/10 hover:border-indigo-500 hover:shadow-[0_0_15px_rgba(79,70,229,0.5)]'
                                }`}
                            >
                                Todas as Trilhas
                            </button>

                            {/* Botões individuais de cada categoria */}
                            {categoryEntries.map(([catName]) => (
                                <button 
                                    key={catName} 
                                    onClick={() => setSelectedCategory(catName)}
                                    className={`snap-start px-5 py-2.5 md:px-6 md:py-3 rounded-full text-xs md:text-sm font-bold whitespace-nowrap transition-all border shrink-0 ${
                                        selectedCategory === catName 
                                        ? 'bg-indigo-600 text-white border-indigo-500 shadow-[0_0_15px_rgba(79,70,229,0.5)]' 
                                        : 'bg-white/5 hover:bg-indigo-600 text-white/80 hover:text-white border-white/10 hover:border-indigo-500 hover:shadow-[0_0_15px_rgba(79,70,229,0.5)]'
                                    }`}
                                >
                                    {catName}
                                </button>
                            ))}
                        </div>
                    </div>
                )}

                <div className="max-w-[100rem] mx-auto pt-4">
                    {/* BUSCA E TÍTULOS GERAIS */}
                    <div className="px-4 md:px-12 flex flex-col md:flex-row justify-between items-start md:items-end gap-4 md:gap-6 mb-8 border-b border-white/10 pb-4 md:pb-6">
                        <div>
                            <h2 className="text-2xl sm:text-3xl md:text-4xl font-light text-white tracking-tight" style={{ fontFamily: settings?.siteNameFont || 'Montserrat' }}>
                                {selectedCategory === 'Todas' ? courseTitle : selectedCategory}
                            </h2>
                            <p className="text-white/40 mt-1 text-[10px] md:text-sm uppercase tracking-widest font-bold">
                                {selectedCategory === 'Todas' ? courseSubtitle : 'Cursos e portais desta trilha'}
                            </p>
                        </div>
                        <div className="relative group w-full md:w-80 z-20">
                            <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-purple-400 transition-colors" size={16} />
                            <input 
                                type="text" 
                                placeholder="Buscar conhecimento..." 
                                value={searchTerm} 
                                onChange={(e) => setSearchTerm(e.target.value)} 
                                className="w-full pl-10 pr-4 py-3 md:py-3.5 bg-white/5 backdrop-blur-xl border border-white/10 rounded-xl md:rounded-2xl text-white placeholder-white/30 focus:outline-none focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/50 transition-all font-light text-sm shadow-inner" 
                            />
                        </div>
                    </div>

                    {/* PRATELEIRAS NETFLIX (FILTRADAS PELA CATEGORIA) */}
                    {displayedCategories.length > 0 ? (
                        <div className="space-y-4">
                            {displayedCategories.map(([catName, coursesInCategory], index) => (
                                <CategoryCarousel 
                                    key={catName}
                                    categoryTitle={catName}
                                    coursesList={coursesInCategory}
                                    rowIndex={index}
                                    onSelectCourse={onSelectCourse}
                                    onBuyCourse={onBuyCourse}
                                    purchasedIds={purchasedIds}
                                    getDiscountInfo={getDiscountInfo}
                                />
                            ))}
                        </div>
                    ) : (
                        <div className="py-32 flex flex-col items-center justify-center border border-dashed border-white/10 rounded-[2rem] bg-white/5 text-white/50 mx-4 md:mx-12">
                            <Search size={40} className="opacity-50 mb-4 text-indigo-400" />
                            <p className="text-lg font-light text-center">Nenhum portal encontrado para sua busca nesta trilha.</p>
                            <button 
                                onClick={() => { setSearchTerm(''); setSelectedCategory('Todas'); }}
                                className="mt-6 px-6 py-2 rounded-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold transition-colors"
                            >
                                Limpar Filtros
                            </button>
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
};
// =================================================================================
// FIM DO COMPONENTE CATÁLOGO PRINCIPAL
// =================================================================================

// =================================================================================
// COMPONENTE COMUNIDADE (SISTEMA AVANÇADO DE TRIBOS COM CAPAS E AVATARES)
// =================================================================================
const CommunityTab = ({ user, showNotification }) => {
    const [posts, setPosts] = useState([]);
    const [userProfiles, setUserProfiles] = useState({}); 
    const [studentCommunities, setStudentCommunities] = useState([]); 
    const [communityTab, setCommunityTab] = useState('feed'); 
    const [activeFilter, setActiveFilter] = useState('all'); 
    
    const [activeCommunity, setActiveCommunity] = useState(null); 
    const [activeCommTab, setActiveCommTab] = useState('feed'); 
    const [managingComm, setManagingComm] = useState(null); 
    const [isCreatingComm, setIsCreatingComm] = useState(false);
    const [newCommName, setNewCommName] = useState('');
    const [newCommDesc, setNewCommDesc] = useState('');
    
    const [commAvatarFile, setCommAvatarFile] = useState(null);
    const [commAvatarPreview, setCommAvatarPreview] = useState(null);
    const [commCoverFile, setCommCoverFile] = useState(null);
    const [commCoverPreview, setCommCoverPreview] = useState(null);
    const [isSubmittingComm, setIsSubmittingComm] = useState(false);
    
    const [newPostText, setNewPostText] = useState('');
    const [newPostMedia, setNewPostMedia] = useState(null);
    const [isPosting, setIsPosting] = useState(false);
    const [mediaPreview, setMediaPreview] = useState(null);
    
    const [activeCommentId, setActiveCommentId] = useState(null);
    const [commentText, setCommentText] = useState('');
    const [isCommenting, setIsCommenting] = useState(false);
    const [commentToDelete, setCommentToDelete] = useState(null); 
    const [postToDelete, setPostToDelete] = useState(null); 
    const [heartAnim, setHeartAnim] = useState(null); 

    const [activeChatTab, setActiveChatTab] = useState('conversas'); 
    const [activeConversations, setActiveConversations] = useState([]);
    const [chatToDelete, setChatToDelete] = useState(null);
    const [chatUsers, setChatUsers] = useState([]);
    const [selectedChatUser, setSelectedChatUser] = useState(null);
    const [chatMessages, setChatMessages] = useState([]);
    const [chatInput, setChatInput] = useState('');
    const [isUploadingChat, setIsUploadingChat] = useState(false);
    const [chatSelectedMedia, setChatSelectedMedia] = useState(null); 
    const [contextMenuMsgIdChat, setContextMenuMsgIdChat] = useState(null);
    const [msgToDeleteChat, setMsgToDeleteChat] = useState(null);
    const [editingMsgIdChat, setEditingMsgIdChat] = useState(null);
    const [editingTextChat, setEditingTextChat] = useState('');
    const [isRecordingChat, setIsRecordingChat] = useState(false);
    const [isLoadingMicChat, setIsLoadingMicChat] = useState(false);
    const [recordingTimeChat, setRecordingTimeChat] = useState(0);
    const [audioPreviewChat, setAudioPreviewChat] = useState(null);
    const [audioBlobChat, setAudioBlobChat] = useState(null);
    const [showEmojiPickerChat, setShowEmojiPickerChat] = useState(false);
    const [showAttachmentsChat, setShowAttachmentsChat] = useState(false);
    
    const messagesEndRefChat = useRef(null);
    const mediaRecorderRefChat = useRef(null);
    const audioChunksRefChat = useRef([]);
    const timerRefChat = useRef(null);
    const quickEmojis = ["😀", "😂", "🥰", "👍", "🙏", "✅", "🔥", "🤔"];
    const formatDuration = (sec) => { const m = Math.floor(sec / 60); const s = sec % 60; return `${m}:${s < 10 ? '0' : ''}${s}`; };

    const fixUrl = (url) => {
        if (!url) return null;
        const wrongDomain = "https://pub-2ece542306d80259e71a793d20f91a60.r2.dev";
        const rightDomain = "https://pub-263c6a7252164111a104a68e6835cfc4.r2.dev";
        if (url.includes(wrongDomain)) return url.replace(wrongDomain, rightDomain);
        return url;
    };

    useEffect(() => {
        if (!db) return;
        const unsubComms = onSnapshot(query(collection(db, "student_communities"), orderBy("createdAt", "desc")), snap => {
            setStudentCommunities(snap.docs.map(d => ({id: d.id, ...d.data()})));
        });

        const unsubPosts = onSnapshot(query(collection(db, "community_posts"), orderBy("createdAt", "desc"), limit(100)), snap => {
            setPosts(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });

        const unsubUsers = onSnapshot(collection(db, "users"), (snapshot) => {
            const profiles = {}; const usersList = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                profiles[doc.id] = { name: data.name || "Aluno", photo: data.photoBase64 || null };
                if (doc.id !== user.uid && data.role !== 'admin' && data.role !== 'colaborador') { usersList.push({ id: doc.id, ...data }); }
            });
            setUserProfiles(profiles); setChatUsers(usersList);
        });

        const unsubChats = onSnapshot(query(collection(db, "chats"), where("participants", "array-contains", user.uid)), (snap) => {
            const chats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            chats.sort((a, b) => {
                const tA = a.updatedAt?.seconds ? a.updatedAt.seconds * 1000 : Date.now();
                const tB = b.updatedAt?.seconds ? b.updatedAt.seconds * 1000 : Date.now();
                return tB - tA;
            });
            setActiveConversations(chats);
        });

        return () => { unsubComms(); unsubPosts(); unsubUsers(); unsubChats(); };
    }, [user, db]);

    useEffect(() => {
        if (activeCommunity) {
            const updated = studentCommunities.find(c => c.id === activeCommunity.id);
            if (updated) setActiveCommunity(updated);
        }
        if (managingComm) {
            const updated = studentCommunities.find(c => c.id === managingComm.id);
            if (updated) setManagingComm(updated);
        }
    }, [studentCommunities]);

    useEffect(() => { setActiveCommTab('feed'); }, [activeCommunity?.id]);

    const getMemberData = (uid) => {
        if (uid === user.uid) return { id: uid, name: user.displayName || 'Eu', photo: user.photoURL };
        const found = chatUsers.find(u => u.id === uid);
        if (found) return { id: uid, name: found.name, photo: found.photoBase64 };
        return { id: uid, name: 'Aluno Desconhecido', photo: null };
    };

    const handleCommImageSelect = (e, type) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) return showNotification("A imagem deve ter no máximo 10MB.", "warning");
        
        if (type === 'avatar') {
            setCommAvatarFile(file);
            setCommAvatarPreview(URL.createObjectURL(file));
        } else {
            setCommCoverFile(file);
            setCommCoverPreview(URL.createObjectURL(file));
        }
    };

    const handleCreateCommunity = async (e) => {
        e.preventDefault();
        if(!newCommName.trim()) return;
        setIsSubmittingComm(true);
        
        try {
            let avatarUrl = null; let coverUrl = null;
            if (commAvatarFile) {
                const resAvatar = await uploadToCustomDrive(commAvatarFile, 'Community/Avatares/');
                if (resAvatar) avatarUrl = resAvatar.url;
            }
            if (commCoverFile) {
                const resCover = await uploadToCustomDrive(commCoverFile, 'Community/Capas/');
                if (resCover) coverUrl = resCover.url;
            }

            await addDoc(collection(db, "student_communities"), {
                name: newCommName, description: newCommDesc, creatorId: user.uid, creatorName: user.displayName, creatorPhoto: user.photoURL || null,
                avatarUrl: avatarUrl, coverUrl: coverUrl, createdAt: serverTimestamp(), banned: false, members: [user.uid], pendingRequests: []
            });
            
            setIsCreatingComm(false); setNewCommName(''); setNewCommDesc(''); setCommAvatarFile(null); setCommAvatarPreview(null); setCommCoverFile(null); setCommCoverPreview(null);
            showNotification("Tribo fundada com sucesso!", "success");
        } catch(err) { 
            showNotification("Erro ao criar tribo. Tente novamente.", "error"); 
        } finally { setIsSubmittingComm(false); }
    };

    const handleUpdateCommImage = async (e, type) => {
        const file = e.target.files[0];
        if (!file || !activeCommunity) return;
        if (file.size > 10 * 1024 * 1024) return showNotification("Imagem máxima de 10MB.", "warning");
        
        showNotification(`Atualizando ${type === 'cover' ? 'capa' : 'foto de perfil'}...`, "info");
        try {
            const folder = type === 'cover' ? 'Community/Capas/' : 'Community/Avatares/';
            const result = await uploadToCustomDrive(file, folder);
            
            if (result && result.url) {
                const commRef = doc(db, "student_communities", activeCommunity.id);
                const updateData = type === 'cover' ? { coverUrl: result.url } : { avatarUrl: result.url };
                await updateDoc(commRef, updateData);
                showNotification("Imagem atualizada com sucesso!", "success");
            }
        } catch(err) { showNotification("Erro ao atualizar imagem.", "error"); }
    };

    const handleRequestJoin = async (commId) => {
        try {
            const commRef = doc(db, "student_communities", commId);
            const commSnap = await getDoc(commRef);
            if (commSnap.exists()) {
                const currentReqs = commSnap.data().pendingRequests || [];
                if (!currentReqs.includes(user.uid)) { await updateDoc(commRef, { pendingRequests: [...currentReqs, user.uid] }); }
                showNotification("Solicitação enviada ao líder!", "success");
            }
        } catch(e) { showNotification("Erro ao solicitar.", "error"); }
    };

    const handleCancelRequest = async (commId) => {
        try {
            const commRef = doc(db, "student_communities", commId);
            const commSnap = await getDoc(commRef);
            if (commSnap.exists()) {
                const currentReqs = commSnap.data().pendingRequests || [];
                await updateDoc(commRef, { pendingRequests: currentReqs.filter(id => id !== user.uid) });
                showNotification("Solicitação cancelada.", "info");
            }
        } catch(e) {}
    };

    const handleApproveRequest = async (commId, studentId) => {
        try {
            const commRef = doc(db, "student_communities", commId);
            const commSnap = await getDoc(commRef);
            if (commSnap.exists()) {
                const data = commSnap.data();
                const currentReqs = data.pendingRequests || [];
                const currentMembers = data.members || [];
                await updateDoc(commRef, { pendingRequests: currentReqs.filter(id => id !== studentId), members: [...currentMembers, studentId] });
                showNotification("Membro aprovado!", "success");
            }
        } catch(e) {}
    };

    const handleDenyRequest = async (commId, studentId) => {
        try {
            const commRef = doc(db, "student_communities", commId);
            const commSnap = await getDoc(commRef);
            if (commSnap.exists()) {
                const currentReqs = commSnap.data().pendingRequests || [];
                await updateDoc(commRef, { pendingRequests: currentReqs.filter(id => id !== studentId) });
                showNotification("Solicitação recusada.", "info");
            }
        } catch(e) {}
    };

    const handleRemoveMember = async (commId, studentId) => {
        try {
            const commRef = doc(db, "student_communities", commId);
            const commSnap = await getDoc(commRef);
            if (commSnap.exists()) {
                const currentMembers = commSnap.data().members || [];
                await updateDoc(commRef, { members: currentMembers.filter(id => id !== studentId) });
                showNotification("Membro removido.", "success");
            }
        } catch(e) {}
    };

    const handleCreatePost = async (e) => {
        if (e) e.preventDefault(); 
        const safeText = typeof newPostText === 'string' ? newPostText : "";
        if (!safeText.trim() && !newPostMedia) return;
        setIsPosting(true);
        try {
            let mediaUrl = null, mediaType = null;
            if (newPostMedia) {
                const uploadResult = await uploadToCustomDrive(newPostMedia);
                if (uploadResult && uploadResult.url) { mediaUrl = uploadResult.url; mediaType = uploadResult.type; } 
                else { throw new Error("Falha no upload da mídia."); }
            }
            await addDoc(collection(db, "community_posts"), {
                userId: user.uid, userName: user.displayName || "Aluno", userPhoto: user.photoURL || null,
                text: safeText.trim(), mediaUrl: mediaUrl, mediaType: mediaType, image: mediaType === 'image' ? mediaUrl : null,
                video: mediaType === 'video' ? mediaUrl : null, file: mediaType === 'file' ? mediaUrl : null,
                likes: [], savedBy: [], comments: [], createdAt: new Date().toISOString(), status: 'approved',
                communityId: activeCommunity ? activeCommunity.id : null, communityName: activeCommunity ? activeCommunity.name : null
            });
            setNewPostText(""); setNewPostMedia(null); setMediaPreview(null);
            showNotification("Post publicado com sucesso!", "success");
        } catch (error) { showNotification("Erro ao publicar.", "error"); } finally { setIsPosting(false); }
    };

    const visiblePosts = posts.filter(post => {
        if (activeCommunity) { return post.communityId === activeCommunity.id; } 
        else {
            if (post.communityId) return false; 
            if (activeFilter === 'saved') return post.savedBy?.includes(user.uid);
            if (activeFilter === 'mine') return post.userId === user.uid;
            return true; 
        }
    });

    const handleFileSelect = (e) => {
        const file = e.target.files[0];
        if (file) {
            if (file.size > 200 * 1024 * 1024) return showNotification("Arquivo muito grande (Max 200MB)!", "warning");
            setNewPostMedia(file); setMediaPreview(URL.createObjectURL(file));
        }
    };

    const formatPostDate = (isoDate) => {
        if (!isoDate) return 'Agora';
        try {
            const date = new Date(isoDate);
            if(isNaN(date.getTime())) return 'Recentemente';
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }) + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        } catch(e) { return '...'; }
    };

    const handleLike = async (postId, currentLikes) => {
        const postRef = doc(db, "community_posts", postId);
        const safeLikes = Array.isArray(currentLikes) ? currentLikes : [];
        const isLiked = safeLikes.includes(user.uid);
        try {
            if (isLiked) await updateDoc(postRef, { likes: arrayRemove(user.uid) });
            else await updateDoc(postRef, { likes: arrayUnion(user.uid) });
        } catch (e) {}
    };

    const handleDoubleTap = (postId, currentLikes) => {
        setHeartAnim(postId); setTimeout(() => setHeartAnim(null), 800); 
        const safeLikes = Array.isArray(currentLikes) ? currentLikes : [];
        if (!safeLikes.includes(user.uid)) handleLike(postId, currentLikes);
    };

    const handleSavePost = async (postId, currentSavedBy) => {
        const postRef = doc(db, "community_posts", postId);
        const safeSaved = Array.isArray(currentSavedBy) ? currentSavedBy : [];
        try {
            if (safeSaved.includes(user.uid)) await updateDoc(postRef, { savedBy: arrayRemove(user.uid) });
            else await updateDoc(postRef, { savedBy: arrayUnion(user.uid) });
        } catch (e) {}
    };

    const confirmDeletePost = async () => {
        if (!postToDelete) return;
        try { await deleteDoc(doc(db, "community_posts", postToDelete.id)); setPostToDelete(null); showNotification("Post excluído.", "success"); } catch (e) { showNotification("Erro ao excluir.", "error"); }
    };

    const toggleComments = (postId) => {
        if (activeCommentId === postId) { setActiveCommentId(null); } else { setActiveCommentId(postId); setCommentText(''); }
    };

    const handleSendComment = async (postId, currentComments) => {
        if (!commentText.trim()) return;
        setIsCommenting(true);
        try {
            const postRef = doc(db, "community_posts", postId);
            const newComment = { id: Date.now().toString(), userId: user.uid, userName: user.displayName || 'Aluno', userPhoto: user.photoURL || null, text: commentText, createdAt: new Date().toISOString() };
            await updateDoc(postRef, { comments: [...(currentComments || []), newComment] });
            setCommentText(''); 
        } catch (error) { showNotification("Erro ao comentar.", "error"); } finally { setIsCommenting(false); }
    };

    const executeDeleteComment = async () => {
        if (!commentToDelete) return;
        const { postId, commentId, currentComments } = commentToDelete;
        try {
            const postRef = doc(db, "community_posts", postId);
            await updateDoc(postRef, { comments: currentComments.filter(c => c.id !== commentId) });
            setCommentToDelete(null); showNotification("Comentário removido.", "success");
        } catch(e) { showNotification("Erro ao excluir comentário.", "error"); }
    };

    const getChatId = () => {
        if (!user || !selectedChatUser) return null;
        return [user.uid, selectedChatUser.id].sort().join('_');
    };

    useEffect(() => {
        if (selectedChatUser && user && db) {
            const chatId = getChatId();
            const msgsRef = collection(db, "chats", chatId, "messages");
            const unsubscribe = onSnapshot(query(msgsRef, orderBy('timestamp', 'asc')), (snapshot) => {
                setChatMessages(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                setTimeout(() => messagesEndRefChat.current?.scrollIntoView({ behavior: "smooth" }), 200);
            });
            const chatDocRef = doc(db, "chats", chatId);
            getDoc(chatDocRef).then(snap => {
                if (snap.exists() && snap.data().unreadCounts?.[user.uid] > 0) {
                    updateDoc(chatDocRef, { [`unreadCounts.${user.uid}`]: 0 }).catch(() => {});
                }
            });
            return () => unsubscribe();
        }
    }, [selectedChatUser, user, db]);

    const sendChatMessage = async (type = 'text', content = chatInput, extraData = {}) => {
