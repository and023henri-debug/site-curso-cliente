        if (!content.trim() && type === 'text') return;
        if (!selectedChatUser || !db) return;
        const chatId = getChatId();
        const messageData = { senderId: user.uid, receiverId: selectedChatUser.id, type: type, content: content, timestamp: serverTimestamp(), delivered: true, read: false, hiddenFor: [], deleted: false, ...extraData };
        try {
            await addDoc(collection(db, "chats", chatId, "messages"), messageData);
            const chatDocRef = doc(db, "chats", chatId);
            const chatSnap = await getDoc(chatDocRef);
            let currentUnreads = chatSnap.exists() && chatSnap.data().unreadCounts ? chatSnap.data().unreadCounts[selectedChatUser.id] || 0 : 0;
            await setDoc(chatDocRef, {
                participants: [user.uid, selectedChatUser.id],
                lastMessage: type === 'text' ? content : (type === 'audio' ? '🎤 Áudio' : '📎 Arquivo'),
                updatedAt: serverTimestamp(), deletedFor: [], 
                unreadCounts: { ...(chatSnap.exists() ? chatSnap.data().unreadCounts : {}), [selectedChatUser.id]: currentUnreads + 1 }
            }, { merge: true });
            if (type === 'text') { setChatInput(''); setShowEmojiPickerChat(false); }
        } catch (error) {}
    };

    const executeDeleteConversation = async () => {
        if (!chatToDelete) return;
        try {
            const msgsRef = collection(db, "chats", chatToDelete, "messages");
            const msgsSnap = await getDocs(msgsRef);
            const deletePromises = msgsSnap.docs.map(docSnap => deleteDoc(doc(db, "chats", chatToDelete, "messages", docSnap.id)));
            await Promise.all(deletePromises);
            await deleteDoc(doc(db, "chats", chatToDelete));
            if (selectedChatUser && getChatId() === chatToDelete) setSelectedChatUser(null);
            setChatToDelete(null); 
            showNotification("Conversa excluída.", "success");
        } catch (e) {
            showNotification("Erro ao excluir. Verifique permissões.", "error");
        }
    };

    const startRecordingChat = async () => {
        if (!navigator.mediaDevices) return showNotification("Microfone sem suporte.", "error");
        setIsLoadingMicChat(true);
        try { 
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
            let options = { mimeType: 'audio/webm' };
            if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) { options = { mimeType: 'audio/webm;codecs=opus' }; }
            const recorder = new MediaRecorder(stream, options); 
            audioChunksRefChat.current = []; 
            recorder.ondataavailable = e => { if (e.data.size > 0) audioChunksRefChat.current.push(e.data); }; 
            recorder.onstop = () => { 
                const blob = new Blob(audioChunksRefChat.current, { type: 'audio/webm' }); 
                if (blob.size > 100) { setAudioPreviewChat(URL.createObjectURL(blob)); setAudioBlobChat(blob); } 
                stream.getTracks().forEach(t => t.stop()); 
                clearInterval(timerRefChat.current); setRecordingTimeChat(0);
            }; 
            recorder.start(); mediaRecorderRefChat.current = recorder; setIsRecordingChat(true); setIsLoadingMicChat(false);
            setRecordingTimeChat(0); timerRefChat.current = setInterval(() => { setRecordingTimeChat(prev => prev + 1); }, 1000);
        } catch (e) { setIsLoadingMicChat(false); setIsRecordingChat(false); }
    };
    const stopRecordingChat = () => { if (mediaRecorderRefChat.current?.state === "recording") mediaRecorderRefChat.current.stop(); setIsRecordingChat(false); clearInterval(timerRefChat.current); };
    const cancelAudioChat = () => { setAudioPreviewChat(null); setAudioBlobChat(null); setRecordingTimeChat(0); };
    const sendAudioChat = async () => { 
        if (audioBlobChat) {
            const file = new File([audioBlobChat], `voice_${Date.now()}.webm`, { type: 'audio/webm' });
            setIsUploadingChat(true); setAudioPreviewChat(null); setAudioBlobChat(null); setShowAttachmentsChat(false);
            try {
                const uploadResult = await uploadToCustomDrive(file, 'Chat/Alunos/');
                if (uploadResult && uploadResult.url) sendChatMessage('audio', uploadResult.url, { fileName: uploadResult.name });
            } catch(e) { } finally { setIsUploadingChat(false); }
        } 
    };

    const handleChatFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsUploadingChat(true); setShowAttachmentsChat(false);
        try {
            const uploadResult = await uploadToCustomDrive(file, 'Chat/Alunos/');
            if (uploadResult && uploadResult.url) {
                let type = file.type.includes('image') ? 'image' : (file.type.includes('video') ? 'video' : 'file');
                sendChatMessage(type, uploadResult.url, { fileName: file.name });
            }
        } catch (error) {} finally { setIsUploadingChat(false); }
    };

    const startEditingChat = (msg) => { setEditingMsgIdChat(msg.id); setEditingTextChat(msg.content); setContextMenuMsgIdChat(null); };
    const cancelEditingChat = () => { setEditingMsgIdChat(null); setEditingTextChat(''); };
    const saveEditChat = async () => {
        if (!editingTextChat.trim() || !selectedChatUser) return;
        try { await updateDoc(doc(db, "chats", getChatId(), "messages", editingMsgIdChat), { content: editingTextChat, edited: true }); setEditingMsgIdChat(null); setEditingTextChat(''); } catch (e) { }
    };
    const handleDeleteForMeChat = async () => {
        if (!msgToDeleteChat || !selectedChatUser) return;
        try { await updateDoc(doc(db, "chats", getChatId(), "messages", msgToDeleteChat.id), { hiddenFor: arrayUnion(user.uid) }); setMsgToDeleteChat(null); } catch (e) {}
    };
    const handleDeleteForEveryoneChat = async () => {
        if (!msgToDeleteChat || !selectedChatUser) return;
        try { await updateDoc(doc(db, "chats", getChatId(), "messages", msgToDeleteChat.id), { deleted: true, content: "🚫 Esta mensagem foi apagada", type: 'text', fileUrl: null }); setMsgToDeleteChat(null); } catch (e) {}
    };

    // FUNÇÃO QUE RENDERIZA O CONTEÚDO DAS MENSAGENS NO CHAT PRIVADO
    // (Usa a importação MiniAudioPlayer diretamente se estiver global, mas como não temos certeza da ordem,
    // usamos o controle HTML5 nativo de áudio para evitar a quebra se o componente for movido)
    const renderMsgContent = (msg, isMe) => {
        const msgType = msg.type || msg.fileType || 'text';
        const msgSource = msg.content || msg.fileUrl || msg.text || '';

        if (msgType === 'audio') return <audio src={msgSource} controls className="h-8 max-w-[200px] mt-1 mb-1" />;
        if (msgType === 'image') return <img src={msgSource} className="rounded-lg max-w-full h-auto max-h-64 object-cover cursor-pointer mb-1 mt-1 border border-black/10" onClick={(e) => { e.stopPropagation(); setChatSelectedMedia({url: msgSource, type: 'image'}); }}/>;
        if (msgType === 'video') return (
            <div className="relative cursor-pointer group mb-1 mt-1" onClick={(e) => { e.stopPropagation(); setChatSelectedMedia({url: msgSource, type: 'video'}); }}>
                <video src={msgSource} className="rounded-lg max-w-full h-auto max-h-64 object-cover border border-black/10" />
                <div className="absolute inset-0 flex items-center justify-center bg-black/30 rounded-lg transition-colors"><div className="bg-white/20 p-3 rounded-full backdrop-blur-sm"><Play size={24} className="text-white ml-1" fill="currentColor" /></div></div>
            </div>
        );
        if (msgType === 'file') return (
            <div onClick={(e) => { e.stopPropagation(); setChatSelectedMedia({url: msgSource, type: 'file'}); }} className={`flex items-center gap-3 p-3 rounded-lg mb-1 mt-1 cursor-pointer transition-colors ${isMe ? 'bg-black/10 hover:bg-black/20' : 'bg-slate-100 dark:bg-black/20 hover:bg-slate-200 dark:hover:bg-black/30'}`}>
                <div className="bg-white/50 dark:bg-white/10 p-2 rounded-full"><FileText size={20} /></div>
                <div className="overflow-hidden">
                    <p className="text-xs font-bold truncate">{msg.fileName || 'Documento PDF'}</p>
                    <p className="text-[10px] opacity-70 uppercase mt-0.5">Toque para abrir</p>
                </div>
            </div>
        );
        return <p className={`whitespace-pre-wrap leading-relaxed text-[14px] md:text-[15px] ${msgSource.includes('🚫') ? 'italic opacity-60' : ''}`}>{msgSource}</p>;
    };

    const renderChatInterface = () => (
        <div className="flex bg-white/50 dark:bg-[#0a0a0f] backdrop-blur-2xl rounded-2xl border border-white/20 dark:border-white/5 shadow-2xl overflow-hidden h-[calc(100vh-250px)] md:h-[calc(100vh-180px)] min-h-[400px] w-full animate-fade-in mt-2 relative font-sans" onClick={() => setContextMenuMsgIdChat(null)}>
            
            {chatSelectedMedia && (
                <div className="absolute inset-0 z-[99] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md animate-fade-in" onClick={() => setChatSelectedMedia(null)}>
                    <button onClick={() => setChatSelectedMedia(null)} className="absolute top-4 right-4 md:top-6 md:right-6 z-[100] bg-white/10 hover:bg-red-500 text-white p-3 rounded-full border border-white/20 transition-all shadow-2xl backdrop-blur-md"><X size={24} /></button>
                    <div className="relative z-10 flex items-center justify-center w-full max-w-4xl" onClick={e => e.stopPropagation()}>
                        {chatSelectedMedia.type === 'video' ? (
                            <video src={chatSelectedMedia.url} controls autoPlay className="max-w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border border-white/10" />
                        ) : chatSelectedMedia.type === 'file' || chatSelectedMedia.url.includes('.pdf') ? (
                            <iframe src={`${chatSelectedMedia.url}#view=FitH`} className="w-full h-[80vh] rounded-xl shadow-2xl bg-white border-none" />
                        ) : (
                            <img src={chatSelectedMedia.url} className="max-w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border border-white/10" alt="Mídia" />
                        )}
                    </div>
                </div>
            )}

            {msgToDeleteChat && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4 animate-fade-in" onClick={(e) => e.stopPropagation()}>
                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-2xl w-full max-w-sm border border-slate-200 dark:border-slate-700">
                        <h3 className="text-lg font-bold mb-4 text-slate-800 dark:text-white text-center">Apagar mensagem?</h3>
                        <div className="flex flex-col gap-2">
                            {msgToDeleteChat.senderId === user.uid && <button onClick={handleDeleteForEveryoneChat} className="w-full py-3 rounded-xl bg-red-100 text-red-600 font-bold hover:bg-red-200 transition-colors text-sm">Apagar para todos</button>}
                            <button onClick={handleDeleteForMeChat} className="w-full py-3 rounded-xl bg-blue-50 text-blue-700 font-bold hover:bg-blue-100 transition-colors text-sm">Apagar para mim</button>
                            <button onClick={() => setMsgToDeleteChat(null)} className="w-full py-3 rounded-xl border border-slate-200 text-slate-500 font-bold hover:bg-slate-50 transition-colors mt-2 text-sm">Cancelar</button>
                        </div>
                    </div>
                </div>
            )}

            {chatToDelete && (
                <div className="absolute inset-0 z-[160] flex items-center justify-center p-4 bg-black/60 backdrop-blur-md animate-fade-in" onClick={(e) => e.stopPropagation()}>
                    <div className="bg-white/90 dark:bg-slate-900/90 backdrop-blur-2xl rounded-3xl p-8 shadow-2xl max-w-sm w-full border border-white/60 dark:border-white/10 text-center">
                        <div className="w-16 h-16 bg-red-100 dark:bg-red-500/20 text-red-500 dark:text-red-400 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><Trash2 size={28}/></div>
                        <h3 className="text-xl font-bold text-slate-800 dark:text-white mb-2">Excluir Conversa?</h3>
                        <p className="text-sm text-slate-500 dark:text-slate-400 mb-8">O histórico será mantido caso vocês voltem a conversar no futuro.</p>
                        <div className="flex gap-3">
                            <button onClick={() => setChatToDelete(null)} className="flex-1 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-bold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Cancelar</button>
                            <button onClick={executeDeleteConversation} className="flex-1 py-3.5 rounded-xl bg-red-600 hover:bg-red-700 text-white font-bold shadow-[0_8px_20px_rgba(220,38,38,0.3)] transition-all">Excluir</button>
                        </div>
                    </div>
                </div>
            )}

            {/* Sidebar (Contatos e Conversas) */}
            <div className={`w-full md:w-1/3 border-r border-slate-200 dark:border-slate-800 flex flex-col ${selectedChatUser ? 'hidden md:flex' : 'flex'}`}>
                <div className="p-3 border-b border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-black/20 shrink-0">
                    <div className="flex bg-black/10 dark:bg-black/30 p-1 rounded-lg w-full border border-black/5 dark:border-white/5">
                        <button onClick={() => setActiveChatTab('conversas')} className={`flex-1 px-3 py-1.5 rounded-md text-xs font-bold transition-all ${activeChatTab === 'conversas' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 dark:text-slate-400 hover:text-white'}`}>Conversas</button>
                        <button onClick={() => setActiveChatTab('contatos')} className={`flex-1 px-3 py-1.5 rounded-md text-xs font-bold transition-all ${activeChatTab === 'contatos' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 dark:text-slate-400 hover:text-white'}`}>Contatos</button>
                    </div>
                </div>

                <div className="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                    {activeChatTab === 'contatos' ? (
                        chatUsers.length === 0 ? <p className="text-center text-xs text-slate-500 mt-10">Nenhum aluno encontrado.</p> : (
                            chatUsers.map(u => (
                                <div key={u.id} onClick={() => setSelectedChatUser(u)} className={`flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-colors ${selectedChatUser?.id === u.id ? 'bg-indigo-600 text-white' : 'hover:bg-white/50 dark:hover:bg-white/5 text-slate-800 dark:text-white'}`}>
                                    <div className="w-10 h-10 rounded-full overflow-hidden bg-slate-200 dark:bg-slate-700 shrink-0 border border-white/10">
                                        {u.photoBase64 ? <img src={u.photoBase64} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center font-bold">{u.name?.charAt(0) || 'A'}</div>}
                                    </div>
                                    <div className="flex-1 min-w-0"><h4 className="font-bold text-sm truncate">{u.name || 'Aluno'}</h4></div>
                                </div>
                            ))
                        )
                    ) : (
                        activeConversations.filter(c => !(c.deletedFor || []).includes(user.uid)).length === 0 ? (
                            <p className="text-center text-xs text-slate-500 mt-10 px-4">Nenhuma conversa ativa.<br/><br/>Vá em <b>Contatos</b> para iniciar um bate-papo.</p>
                        ) : (
                            activeConversations.filter(c => !(c.deletedFor || []).includes(user.uid)).map(chat => {
                                const otherUserId = (chat.participants || []).find(id => id !== user.uid);
                                const otherUser = chatUsers.find(u => u.id === otherUserId) || { id: otherUserId, name: 'Usuário Desconhecido', photoBase64: null };
                                const unreadCount = chat.unreadCounts?.[user.uid] || 0;

                                return (
                                    <div key={chat.id} className={`flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-colors group relative ${selectedChatUser?.id === otherUser.id ? 'bg-indigo-600 text-white' : 'hover:bg-white/50 dark:hover:bg-white/5 text-slate-800 dark:text-white'}`} onClick={() => setSelectedChatUser(otherUser)}>
                                        <div className="w-10 h-10 rounded-full overflow-hidden bg-slate-200 dark:bg-slate-700 shrink-0 border border-white/10">
                                            {otherUser.photoBase64 ? <img src={otherUser.photoBase64} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center font-bold text-slate-500">{otherUser.name?.charAt(0) || 'U'}</div>}
                                        </div>
                                        <div className="flex-1 min-w-0 pr-8 relative">
                                            <div className="flex justify-between items-baseline mb-0.5">
                                                <h4 className={`font-bold text-sm truncate ${unreadCount > 0 && selectedChatUser?.id !== otherUser.id ? 'text-indigo-500 dark:text-indigo-400' : ''}`}>{otherUser.name}</h4>
                                                <span className={`text-[9px] shrink-0 ml-2 ${unreadCount > 0 && selectedChatUser?.id !== otherUser.id ? 'text-indigo-500 dark:text-indigo-400 font-bold' : 'opacity-70'}`}>{chat.updatedAt ? new Date(chat.updatedAt.seconds * 1000).toLocaleDateString([], {day:'2-digit', month:'2-digit'}) : ''}</span>
                                            </div>
                                            <p className={`text-xs truncate ${selectedChatUser?.id === otherUser.id ? 'text-indigo-200' : (unreadCount > 0 ? 'text-slate-800 dark:text-white font-bold' : 'text-slate-500 dark:text-slate-400')}`}>{chat.lastMessage || '...'}</p>
                                        </div>
                                        <div className="absolute right-3 top-1/2 -translate-y-1/2 flex items-center justify-center">
                                            {unreadCount > 0 && selectedChatUser?.id !== otherUser.id && (
                                                <div className="bg-indigo-500 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full shadow-[0_0_10px_rgba(99,102,241,0.6)] animate-pulse group-hover:scale-0 transition-transform duration-200">{unreadCount > 9 ? '9+' : unreadCount}</div>
                                            )}
                                            <button onClick={(e) => { e.stopPropagation(); setChatToDelete(chat.id); }} className={`absolute p-1.5 rounded-full text-red-400 hover:text-red-500 hover:bg-red-500/10 opacity-0 group-hover:opacity-100 transition-all scale-50 group-hover:scale-100 ${selectedChatUser?.id === otherUser.id ? 'text-indigo-200 hover:text-white hover:bg-white/20' : ''}`}><Trash2 size={16} /></button>
                                        </div>
                                    </div>
                                )
                            })
                        )
                    )}
                </div>
            </div>

            {/* Chat Area Principal */}
            <div className={`w-full md:w-2/3 flex flex-col relative bg-slate-50/50 dark:bg-black/10 ${!selectedChatUser ? 'hidden md:flex items-center justify-center' : 'flex'}`}>
                {!selectedChatUser ? (
                    <div className="text-center text-slate-500 flex flex-col items-center p-6">
                        <MessageCircle size={48} className="mb-4 opacity-20" />
                        <p>Selecione um colega ou inicie uma conversa para começar a bater papo.</p>
                    </div>
                ) : (
                    <>
                        <div className="bg-[#00a884] dark:bg-[#1f2c34] p-3 md:p-4 border-b border-slate-200 dark:border-slate-800 flex items-center gap-3 shrink-0 z-20 shadow-sm">
                            <button onClick={() => setSelectedChatUser(null)} className="md:hidden p-2 -ml-2 text-white hover:bg-white/10 rounded-full transition-colors"><ArrowLeft size={20}/></button>
                            <div className="w-10 h-10 rounded-full overflow-hidden bg-slate-200 dark:bg-slate-700 shrink-0 border border-white/20">
                                {selectedChatUser.photoBase64 ? <img src={selectedChatUser.photoBase64} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center font-bold text-slate-500">{selectedChatUser.name?.charAt(0) || 'A'}</div>}
                            </div>
                            <div>
                                <h3 className="font-bold text-white leading-tight truncate">{selectedChatUser.name}</h3>
                                <p className="text-xs text-white/80">Online</p>
                            </div>
                        </div>

                        <div className="flex-1 bg-[#efeae2] dark:bg-[#0b141a] overflow-y-auto p-3 md:p-6 space-y-3 relative custom-scrollbar z-10" onClick={() => { setContextMenuMsgIdChat(null); setShowEmojiPickerChat(false); setShowAttachmentsChat(false); }}>
                            <div className="absolute inset-0 opacity-10 pointer-events-none" style={{backgroundImage: "url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')", backgroundRepeat: 'repeat', backgroundSize: '400px'}}></div>
                            {chatMessages.filter(m => !(m.hiddenFor || []).includes(user.uid)).map(msg => {
                                if (msg.deleted) return null;
                                const isMe = msg.senderId === user.uid;
                                const isEditingThis = editingMsgIdChat === msg.id;
                                const isMenuOpen = contextMenuMsgIdChat === msg.id;

                                return (
                                    <div key={msg.id} className={`flex flex-col max-w-[85%] sm:max-w-[75%] ${isMe ? 'self-end items-end ml-auto' : 'self-start items-start'} relative ${isMenuOpen ? 'z-[999]' : 'z-10'} group`}>
                                        <div className={`p-2 rounded-2xl text-sm shadow-[0_1px_1px_rgba(0,0,0,0.1)] min-w-[120px] relative ${isMe ? 'bg-[#d9fdd3] dark:bg-[#005c4b] text-slate-900 dark:text-white rounded-tr-none' : 'bg-white dark:bg-[#202c33] text-slate-800 dark:text-slate-200 rounded-tl-none'}`}>
                                            <button onClick={(e) => { e.stopPropagation(); setContextMenuMsgIdChat(contextMenuMsgIdChat === msg.id ? null : msg.id); }} className={`absolute top-1 right-2 p-1 text-slate-400 hover:text-slate-600 dark:text-white/50 dark:hover:text-white transition-opacity z-20 ${contextMenuMsgIdChat === msg.id ? 'opacity-100 bg-black/5 dark:bg-white/5 rounded-full' : 'opacity-0 group-hover:opacity-100'}`}><ChevronDown size={18} /></button>
                                            
                                            {isMenuOpen && (
                                                <div className={`absolute top-8 ${isMe ? 'right-0' : 'left-0'} w-40 bg-white dark:bg-[#233138] rounded-xl shadow-2xl border border-slate-200 dark:border-white/5 py-2 z-[9999] animate-fade-in`}>
                                                    <button onClick={(e) => { e.stopPropagation(); setChatInput(`> Respondendo:\n${msg.content || 'Arquivo'}\n\n`); setContextMenuMsgIdChat(null); document.getElementById('chatInputFocus')?.focus(); }} className="w-full text-left px-4 py-2.5 hover:bg-slate-100 dark:hover:bg-[#111b21] text-sm flex items-center gap-3 text-slate-700 dark:text-slate-200"><CornerUpLeft size={16}/> Responder</button>
                                                    {msg.type === 'text' && <button onClick={(e) => { e.stopPropagation(); navigator.clipboard.writeText(msg.content); setContextMenuMsgIdChat(null); }} className="w-full text-left px-4 py-2.5 hover:bg-slate-100 dark:hover:bg-[#111b21] text-sm flex items-center gap-3 text-slate-700 dark:text-slate-200"><Copy size={16}/> Copiar</button>}
                                                    {isMe && msg.type === 'text' && <button onClick={(e) => { e.stopPropagation(); startEditingChat(msg); setContextMenuMsgIdChat(null); }} className="w-full text-left px-4 py-2.5 hover:bg-slate-100 dark:hover:bg-[#111b21] text-sm flex items-center gap-3 text-slate-700 dark:text-slate-200"><Edit size={16}/> Editar</button>}
                                                    {isMe && <button onClick={(e) => { e.stopPropagation(); setMsgToDeleteChat(msg); setContextMenuMsgIdChat(null); }} className="w-full text-left px-4 py-2.5 hover:bg-slate-100 dark:hover:bg-[#111b21] text-sm flex items-center gap-3 text-red-500"><Trash2 size={16}/> Apagar</button>}
                                                </div>
                                            )}

                                            <div className="pr-6 pl-1 pt-1 pb-0">
                                                {isEditingThis ? (
                                                    <div className="flex flex-col gap-2 min-w-[200px]">
                                                        <input value={editingTextChat} onChange={(e) => setEditingTextChat(e.target.value)} className="w-full px-2 py-1.5 rounded border border-blue-400 text-slate-900 text-sm focus:outline-none bg-white" autoFocus onKeyDown={(e) => e.key === 'Enter' && saveEditChat()} />
                                                        <div className="flex justify-end gap-2 mt-1">
                                                            <button onClick={cancelEditingChat} className="text-xs text-red-500 font-bold px-2">Cancelar</button>
                                                            <button onClick={saveEditChat} className="bg-green-500 text-white p-1 rounded-full"><CheckCircle size={14}/></button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="flex flex-col">{renderMsgContent(msg, isMe)}</div>
                                                )}
                                            </div>
                                            <div className="flex items-center justify-end gap-1 mt-1 opacity-70 select-none pr-1">
                                                {msg.edited && <span className="text-[9px] italic">editado</span>}
                                                <span className="text-[10px]">{msg.timestamp ? new Date(msg.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                                                {isMe && <span className="ml-0.5">{msg.read ? <CheckCheck size={14} className="text-blue-500" /> : msg.delivered ? <CheckCheck size={14} className="text-gray-500 dark:text-gray-400" /> : <Check size={14} className="text-gray-500 dark:text-gray-400" />}</span>}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            <div ref={messagesEndRefChat} />
                        </div>
                        
                        <div className="bg-[#f0f2f5] dark:bg-[#202c33] px-3 py-3 flex items-end gap-2 shrink-0 z-20 shadow-sm border-t border-slate-200 dark:border-slate-800">
                            {isLoadingMicChat ? (
                                <div className="flex-1 flex items-center justify-center gap-2 text-slate-500 animate-pulse text-sm py-2"><Mic size={18} /> <span>Iniciando gravação...</span></div>
                            ) : audioPreviewChat ? (
                                <div className="flex items-center gap-3 w-full bg-white dark:bg-[#2a3942] p-2 rounded-2xl animate-fade-in">
                                    <button onClick={cancelAudioChat} className="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-full transition-colors"><Trash2 size={20} /></button>
                                    <audio src={audioPreviewChat} controls className="h-8 w-full" />
                                    <button onClick={sendAudioChat} disabled={isUploadingChat} className="p-3 bg-[#00a884] text-white rounded-full shadow-md transition-transform hover:scale-105 active:scale-95">{isUploadingChat ? '...' : <Send size={18} className="ml-0.5"/>}</button>
                                </div>
                            ) : (
                                <>
                                    {!isRecordingChat ? (
                                        <>
                                            <div className="relative shrink-0 flex gap-1">
                                                <button onClick={(e) => { e.stopPropagation(); setShowEmojiPickerChat(!showEmojiPickerChat); setShowAttachmentsChat(false); }} className="p-2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 rounded-full"><Smile size={24}/></button>
                                                <button onClick={(e) => { e.stopPropagation(); setShowAttachmentsChat(!showAttachmentsChat); setShowEmojiPickerChat(false); }} className="p-2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 rounded-full"><Paperclip size={22} className="-rotate-45"/></button>
                                                {showAttachmentsChat && <div className="absolute bottom-full left-0 mb-3 bg-white dark:bg-[#233138] p-2 rounded-xl shadow-xl flex flex-col gap-2 w-40 animate-fade-in-up z-50">
                                                    <label className="cursor-pointer flex items-center gap-3 p-3 hover:bg-slate-100 dark:hover:bg-[#111b21] rounded-lg text-sm text-slate-700 dark:text-slate-200"><div className="bg-purple-100 text-purple-600 p-2 rounded-full"><Camera size={18}/></div> Galeria <input type="file" className="hidden" accept="image/*,video/*" onChange={handleChatFileUpload} disabled={isUploadingChat} /></label>
                                                    <label className="cursor-pointer flex items-center gap-3 p-3 hover:bg-slate-100 dark:hover:bg-[#111b21] rounded-lg text-sm text-slate-700 dark:text-slate-200"><div className="bg-blue-100 text-blue-600 p-2 rounded-full"><FileText size={18}/></div> Documento <input type="file" className="hidden" accept=".pdf,.doc,.docx" onChange={handleChatFileUpload} disabled={isUploadingChat} /></label>
                                                </div>}
                                                {showEmojiPickerChat && <div className="absolute bottom-full left-0 mb-3 bg-white dark:bg-[#233138] p-3 rounded-xl shadow-xl grid grid-cols-4 gap-2 w-64 animate-fade-in-up z-50">
                                                    {quickEmojis.map(e => <button key={e} onClick={(ev) => { ev.stopPropagation(); setChatInput(prev => prev + e); setShowEmojiPickerChat(false); }} className="text-2xl hover:bg-slate-100 dark:hover:bg-[#111b21] rounded p-1 transition-colors">{e}</button>)}
                                                </div>}
                                            </div>
                                            <form onSubmit={(e) => { e.preventDefault(); sendChatMessage('text'); }} className="flex-1 bg-white dark:bg-[#2a3942] rounded-full flex items-center px-4 shadow-sm min-h-[44px]">
                                                <input id="chatInputFocus" value={chatInput} onChange={(e) => setChatInput(e.target.value)} className="w-full py-2 bg-transparent border-none focus:ring-0 text-sm dark:text-white placeholder-slate-400 outline-none" placeholder={isUploadingChat ? "Enviando arquivo..." : "Mensagem"} disabled={isUploadingChat} />
                                            </form>
                                            <div className="shrink-0">
                                                {chatInput.trim() ? (
                                                    <button onClick={() => sendChatMessage('text')} disabled={isUploadingChat} className="w-11 h-11 bg-[#00a884] text-white rounded-full shadow-md flex items-center justify-center transition-transform hover:scale-105 active:scale-95 disabled:opacity-50"><Send size={20} className="ml-1" /></button>
                                                ) : (
                                                    <button onClick={startRecordingChat} className="w-11 h-11 bg-[#00a884] text-white rounded-full shadow-md flex items-center justify-center transition-transform hover:scale-105 active:scale-95"><Mic size={22} /></button>
                                                )}
                                            </div>
                                        </>
                                    ) : (
                                        <div className="flex-1 bg-white dark:bg-[#2a3942] rounded-full flex items-center justify-between p-1.5 shadow-sm animate-fade-in pl-4 pr-1">
                                            <div className="flex items-center gap-3 text-red-500">
                                                <Mic size={18} className="animate-pulse" />
                                                <span className="text-sm font-mono text-slate-800 dark:text-white w-12">{formatDuration(recordingTimeChat)}</span>
                                                <div className="text-xs text-slate-400 hidden sm:block">Gravando...</div>
                                            </div>
                                            <button onClick={stopRecordingChat} className="w-10 h-10 bg-red-500 text-white rounded-full flex items-center justify-center hover:bg-red-600 transition-colors shadow-md"><Square size={14} fill="currentColor" /></button>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    </>
                )}
            </div>
        </div>
    );

    return (
        <div className="flex w-full bg-transparent overflow-hidden relative h-[calc(100vh-140px)] md:h-[calc(100vh-100px)] animate-fade-in">
            
            {/* CRIADOR DE TRIBOS (MODAL ATUALIZADO COM IMAGENS) */}
            {isCreatingComm && (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in" onClick={() => setIsCreatingComm(false)}>
                     <form onSubmit={handleCreateCommunity} className="bg-[#111] p-6 md:p-8 rounded-3xl w-full max-w-md border border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.8)] flex flex-col gap-4" onClick={e=>e.stopPropagation()}>
                         <h3 className="text-xl font-bold text-white text-center mb-2">Fundar Nova Tribo</h3>
                         
                         {/* PREVIEW DA CAPA E AVATAR */}
                         <div className="relative w-full h-32 md:h-40 bg-slate-800 rounded-xl overflow-hidden mb-4 border border-white/10 group shadow-inner">
                             {commCoverPreview ? (
                                 <img src={commCoverPreview} className="w-full h-full object-cover" alt="Capa" />
                             ) : (
                                 <div className="w-full h-full flex flex-col items-center justify-center text-slate-500 text-xs bg-gradient-to-r from-indigo-900/50 to-purple-900/50">
                                     <ImageIcon size={24} className="mb-2 opacity-50" />
                                     Sem Capa
                                 </div>
                             )}
                             <label className="absolute top-2 right-2 p-2 bg-black/60 hover:bg-black text-white rounded-full cursor-pointer transition-colors shadow-lg border border-white/20">
                                 <Camera size={14}/>
                                 <input type="file" className="hidden" accept="image/*" onChange={(e) => handleCommImageSelect(e, 'cover')} />
                             </label>
                             
                             {/* AVATAR CIRCULAR SOBREPOSTO */}
                             <div className="absolute -bottom-6 left-6 w-20 h-20 md:w-24 md:h-24 rounded-full border-4 border-[#111] bg-slate-700 overflow-hidden shadow-2xl group/avatar cursor-pointer">
                                 {commAvatarPreview ? (
                                     <img src={commAvatarPreview} className="w-full h-full object-cover" alt="Avatar" />
                                 ) : (
                                     <div className="w-full h-full flex items-center justify-center text-white font-black text-2xl bg-indigo-600">
                                         {newCommName ? newCommName.charAt(0).toUpperCase() : 'T'}
                                     </div>
                                 )}
                                 <label className="absolute inset-x-0 bottom-0 bg-black/60 py-1.5 flex justify-center cursor-pointer hover:bg-black/80 transition-colors">
                                     <Camera size={12} className="text-white"/>
                                     <input type="file" className="hidden" accept="image/*" onChange={(e) => handleCommImageSelect(e, 'avatar')} />
                                 </label>
                             </div>
                         </div>

                         <div className="mt-4">
                             <input value={newCommName} onChange={e=>setNewCommName(e.target.value)} placeholder="Nome da Tribo (Ex: Turma da Manhã)" className="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white mb-3 outline-none focus:border-indigo-500 transition-colors text-sm shadow-inner" required />
                             <textarea value={newCommDesc} onChange={e=>setNewCommDesc(e.target.value)} placeholder="Qual o propósito deste grupo?" className="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white h-24 outline-none focus:border-indigo-500 transition-colors resize-none text-sm shadow-inner" required />
                         </div>
                         
                         <div className="flex gap-3 mt-2">
                             <button type="button" onClick={()=>setIsCreatingComm(false)} className="flex-1 p-3.5 bg-white/5 hover:bg-white/10 text-white rounded-xl font-bold text-sm transition-colors border border-white/5">Cancelar</button>
                             <button type="submit" disabled={isSubmittingComm} className="flex-1 p-3.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold shadow-lg shadow-indigo-500/30 transition-all active:scale-95 flex justify-center items-center text-sm disabled:opacity-50">
                                 {isSubmittingComm ? <div className="w-4 h-4 border-2 border-white/50 border-t-white rounded-full animate-spin"></div> : 'Criar Tribo'}
                             </button>
                         </div>
                     </form>
                </div>
            )}

            {/* MODAL GERENCIAR TRIBO (PARA O LÍDER APROVAR/REMOVER) */}
            {managingComm && (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in" onClick={() => setManagingComm(null)}>
                    <div className="bg-[#111] p-6 md:p-8 rounded-3xl w-full max-w-2xl border border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.8)] max-h-[85vh] overflow-y-auto custom-scrollbar" onClick={e=>e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-2xl font-black text-white">Gerenciar Tribo</h3>
                            <button onClick={() => setManagingComm(null)} className="p-2 bg-white/10 hover:bg-red-500 rounded-full text-white transition-colors"><X size={20}/></button>
                        </div>
                        
                        <div className="mb-8">
                            <h4 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Solicitações Pendentes ({(managingComm.pendingRequests || []).length})</h4>
                            {(managingComm.pendingRequests || []).length === 0 ? (
                                <p className="text-xs text-slate-500 italic bg-white/5 p-4 rounded-xl border border-white/5">Nenhuma solicitação pendente.</p>
                            ) : (
                                <div className="space-y-3">
                                    {managingComm.pendingRequests.map(uid => {
                                        const reqUser = getMemberData(uid);
                                        return (
                                            <div key={uid} className="flex items-center justify-between bg-black/40 p-4 rounded-2xl border border-white/5">
                                                <div className="flex items-center gap-3">
                                                    <img src={reqUser.photo || 'https://via.placeholder.com/50'} className="w-10 h-10 rounded-full object-cover border border-white/10"/>
                                                    <span className="text-white font-bold text-sm">{reqUser.name}</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => handleDenyRequest(managingComm.id, uid)} className="px-4 py-2 bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white rounded-lg text-xs font-bold transition-colors">Recusar</button>
                                                    <button onClick={() => handleApproveRequest(managingComm.id, uid)} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-xs font-bold transition-colors">Aprovar</button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>

                        <div>
                            <h4 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Membros Atuais ({(managingComm.members || [managingComm.creatorId]).length})</h4>
                            <div className="space-y-3">
                                {(managingComm.members || [managingComm.creatorId]).map(uid => {
                                    const memUser = getMemberData(uid);
                                    return (
                                        <div key={uid} className="flex items-center justify-between bg-black/40 p-4 rounded-2xl border border-white/5">
                                            <div className="flex items-center gap-3">
                                                <img src={memUser.photo || 'https://via.placeholder.com/50'} className="w-10 h-10 rounded-full object-cover border border-white/10"/>
                                                <div>
                                                    <span className="text-white font-bold text-sm block">{memUser.name}</span>
                                                    {uid === managingComm.creatorId && <span className="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Líder</span>}
                                                </div>
                                            </div>
                                            {uid !== managingComm.creatorId && (
                                                <button onClick={() => handleRemoveMember(managingComm.id, uid)} className="p-2 text-slate-500 hover:text-red-500 bg-white/5 hover:bg-red-500/10 rounded-lg transition-colors" title="Expulsar Membro"><Trash2 size={18}/></button>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* Modais Globais Feed */}
            {postToDelete && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/60 backdrop-blur-md animate-fade-in" onClick={() => setPostToDelete(null)}>
                    <div className="bg-[#111] rounded-3xl p-8 shadow-2xl max-w-sm w-full border border-white/10 text-center" onClick={e=>e.stopPropagation()}>
                        <div className="w-16 h-16 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6"><Trash2 size={28}/></div>
                        <h3 className="text-xl font-bold text-white mb-2">Excluir Publicação?</h3>
                        <p className="text-sm text-slate-400 mb-8">Esta ação apagará o post permanentemente da comunidade.</p>
                        <div className="flex gap-3">
                            <button onClick={() => setPostToDelete(null)} className="flex-1 py-3.5 rounded-xl border border-white/10 text-white font-bold hover:bg-white/5 transition-colors">Cancelar</button>
                            <button onClick={confirmDeletePost} className="flex-1 py-3.5 rounded-xl bg-red-600 hover:bg-red-700 text-white font-bold shadow-[0_8px_20px_rgba(220,38,38,0.3)] transition-all">Excluir</button>
                        </div>
                    </div>
                </div>
            )}

            {commentToDelete && (
                <div className="fixed inset-0 z-[160] flex items-center justify-center p-4 bg-black/60 backdrop-blur-md animate-fade-in" onClick={() => setCommentToDelete(null)}>
                    <div className="bg-[#111] rounded-3xl p-8 shadow-2xl max-w-sm w-full border border-white/10 text-center" onClick={e=>e.stopPropagation()}>
                        <div className="w-16 h-16 bg-orange-500/20 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6"><MessageCircle size={28}/></div>
                        <h3 className="text-xl font-bold text-white mb-2">Apagar Comentário?</h3>
                        <div className="flex gap-3 mt-8">
                            <button onClick={() => setCommentToDelete(null)} className="flex-1 py-3.5 rounded-xl border border-white/10 text-white font-bold hover:bg-white/5 transition-colors">Cancelar</button>
                            <button onClick={executeDeleteComment} className="flex-1 py-3.5 rounded-xl bg-red-600 hover:bg-red-700 text-white font-bold shadow-[0_8px_20px_rgba(220,38,38,0.3)] transition-all">Apagar</button>
                        </div>
                    </div>
                </div>
            )}

            {/* BARRA DE NAVEGAÇÃO SUPERIOR DO FEED / MENSAGENS */}
            <div className="absolute top-0 left-0 right-0 z-30 bg-[#050505]/90 backdrop-blur-xl border-b border-white/10 shadow-sm p-4 md:p-6 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-3 w-full sm:w-auto">
                    <div className="p-2.5 md:p-3 bg-indigo-600 rounded-xl shadow-[0_4px_15px_rgba(79,70,229,0.4)] text-white shrink-0">
                        {communityTab === 'mensagens' ? <MessageCircle className="w-5 h-5" /> : (communityTab === 'tribos' ? <UserCircle className="w-5 h-5" /> : <LayoutGrid className="w-5 h-5" />)}
                    </div>
                    <div className="flex-1 min-w-0">
                        <h2 className="text-lg md:text-xl font-black text-white tracking-tight truncate">
                            {communityTab === 'mensagens' ? 'Mensagens Diretas' : (communityTab === 'tribos' ? 'Grupos & Tribos' : 'Comunidade Global')}
                        </h2>
                        <p className="text-[10px] md:text-xs text-slate-400 truncate">Sua rede de networking e suporte.</p>
                    </div>
                </div>
                
                <div className="flex bg-white/5 p-1 rounded-lg w-full sm:w-fit border border-white/10">
                    <button onClick={() => { setCommunityTab('feed'); setActiveCommunity(null); }} className={`flex-1 sm:flex-none px-4 py-2 rounded-md text-xs font-bold transition-all ${communityTab === 'feed' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}>Feed Global</button>
                    <button onClick={() => { setCommunityTab('tribos'); setActiveCommunity(null); }} className={`flex-1 sm:flex-none px-4 py-2 rounded-md text-xs font-bold transition-all ${communityTab === 'tribos' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}>Tribos</button>
                    <button onClick={() => { setCommunityTab('mensagens'); setActiveCommunity(null); }} className={`flex-1 sm:flex-none px-4 py-2 rounded-md text-xs font-bold transition-all ${communityTab === 'mensagens' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}>Mensagens</button>
                </div>
            </div>

            {/* SE ESTIVER NO MODO FEED OU TRIBOS, MOSTRA A ÁREA PRINCIPAL */}
            {(communityTab === 'feed' || communityTab === 'tribos') && (
                <div className="flex w-full h-full pt-[120px] md:pt-[100px]">
                    
                    {/* Sidebar Esquerda (Filtros) */}
                    <div className={`hidden lg:flex w-72 p-6 border-r border-white/10 bg-transparent overflow-y-auto flex-col ${activeCommunity || communityTab === 'tribos' ? '!hidden' : ''}`}>
                        <div className="space-y-2">
                            <h3 className="px-4 text-xs font-black text-slate-500 uppercase tracking-widest mb-4">Filtros</h3>
                            <button onClick={() => setActiveFilter('all')} className={`w-full flex items-center gap-3 px-5 py-3.5 rounded-2xl text-[15px] font-bold transition-all duration-300 ${activeFilter === 'all' ? 'bg-indigo-600 text-white shadow-[0_8px_20px_rgba(79,70,229,0.3)]' : 'bg-white/5 text-slate-400 hover:bg-white/10 hover:text-white border border-white/5'}`}><LayoutGrid size={20} /> Todas Publicações</button>
                            <button onClick={() => setActiveFilter('saved')} className={`w-full flex items-center gap-3 px-5 py-3.5 rounded-2xl text-[15px] font-bold transition-all duration-300 ${activeFilter === 'saved' ? 'bg-yellow-500 text-white shadow-[0_8px_20px_rgba(234,179,8,0.3)]' : 'bg-white/5 text-slate-400 hover:bg-white/10 hover:text-white border border-white/5'}`}><Bookmark size={20} /> Itens Salvos</button>
                            <button onClick={() => setActiveFilter('mine')} className={`w-full flex items-center gap-3 px-5 py-3.5 rounded-2xl text-[15px] font-bold transition-all duration-300 ${activeFilter === 'mine' ? 'bg-purple-600 text-white shadow-[0_8px_20px_rgba(147,51,234,0.3)]' : 'bg-white/5 text-slate-400 hover:bg-white/10 hover:text-white border border-white/5'}`}><User size={20} /> Minhas Postagens</button>
                        </div>
                    </div>

                    {/* Área Central (Posts ou Grid de Tribos) */}
                    <div className="flex-1 h-full overflow-y-auto custom-scrollbar relative px-4 md:px-0">
                        <div className="max-w-2xl lg:max-w-3xl mx-auto pb-20 mt-4">
                            
                            {/* Filtros Mobile */}
                            {communityTab === 'feed' && !activeCommunity && (
                                <div className="flex lg:hidden gap-2 overflow-x-auto pb-4 w-full snap-x [&::-webkit-scrollbar]:hidden">
                                    <button onClick={() => setActiveFilter('all')} className={`snap-start flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-full text-[10px] font-bold transition-all whitespace-nowrap shrink-0 border ${activeFilter === 'all' ? 'bg-indigo-600 text-white border-indigo-500 shadow-[0_0_10px_rgba(79,70,229,0.4)]' : 'bg-white/5 text-slate-400 border-white/10'}`}>Todas</button>
                                    <button onClick={() => setActiveFilter('saved')} className={`snap-start flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-full text-[10px] font-bold transition-all whitespace-nowrap shrink-0 border ${activeFilter === 'saved' ? 'bg-yellow-500 text-white border-yellow-400 shadow-[0_0_10px_rgba(234,179,8,0.4)]' : 'bg-white/5 text-slate-400 border-white/10'}`}>Salvos</button>
                                    <button onClick={() => setActiveFilter('mine')} className={`snap-start flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-full text-[10px] font-bold transition-all whitespace-nowrap shrink-0 border ${activeFilter === 'mine' ? 'bg-purple-600 text-white border-purple-500 shadow-[0_0_10px_rgba(147,51,234,0.4)]' : 'bg-white/5 text-slate-400 border-white/10'}`}>Meus Posts</button>
                                </div>
                            )}

                            {/* CABEÇALHO DA TRIBO ATIVA (AGORA COM DESIGN DE CAPA E AVATAR) */}
                            {activeCommunity && (
                                <div className="bg-[#111] border border-white/10 rounded-[2rem] mb-6 shadow-xl relative overflow-hidden animate-fade-in flex flex-col">
                                    {/* SE FOR BANIDA */}
                                    {activeCommunity.banned ? (
                                        <div className="flex flex-col items-center justify-center p-10 bg-red-900/20 border border-red-500/50 rounded-[2rem] text-center shadow-2xl animate-scale-in backdrop-blur-md">
                                            <div className="w-20 h-20 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center mb-6 border border-red-500/30 shadow-inner"><Lock size={40} /></div>
                                            <h2 className="text-2xl font-black text-white mb-3">Comunidade Suspensa</h2>
                                            <p className="text-red-300 text-sm md:text-base mb-8 max-w-md leading-relaxed bg-red-950/50 p-4 rounded-xl border border-red-500/20">
                                                {activeCommunity.banMessage || "Esta comunidade violou os termos de uso e foi desativada permanentemente."}
                                            </p>
                                            <button onClick={() => setActiveCommunity(null)} className="px-8 py-3 bg-red-600 hover:bg-red-700 rounded-xl text-white font-bold transition-colors shadow-lg active:scale-95">
                                                Voltar para Comunidades
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            {/* CAPA DA TRIBO */}
                                            <div className="relative w-full h-32 md:h-56 bg-slate-800 group/cover">
                                                {activeCommunity.coverUrl ? (
                                                    <img src={activeCommunity.coverUrl} className="w-full h-full object-cover" alt="Capa" />
                                                ) : (
                                                    <div className="w-full h-full bg-gradient-to-r from-indigo-900 to-purple-900"></div>
                                                )}
                                                
                                                {/* Gradiente escuro embaixo para dar contraste ao texto/avatar */}
                                                <div className="absolute inset-0 bg-gradient-to-t from-[#111] via-transparent to-transparent"></div>

                                                {/* BOTÃO VOLTAR */}
                                                <button onClick={() => setActiveCommunity(null)} className="absolute top-4 left-4 bg-black/50 hover:bg-black/80 text-white p-2 rounded-full backdrop-blur-md transition-colors border border-white/20 shadow-md">
                                                    <ArrowLeft size={16}/>
                                                </button>

                                                {/* LÍDER PODE EDITAR A CAPA */}
                                                {activeCommunity.creatorId === user.uid && (
                                                    <label className="absolute top-4 right-4 p-2.5 bg-black/50 hover:bg-black/80 rounded-full text-white cursor-pointer backdrop-blur-md transition-colors border border-white/20 shadow-md opacity-0 group-hover/cover:opacity-100 hidden md:flex items-center gap-2">
                                                        <Edit size={16} /> <span className="text-xs font-bold px-1">Editar Capa</span>
                                                        <input type="file" className="hidden" accept="image/*" onChange={(e) => handleUpdateCommImage(e, 'cover')} />
                                                    </label>
                                                )}
                                            </div>

                                            {/* CONTEÚDO E AVATAR SOBREPOSTO */}
                                            <div className="px-6 md:px-8 pb-6 md:pb-8 relative flex flex-col">
                                                
                                                <div className="flex flex-col md:flex-row justify-between md:items-end -mt-10 md:-mt-14 mb-4 md:mb-6 gap-4">
                                                    {/* AVATAR */}
                                                    <div className="relative w-20 h-20 md:w-28 md:h-28 rounded-full border-4 border-[#111] bg-slate-800 shrink-0 shadow-xl overflow-hidden group/avatar">
                                                        {activeCommunity.avatarUrl ? (
                                                            <img src={activeCommunity.avatarUrl} className="w-full h-full object-cover" alt="Avatar" />
                                                        ) : (
                                                            <div className="w-full h-full bg-indigo-600 flex items-center justify-center text-3xl font-black text-white">
                                                                {activeCommunity.name.charAt(0).toUpperCase()}
                                                            </div>
                                                        )}
                                                        {/* LÍDER PODE EDITAR O AVATAR */}
                                                        {activeCommunity.creatorId === user.uid && (
                                                            <label className="absolute inset-x-0 bottom-0 bg-black/60 hover:bg-black/80 py-1.5 cursor-pointer backdrop-blur-md transition-colors flex justify-center opacity-0 group-hover/avatar:opacity-100">
                                                                <Camera size={14} className="text-white"/>
                                                                <input type="file" className="hidden" accept="image/*" onChange={(e) => handleUpdateCommImage(e, 'avatar')} />
                                                            </label>
                                                        )}
                                                    </div>

                                                    {/* BOTÕES DE AÇÃO DO LÍDER */}
                                                    {activeCommunity.creatorId === user.uid && (
                                                        <div className="flex gap-2">
                                                            {/* Botão de Capa Mobile (já que o hover da capa não funciona no celular) */}
                                                            <label className="md:hidden px-4 py-2 bg-white/5 hover:bg-white/10 rounded-xl text-xs font-bold text-white transition-all border border-white/10 flex items-center gap-1.5 cursor-pointer">
                                                                <ImageIcon size={14}/> Capa
                                                                <input type="file" className="hidden" accept="image/*" onChange={(e) => handleUpdateCommImage(e, 'cover')} />
                                                            </label>
                                                            
                                                            <button onClick={() => setManagingComm(activeCommunity)} className="px-4 py-2 bg-indigo-600/20 hover:bg-indigo-600 text-indigo-300 hover:text-white rounded-xl text-xs font-bold transition-all border border-indigo-500/30 flex items-center gap-1.5">
                                                                <Settings size={14}/> Gerenciar Membros
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>

                                                <div>
                                                    <h2 className="text-2xl md:text-3xl font-black text-white tracking-tight mb-2 leading-tight">{activeCommunity.name}</h2>
                                                    <p className="text-sm text-slate-400 mb-6 max-w-3xl leading-relaxed">{activeCommunity.description}</p>
                                                    
                                                    <div className="flex gap-2 bg-black/40 p-1.5 rounded-xl w-fit border border-white/10">
                                                        <button onClick={() => setActiveCommTab('feed')} className={`px-5 py-2.5 rounded-lg text-xs font-bold transition-all ${activeCommTab === 'feed' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}>Mural da Tribo</button>
                                                        <button onClick={() => setActiveCommTab('membros')} className={`px-5 py-2.5 rounded-lg text-xs font-bold transition-all ${activeCommTab === 'membros' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}>Membros ({(activeCommunity.members || [activeCommunity.creatorId]).length})</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}

                            {!activeCommunity?.banned && (
                                <>
                                    {/* ÁREA DE POSTAGEM (Feed Geral ou Tribo) */}
                                    {communityTab === 'feed' && activeFilter !== 'saved' && (!activeCommunity || activeCommTab === 'feed') && (
                                        <div className="bg-[#111] rounded-[2rem] border border-white/10 p-5 md:p-6 mb-6 shadow-lg">
                                            <div className="flex gap-4 mb-4">
                                                <div className="w-12 h-12 rounded-full bg-slate-800 overflow-hidden shrink-0 border border-white/20">
                                                    {user.photoURL ? <img src={user.photoURL} className="w-full h-full object-cover" /> : <div className="flex items-center justify-center h-full font-bold text-slate-500">{user.displayName?.charAt(0)}</div>}
                                                </div>
                                                <div className="flex-1 bg-black/50 rounded-2xl px-5 py-3 border border-white/5 focus-within:border-indigo-500/50 transition-all">
                                                    <textarea value={newPostText} onChange={(e) => setNewPostText(e.target.value)} placeholder={activeCommunity ? `Compartilhe algo com a tribo ${activeCommunity.name}...` : "Compartilhe algo com a comunidade global..."} className="w-full bg-transparent border-none text-white placeholder-slate-500 focus:ring-0 outline-none resize-none min-h-[60px] text-sm font-medium" />
                                                </div>
                                            </div>
                                            
                                            {mediaPreview && (
                                                <div className="mb-5 relative rounded-2xl overflow-hidden bg-black max-h-[300px] border border-white/10 flex justify-center">
                                                    <button onClick={(e) => { e.preventDefault(); setMediaPreview(null); setNewPostMedia(null); }} className="absolute top-3 right-3 bg-black/60 backdrop-blur-md text-white rounded-full p-2 hover:bg-red-500 z-10 transition-colors"><X size={18}/></button>
                                                    {newPostMedia?.type?.includes('video') ? <video src={mediaPreview} className="w-full h-full object-contain" controls /> : <img src={mediaPreview} className="w-full h-full object-contain" alt="Preview"/>}
                                                </div>
                                            )}

                                            <div className="flex justify-between items-center border-t border-white/10 pt-5 mt-2">
                                                <label className="flex items-center gap-2 text-slate-300 text-sm font-bold cursor-pointer hover:bg-white/5 px-4 py-2.5 rounded-xl transition-colors">
                                                    <ImageIcon size={20} className="text-emerald-500" /> <span className="hidden sm:inline">Adicionar Imagem/Vídeo</span>
                                                    <input type="file" className="hidden" accept="image/*,video/*" onChange={handleFileSelect} />
                                                </label>
                                                <button onClick={handleCreatePost} disabled={isPosting || (!(typeof newPostText === 'string' ? newPostText : "").trim() && !newPostMedia)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-extrabold shadow-lg disabled:opacity-50 flex items-center gap-2 transition-all active:scale-95">
                                                    {isPosting ? <div className="w-4 h-4 border-2 border-white/50 border-t-white rounded-full animate-spin"></div> : <><Send size={18} /> Publicar</>}
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {/* LISTAGEM DOS POSTS */}
                                    {communityTab === 'feed' && (!activeCommunity || activeCommTab === 'feed') && (
                                        <div className="space-y-6 pb-10">
                                            {visiblePosts.length === 0 ? (
                                                <div className="py-20 flex flex-col items-center justify-center border border-dashed border-white/10 rounded-[2rem] bg-white/5">
                                                    <div className="w-16 h-16 bg-indigo-500/20 text-indigo-400 rounded-full flex items-center justify-center mb-4"><MessageSquare size={32} /></div>
                                                    <h3 className="text-xl font-bold text-white mb-2">Nenhuma publicação ainda</h3>
                                                </div>
                                            ) : (
                                                visiblePosts.map(post => {
                                                    const isLiked = (post.likes || []).includes(user.uid);
                                                    const isSaved = (post.savedBy || []).includes(user.uid);
                                                    const correctedUrl = fixUrl(post.mediaUrl || post.image || post.video);
                                                    const isOwner = post.userId === user.uid;
                                                    const authorProfile = userProfiles[post.userId] || {};
                                                    const authorName = authorProfile.name || post.userName;
                                                    const authorPhoto = authorProfile.photo || post.userPhoto;

                                                    return (
                                                        <div key={post.id} className="bg-[#111] rounded-[2rem] shadow-lg border border-white/10 overflow-hidden animate-fade-in group transition-all duration-500">
                                                            <div className="p-5 md:p-6 flex justify-between items-start">
                                                                <div className="flex gap-4 items-center">
                                                                    <div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-slate-800 overflow-hidden shrink-0 border border-white/20">
                                                                        {authorPhoto ? <img src={authorPhoto} className="w-full h-full object-cover" /> : <div className="flex items-center justify-center h-full font-bold text-slate-500 text-sm">{authorName?.charAt(0)}</div>}
                                                                    </div>
                                                                    <div>
                                                                        <h4 className="font-bold text-white text-base tracking-tight">{authorName}</h4>
                                                                        <div className="flex items-center gap-2">
                                                                            <p className="text-xs text-slate-400 font-medium">{formatPostDate(post.createdAt)}</p>
                                                                            {!activeCommunity && post.communityId && (
                                                                                <span className="text-[9px] bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded-full font-bold uppercase border border-indigo-500/30">{post.communityName}</span>
                                                                            )}
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                                <div className="flex items-center gap-1">
                                                                    <button onClick={() => handleSavePost(post.id, post.savedBy)} className={`p-2 rounded-xl transition-colors ${isSaved ? 'text-yellow-500 bg-yellow-500/10' : 'text-slate-400 hover:bg-white/5'}`}><Bookmark size={18} className={isSaved ? "fill-current" : ""} /></button>
                                                                    {isOwner && <button onClick={() => setPostToDelete(post)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-500/10 rounded-xl transition-colors"><Trash2 size={18}/></button>}
                                                                </div>
                                                            </div>

                                                            {post.text && <div className="px-5 md:px-6 pb-4"><p className="text-slate-200 whitespace-pre-wrap leading-relaxed text-sm md:text-[15px]">{post.text}</p></div>}
                                                            
                                                            {correctedUrl && (
                                                                <div className="w-full bg-black mt-2 relative overflow-hidden cursor-pointer select-none border-y border-white/5" onDoubleClick={() => handleDoubleTap(post.id, post.likes)}>
                                                                    {heartAnim === post.id && <div className="absolute inset-0 flex items-center justify-center z-30 pointer-events-none animate-like"><Heart size={100} className="text-white fill-white drop-shadow-2xl" /></div>}
                                                                    {post.mediaType === 'video' || post.video ? (
                                                                        <video src={correctedUrl} controls controlsList="nodownload noplaybackrate" disablePictureInPicture className="w-full max-h-[500px] mx-auto bg-black" />
                                                                    ) : (
                                                                        <img src={correctedUrl} className="w-full h-auto max-h-[500px] object-contain mx-auto" loading="lazy" />
                                                                    )}
                                                                </div>
                                                            )}

                                                            <div className="px-5 md:px-6 py-3 border-t border-white/10 flex gap-6">
                                                                <button onClick={() => handleLike(post.id, post.likes)} className={`flex items-center gap-2 text-sm font-bold transition-all active:scale-95 ${isLiked ? 'text-pink-500' : 'text-slate-400 hover:text-pink-500'}`}>
                                                                    <Heart size={20} className={isLiked ? "fill-current" : ""} /> {post.likes?.length || 0}
                                                                </button>
                                                                <button onClick={() => toggleComments(post.id)} className={`flex items-center gap-2 text-sm font-bold transition-colors ${activeCommentId === post.id ? 'text-indigo-400' : 'text-slate-400 hover:text-indigo-400'}`}>
                                                                    <MessageCircle size={20} /> {(post.comments || []).length}
                                                                </button>
                                                            </div>

                                                            {/* Comentários */}
                                                            {activeCommentId === post.id && (
                                                                <div className="bg-black/20 border-t border-white/10 p-4 md:p-6 animate-fade-in">
                                                                    <div className="space-y-4 mb-4 max-h-80 overflow-y-auto custom-scrollbar pr-2">
                                                                        {(post.comments || []).map((comment, idx) => {
                                                                            const cName = userProfiles[comment.userId]?.name || comment.userName;
                                                                            const cPhoto = userProfiles[comment.userId]?.photo || comment.userPhoto;
                                                                            return (
                                                                                <div key={idx} className="flex gap-3 text-sm group/comment">
                                                                                    <div className="w-8 h-8 rounded-full bg-slate-700 flex-shrink-0 overflow-hidden border border-white/20"><img src={cPhoto||'https://via.placeholder.com/50'} className="w-full h-full object-cover"/></div>
                                                                                    <div className="flex-1">
                                                                                        <div className="bg-white/5 p-3.5 rounded-2xl rounded-tl-none border border-white/5">
                                                                                            <div className="flex justify-between items-center mb-1"><span className="font-bold text-xs text-white">{cName}</span></div>
                                                                                            <p className="text-slate-300 leading-relaxed text-[13px]">{comment.text}</p>
                                                                                        </div>
                                                                                        {comment.userId === user.uid && <button onClick={() => setCommentToDelete({ postId: post.id, commentId: comment.id, currentComments: post.comments })} className="text-[10px] font-bold text-red-400 hover:text-red-500 mt-1 ml-2 opacity-0 group-hover/comment:opacity-100 transition-opacity">Excluir</button>}
                                                                                    </div>
                                                                                </div>
                                                                            );
                                                                        })}
                                                                    </div>
                                                                    <div className="flex gap-2 relative">
                                                                        <input value={commentText} onChange={(e) => setCommentText(e.target.value)} placeholder="Escreva um comentário..." className="w-full bg-black/40 border border-white/10 rounded-full py-3 px-4 pr-12 focus:ring-2 focus:ring-indigo-500 text-sm outline-none text-white placeholder-slate-500" onKeyDown={(e) => e.key === 'Enter' && handleSendComment(post.id, post.comments)} />
