<script>
    (function() {
      // 1. Define a função globalmente para poder ser usada pelo React depois
      window.applyTheme = function(theme) {
        if (!theme) return;
        const root = document.documentElement;

        const darkenHex = (hex, percent) => {
          if (!hex) return '#000000';
          hex = hex.replace('#', '');
          if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
          let r = parseInt(hex.substring(0, 2), 16);
          let g = parseInt(hex.substring(2, 4), 16);
          let b = parseInt(hex.substring(4, 6), 16);
          r = Math.max(0, Math.floor(r * (100 - percent) / 100));
          g = Math.max(0, Math.floor(g * (100 - percent) / 100));
          b = Math.max(0, Math.floor(b * (100 - percent) / 100));
          return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
        };

        if (theme.primaryColor) {
          root.style.setProperty('--color-primary', theme.primaryColor);
          root.style.setProperty('--color-primary-hover', darkenHex(theme.primaryColor, 15)); 
          root.style.setProperty('--color-primary-soft', theme.primaryColor + '26'); 
        }
        if (theme.secondaryColor) root.style.setProperty('--color-secondary', theme.secondaryColor);
        if (theme.backgroundLight) root.style.setProperty('--background-light', theme.backgroundLight);
        if (theme.backgroundDark) root.style.setProperty('--background-dark', theme.backgroundDark);
        if (theme.textLight) root.style.setProperty('--text-light', theme.textLight);
        if (theme.textDark) root.style.setProperty('--text-dark', theme.textDark);
      };

      // 2. Define o Tema Padrão (Fallback de Segurança)
      const defaultTheme = {
        primaryColor: '#4f46e5',
        secondaryColor: '#fbbf24',
        backgroundLight: '#f8fafc',
        backgroundDark: '#0a0a0a',
        textLight: '#0f172a',
        textDark: '#f8fafc'
      };

      // 3. Execução Imediata: Tenta ler o Cache do Navegador
      try {
        const savedTheme = localStorage.getItem('siteTheme');
        if (savedTheme) {
          window.applyTheme(JSON.parse(savedTheme));
        } else {
          window.applyTheme(defaultTheme);
        }
      } catch (e) {
        console.error("Erro ao ler tema local:", e);
        window.applyTheme(defaultTheme);
      }
    })();
  </script>

    const PopupManager = ({ user }) => {
        const [campaigns, setCampaigns] = useState([]);
        const [currentCampaign, setCurrentCampaign] = useState(null);
        const [currentIndex, setCurrentIndex] = useState(0);
        const [isVisible, setIsVisible] = useState(false);

        // 1. Busca e Filtra Campanhas
        useEffect(() => {
            if (!db || !user) return;
            
            const q = query(collection(db, 'communications'));
            
            const unsubscribe = onSnapshot(q, (snapshot) => {
                const now = new Date();
                
                const validCampaigns = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return { 
                        id: doc.id, 
                        ...data,
                        inicio: data.inicio ? (data.inicio.toDate ? data.inicio.toDate() : new Date(data.inicio)) : null,
                        fim: data.fim ? (data.fim.toDate ? data.fim.toDate() : new Date(data.fim)) : null,
                        updatedAt: data.updatedAt ? (data.updatedAt.toDate ? data.updatedAt.toDate() : new Date(data.updatedAt)) : new Date(0) 
                    };
                })
                .filter(c => {
                    if (c.active === false) return false;
                    if (c.inicio && now < c.inicio) return false;
                    if (c.fim && now > c.fim) return false;
                    if (!c.itens || c.itens.length === 0) return false;
                    return true;
                });

                setCampaigns(validCampaigns);
            });
            return () => unsubscribe();
        }, [user]);

        // 2. Lógica de Exibição (Compara Datas)
        useEffect(() => {
            if (campaigns.length === 0 || isVisible) return;

            const campanhaParaMostrar = campaigns[0];

            if (campanhaParaMostrar) {
                const storageKey = `popup_log_${user.uid}_${campanhaParaMostrar.id}`;
                const logData = JSON.parse(localStorage.getItem(storageKey) || '{}');
                
                let deveMostrar = false;

                // Regra 1: Frequência "Sempre"
                if (campanhaParaMostrar.frequencia === 'sempre') {
                    deveMostrar = true;
                } 
                // Regra 2: Nunca viu
                else if (!logData.seenAt) {
                    deveMostrar = true;
                } 
                // Regra 3: Já viu, mas o Admin ATUALIZOU (updatedAt > seenAt)
                else {
                    const ultimaVezVisto = new Date(logData.seenAt).getTime();
                    const ultimaAtualizacaoAdmin = campanhaParaMostrar.updatedAt.getTime();

                    if (ultimaAtualizacaoAdmin > ultimaVezVisto) {
                        console.log("Campanha atualizada! Reexibindo...");
                        deveMostrar = true;
                    }
                }

                if (deveMostrar) {
                    setCurrentCampaign(campanhaParaMostrar);
                    setIsVisible(true);
                }
            }
        }, [campaigns, user.uid, isVisible]);

        // 3. Timer do Carrossel
        useEffect(() => {
            if (!currentCampaign || !isVisible) return;
            const items = currentCampaign.itens || [];
            if (items.length <= 1) return;

            const time = (items[currentIndex]?.duracao || 5) * 1000;
            const timer = setTimeout(() => {
                setCurrentIndex((prev) => (prev + 1) % items.length);
            }, time);
            return () => clearTimeout(timer);
        }, [currentIndex, currentCampaign, isVisible]);

        // 4. Fechar e Salvar Rastro
        const handleClose = () => {
            if (currentCampaign) {
                const storageKey = `popup_log_${user.uid}_${currentCampaign.id}`;
                const logData = {
                    seenAt: new Date().toISOString(),
                    campaignId: currentCampaign.id
                };
                localStorage.setItem(storageKey, JSON.stringify(logData));
            }
            setIsVisible(false);
            setTimeout(() => {
                setCurrentCampaign(null);
                setCurrentIndex(0);
            }, 300);
        };

        if (!currentCampaign || !isVisible) return null;
        const item = currentCampaign.itens ? currentCampaign.itens[currentIndex] : null;
        if (!item) return null;

        return (
            <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md animate-fade-in">
                <div className="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[85vh] flex flex-col border border-slate-700 overflow-hidden relative">
                    <button onClick={handleClose} className="absolute top-4 right-4 z-50 bg-black/50 hover:bg-black/80 text-white p-2 rounded-full transition-all border border-white/10 shadow-lg">
                        <X size={24} />
                    </button>
                    <div className="p-4 bg-slate-100 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 text-center">
                        <h3 className="font-bold text-xl text-slate-800 dark:text-white">{currentCampaign.titulo}</h3>
                    </div>
                    <div className="flex-1 bg-black flex items-center justify-center relative overflow-hidden">
                        {item.tipo === 'video' ? (
                            <video src={item.url} autoPlay muted loop controls className="w-full h-full max-h-[60vh] object-contain" />
                        ) : (
                            <img src={item.url} className="w-full h-full max-h-[60vh] object-contain" alt="Comunicado" />
                        )}
                        {currentCampaign.itens.length > 1 && (
                            <div className="absolute bottom-4 left-0 right-0 flex justify-center gap-2 z-20 pointer-events-none">
                                {currentCampaign.itens.map((_, idx) => (
                                    <div key={idx} className={`w-2 h-2 rounded-full transition-all shadow-sm ${idx === currentIndex ? 'bg-white scale-125' : 'bg-white/40'}`} />
                                ))}
                            </div>
                        )}
                    </div>
                    <div className="p-2 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800"></div>
                </div>
            </div>
        );
    };

const MarketplaceAudioPlayer = ({ url, name, onDownload, isDownloading }) => {
    const audioRef = useRef(null);
    const [isPlaying, setIsPlaying] = useState(false);
    const [currentTime, setCurrentTime] = useState(0);
    const [duration, setDuration] = useState(0);

    useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;
        const setAudioData = () => setDuration(audio.duration);
        const onTimeUpdate = () => setCurrentTime(audio.currentTime);
        const onEnded = () => setIsPlaying(false);
        
        // Força carregamento da duração caso já esteja em cache
        if (audio.readyState >= 1) setDuration(audio.duration);
        
        audio.addEventListener('loadedmetadata', setAudioData);
        audio.addEventListener('timeupdate', onTimeUpdate);
        audio.addEventListener('ended', onEnded);
        return () => {
            audio.removeEventListener('loadedmetadata', setAudioData);
            audio.removeEventListener('timeupdate', onTimeUpdate);
            audio.removeEventListener('ended', onEnded);
        }
    }, [url]);

    const togglePlay = () => {
        if (isPlaying) audioRef.current.pause();
        else audioRef.current.play();
        setIsPlaying(!isPlaying);
    };

    const formatTime = (time) => {
        if (!time || isNaN(time)) return "00:00";
        const m = Math.floor(time / 60);
        const s = Math.floor(time % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    };

    const progressPercent = duration > 0 ? (currentTime / duration) * 100 : 0;

    return (
        <div className="flex flex-col items-center justify-center w-full max-w-md p-10 bg-[#0a0a0f] border border-white/10 rounded-[2.5rem] shadow-2xl relative overflow-hidden group">
            {/* Efeito Glow de Fundo que pulsa com a música */}
            <div className="absolute inset-0 bg-gradient-to-br from-indigo-500/10 to-purple-500/5 pointer-events-none"></div>
            <div className={`absolute top-10 left-1/2 -translate-x-1/2 w-48 h-48 rounded-full blur-[60px] transition-all duration-1000 ${isPlaying ? 'bg-indigo-600/50 scale-125' : 'bg-slate-600/20 scale-90'}`}></div>

            {/* Ícone Animado Central */}
            <div className="relative mb-8 mt-4">
                {/* Anéis pulsantes se estiver tocando */}
                {isPlaying && (
                    <>
                        <div className="absolute inset-0 rounded-full border border-indigo-500/40 animate-ping" style={{ animationDuration: '2s' }}></div>
                        <div className="absolute inset-0 rounded-full border border-indigo-400/20 animate-ping" style={{ animationDuration: '2.5s', animationDelay: '0.5s' }}></div>
                    </>
                )}
                <button onClick={togglePlay} className="relative z-10 w-28 h-28 rounded-full bg-gradient-to-tr from-indigo-600 to-purple-600 text-white flex items-center justify-center shadow-[0_0_30px_rgba(79,70,229,0.5)] hover:scale-105 active:scale-95 transition-all border border-white/20">
                    {isPlaying ? <Pause size={40} fill="currentColor" /> : <Play size={40} fill="currentColor" className="ml-2" />}
                </button>
            </div>

            <div className="relative z-10 w-full text-center mb-8">
                <h4 className="text-white font-black text-xl line-clamp-2 mb-1">{name}</h4>
                <p className="text-indigo-400 text-xs uppercase tracking-widest font-bold flex items-center justify-center gap-2">
                    <Volume2 size={14} className={isPlaying ? 'animate-pulse' : ''} /> Áudio Oficial
                </p>
            </div>

            {/* Player Scrubber Premium Interativo */}
            <div className="w-full relative z-10 flex flex-col gap-2 mb-8">
                <div className="relative h-2 w-full bg-white/10 rounded-full overflow-hidden cursor-pointer" onClick={(e) => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const newTime = ((e.clientX - rect.left) / rect.width) * duration;
                    if (audioRef.current) audioRef.current.currentTime = newTime;
                    setCurrentTime(newTime);
                }}>
                    <div className="absolute top-0 left-0 h-full bg-indigo-500 rounded-full transition-all ease-linear" style={{ width: `${progressPercent}%` }}></div>
                </div>
                <div className="flex justify-between text-xs font-mono text-white/50 font-medium">
                    <span>{formatTime(currentTime)}</span>
                    <span>{formatTime(duration)}</span>
                </div>
            </div>

            <audio ref={audioRef} src={url} preload="metadata" />

            <button 
                onClick={(e) => { e.preventDefault(); onDownload(); }}
                disabled={isDownloading}
                className="w-full relative z-10 bg-white text-black hover:bg-gray-200 px-6 py-4 rounded-xl font-extrabold flex items-center justify-center gap-2 transition-all shadow-[0_10px_20px_rgba(255,255,255,0.1)] active:scale-95 disabled:opacity-50"
            >
                {isDownloading ? <div className="w-5 h-5 border-2 border-black/50 border-t-black rounded-full animate-spin"></div> : <Download size={20} />}
                {isDownloading ? 'Baixando Áudio...' : 'Fazer Download Agora'}
            </button>
        </div>
    );
};


// =================================================================================
// COMPONENTE ALUNO: LOJA / MARKETPLACE (VISUALIZADOR UNIVERSAL + CATEGORIAS)
// =================================================================================
const StudentMarketplace = ({ db, user, settings, showNotification, promotions = [] }) => {
    const [products, setProducts] = useState([]);
    const [purchasedCourses, setPurchasedCourses] = useState([]);
    const [purchasedProducts, setPurchasedProducts] = useState([]); 
    const [isLoading, setIsLoading] = useState(true);
    const [marketplaceActive, setMarketplaceActive] = useState(true);
    const [selectedProduct, setSelectedProduct] = useState(null);
    const [currentImageIndex, setCurrentImageIndex] = useState(0);
    const [checkoutProduct, setCheckoutProduct] = useState(null);
    
    // 👇 NOVO ESTADO PARA AS CATEGORIAS DA LOJA 👇
    const [selectedCategory, setSelectedCategory] = useState('Todas');

    // ESTADOS DO VISUALIZADOR UNIVERSAL DE MÍDIAS
    const [viewingProduct, setViewingProduct] = useState(null); 
    const [activeProductFile, setActiveProductFile] = useState(null);
    const [isDownloading, setIsDownloading] = useState(false);

    // MOTOR DE VERIFICAÇÃO AUTOMÁTICA
    const [pendingOrders, setPendingOrders] = useState([]);
    const isCheckingRef = useRef(false);

    const handleForceDownload = async (url, fileName) => {
        if (!url) return;
        setIsDownloading(true);
        if (showNotification) showNotification("Iniciando o download...", "info");
        
        try {
            const fetchUrl = url + (url.includes('?') ? '&' : '?') + 'force_download=1&t=' + Date.now();
            const response = await fetch(fetchUrl, { method: 'GET', mode: 'cors', cache: 'no-cache' });
            if (!response.ok) throw new Error("Erro na rede ao tentar baixar");
            
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = blobUrl;
            
            let finalName = fileName || 'arquivo_baixado';
            if (!finalName.includes('.')) {
                const parts = url.split('/');
                const lastPart = parts[parts.length - 1].split('?')[0];
                if (lastPart.includes('.')) finalName = lastPart;
            }
            
            link.download = finalName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(blobUrl);
        } catch (error) {
            console.error("Erro no download forçado:", error);
            window.open(url, '_blank');
        } finally {
            setIsDownloading(false);
        }
    };

    useEffect(() => {
        if (!db) return;
        const unsubConfig = onSnapshot(doc(db, "config", "marketplace_settings"), (docSnap) => {
            if (docSnap.exists()) setMarketplaceActive(docSnap.data().isActive ?? true);
        });

        const q = query(collection(db, "marketplace_products"), where("active", "==", true));
        const unsubProducts = onSnapshot(q, (snapshot) => {
            const prods = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            prods.sort((a, b) => b.createdAt - a.createdAt);
            setProducts(prods);
            setIsLoading(false);
        });

        let unsubCourses = () => {};
        let unsubProds = () => {};
        if (user) {
            unsubCourses = onSnapshot(query(collection(db, "transactions"), where("userEmail", "==", user.email), where("status", "in", ["aprovado", "pago", "approved"])), snap => {
                setPurchasedCourses(snap.docs.map(d => d.data().courseId));
            });
            unsubProds = onSnapshot(query(collection(db, "marketplace_orders"), where("userId", "==", user.uid), where("status", "in", ["aprovado", "pago", "approved"])), snap => {
                setPurchasedProducts(snap.docs.map(d => d.data().productId));
            });
        }

        return () => { unsubConfig(); unsubProducts(); unsubCourses(); unsubProds(); };
    }, [db, user]);

    useEffect(() => {
        if (!db || !user) return;
        const qPending = query(
            collection(db, "marketplace_orders"), 
            where("userId", "==", user.uid), 
            where("status", "in", ["pendente", "pending", "in_process"])
        );
        const unsubPending = onSnapshot(qPending, snap => {
            setPendingOrders(snap.docs.map(d => ({id: d.id, ...d.data()})));
        });
        return () => unsubPending();
    }, [db, user]);

    const getDiscountInfo = (itemId, itemType, originalPrice) => {
        let price = typeof originalPrice === 'number' 
            ? originalPrice 
            : parseFloat(String(originalPrice || "0").includes(',') 
                ? String(originalPrice).replace(/\./g, '').replace(',', '.') 
                : String(originalPrice));
        
        if (isNaN(price) || price <= 0) return { hasDiscount: false, originalPrice: price || 0, finalPrice: price || 0 };

        const promo = promotions.find(p => p.discountTargetId === itemId && p.discountTargetType === itemType);
        if (!promo) return { hasDiscount: false, originalPrice: price, finalPrice: price };

        if (promo.conditionType === 'buy_other') {
            if (promo.conditionTargetType === 'course' && !purchasedCourses.includes(promo.conditionTargetId)) return { hasDiscount: false, originalPrice: price, finalPrice: price };
            if (promo.conditionTargetType === 'product' && !purchasedProducts.includes(promo.conditionTargetId)) return { hasDiscount: false, originalPrice: price, finalPrice: price };
        }

        let finalPrice = promo.discountType === 'percentage' 
            ? price - (price * (promo.discountValue / 100)) 
            : price - promo.discountValue;

        return {
            hasDiscount: true,
            originalPrice: price,
            finalPrice: Math.max(0, finalPrice),
            tag: promo.discountType === 'percentage' ? `-${promo.discountValue}%` : `-R$${promo.discountValue}`
        };
    };

    const handleBuyClick = (product) => {
        if (Number(product.stock) <= 0) {
            showNotification("Poxa, este produto acabou de esgotar.", "error");
            return;
        }
        setCheckoutProduct({ ...product, appliedDiscount: getDiscountInfo(product.id, 'product', product.price) });
    };

    const verifyPendingPayments = async () => {
        if (isCheckingRef.current || pendingOrders.length === 0) return;
        const mpToken = settings?.mercadoPagoAccessToken || settings?.mercadopagoAccessToken || 'APP_USR-5078406563096978-100721-63ed85c89b2cb57e85109eb14514462c-336516116';
        if (!mpToken) return;

        isCheckingRef.current = true;

        try {
            for (let order of pendingOrders) {
                let mpStatus = null;
                let mpData = null;

                const mpId = order.mpPaymentId || order.paymentId || order.payment_id;
                
                if (mpId && mpId !== 'N/A') {
                    const resId = await fetch(`https://api.mercadopago.com/v1/payments/${String(mpId).trim()}`, { 
                        headers: { 'Authorization': `Bearer ${mpToken}` } 
                    });
                    if (resId.ok) { 
                        mpData = await resId.json(); 
                        mpStatus = String(mpData.status).toLowerCase(); 
                    }
                }

                if (!mpStatus) {
                    const searchUrl = `https://api.mercadopago.com/v1/payments/search?sort=date_created&criteria=desc&external_reference=${order.id}`;
                    const resSearch = await fetch(searchUrl, { 
                        headers: { 'Authorization': `Bearer ${mpToken}` } 
                    });
                    if (resSearch.ok) {
                        const searchData = await resSearch.json();
                        if (searchData.results && searchData.results.length > 0) { 
                            mpData = searchData.results[0]; 
                            mpStatus = String(mpData.status).toLowerCase(); 
                        }
                    }
                }

                if (mpStatus) {
                    let novoStatus = order.status;
                    if (['approved', 'accredited'].includes(mpStatus)) novoStatus = 'pago'; 
                    else if (['rejected', 'cancelled', 'refunded', 'charged_back'].includes(mpStatus)) novoStatus = 'cancelado'; 
                    
                    if (novoStatus !== order.status) {
                        await updateDoc(doc(db, "marketplace_orders", order.id), { 
                            status: novoStatus, 
                            mpPaymentId: mpData ? String(mpData.id) : order.mpPaymentId, 
                            updatedAt: serverTimestamp() 
                        });
                        
                        if (novoStatus === 'pago') {
                            if(showNotification) showNotification(`O pagamento do produto "${order.productTitle}" foi aprovado e liberado!`, "success");
                        }
                    }
                }
            }
        } catch (error) {
            console.error("Erro na verificação automática do aluno:", error);
        } finally {
            isCheckingRef.current = false;
        }
    };

    useEffect(() => {
        let interval;
        if (pendingOrders.length > 0) {
            interval = setInterval(() => {
                verifyPendingPayments();
            }, 5000);
        }
        return () => clearInterval(interval);
    }, [pendingOrders, settings]);

    if (!marketplaceActive) return <div className="flex flex-col items-center justify-center h-[60vh] text-center px-4 animate-fade-in"><ShoppingBag className="w-16 h-16 text-slate-600 mb-4" /><h2 className="text-2xl font-bold text-white">Loja Fechada</h2></div>;

    const getProductFiles = (product) => {
        if (!product) return [];
        if (product.digitalFiles && product.digitalFiles.length > 0) {
            return product.digitalFiles.map(file => {
                let type = file.type;
                if (!type) {
                    if (file.url?.includes('.mp4') || file.url?.includes('.webm')) type = 'video';
                    else if (file.url?.includes('.pdf')) type = 'pdf';
                    else if (file.url?.match(/\.(mp3|wav|ogg|m4a)$/i)) type = 'audio'; 
                    else type = 'arquivo';
                }
                return { ...file, type };
            });
        }
        
        const fileUrl = product.fileUrl || product.downloadUrl || product.url || product.link || product.conteudo;
        if (fileUrl && fileUrl.trim() !== '') {
            let type = 'arquivo';
            const lowerUrl = fileUrl.toLowerCase();
            if (lowerUrl.includes('.mp4') || lowerUrl.includes('.webm') || lowerUrl.includes('vimeo') || lowerUrl.includes('youtube')) type = 'video';
            else if (lowerUrl.includes('.pdf')) type = 'pdf';
            else if (lowerUrl.match(/\.(jpeg|jpg|gif|png|webp)$/)) type = 'image';
            else if (lowerUrl.match(/\.(mp3|wav|ogg|m4a)$/i)) type = 'audio'; 
            
            return [{
                url: fileUrl,
                name: product.productFileName || product.title || 'Arquivo Digital',
                type: product.productFileType || type
            }];
        }
        return [];
    };

    // 👇 NOVA LÓGICA DE FILTRAGEM E CATEGORIAS 👇
    const availableCategories = ['Todas', ...new Set(products.map(p => p.category || p.categoria || 'Outros'))];

    const filteredProducts = selectedCategory === 'Todas'
        ? products
        : products.filter(p => (p.category || p.categoria || 'Outros') === selectedCategory);

    return (
        <div className="space-y-6 animate-fade-in pb-32 max-w-6xl mx-auto px-4 md:px-8 lg:px-12 mt-20 md:mt-28">
            <div className="mb-6 flex items-center gap-4">
                <div className="p-3 bg-indigo-500/20 text-indigo-400 rounded-xl shadow-inner border border-indigo-500/30"><ShoppingBag className="w-6 h-6 md:w-8 md:h-8" /></div>
                <div><h2 className="text-2xl md:text-3xl font-black text-white tracking-tight">Loja Exclusiva</h2></div>
            </div>

            {/* 👇 BARRA DE CATEGORIAS DA LOJA 👇 */}
            {!isLoading && products.length > 0 && availableCategories.length > 1 && (
                <div className="mb-8 flex gap-3 overflow-x-auto py-2 snap-x custom-scrollbar">
                    {availableCategories.map((cat, idx) => (
                        <button
                            key={idx}
                            onClick={() => setSelectedCategory(cat)}
                            className={`snap-start px-5 py-2 md:px-6 md:py-2.5 rounded-full text-xs md:text-sm font-bold whitespace-nowrap transition-all border shrink-0 ${
                                selectedCategory === cat
                                ? 'bg-indigo-600 text-white border-indigo-500 shadow-[0_0_15px_rgba(79,70,229,0.5)]'
                                : 'bg-[#111] hover:bg-indigo-600/50 text-white/70 hover:text-white border-white/10 hover:border-indigo-500/50'
                            }`}
                        >
                            {cat}
                        </button>
                    ))}
                </div>
            )}

            {isLoading ? (
                <div className="flex justify-center py-20"><div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div></div>
            ) : filteredProducts.length === 0 ? (
                <div className="text-center py-20 border-2 border-dashed border-white/10 rounded-2xl bg-white/5"><p className="font-medium text-slate-400">Nenhum produto disponível nesta categoria.</p></div>
            ) : (
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
                    {filteredProducts.map(prod => { // <-- AGORA USA filteredProducts
                        const isOutOfStock = Number(prod.stock) <= 0;
                        const discountInfo = getDiscountInfo(prod.id, 'product', prod.price);
                        const isOwned = purchasedProducts.includes(prod.id); 

                        return (
                            <div key={prod.id} onClick={() => setSelectedProduct(prod)} className={`bg-[#0a0a0f] rounded-2xl overflow-hidden border border-white/10 cursor-pointer hover:-translate-y-1 transition-all duration-300 shadow-lg flex flex-col group ${(isOutOfStock && !isOwned) ? 'opacity-70 grayscale-[0.5]' : ''}`}>
                                <div className="h-40 sm:h-52 bg-slate-900 relative overflow-hidden flex items-center justify-center">
                                    
                                    {isOwned ? (
                                        <div className="absolute top-2 left-2 z-20">
                                            <span className="bg-emerald-600 text-white px-2.5 py-1 rounded-lg text-[10px] md:text-xs font-black shadow-lg shadow-emerald-600/40 tracking-widest border border-emerald-400 flex items-center gap-1">
                                                <CheckCircle size={12} /> LIBERADO
                                            </span>
                                        </div>
                                    ) : (!isOutOfStock && discountInfo.hasDiscount && (
                                        <div className="absolute top-2 left-2 z-20">
                                            <span className="bg-pink-600 text-white px-2.5 py-1 rounded-lg text-[10px] md:text-xs font-black shadow-lg shadow-pink-600/40 animate-pulse tracking-widest border border-pink-400">
                                                {discountInfo.tag} OFF
                                            </span>
                                        </div>
                                    ))}

                                    {prod.images && prod.images.length > 0 ? <img src={prod.images[0]} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" /> : <ImageIcon className="w-10 h-10 text-slate-600"/>}
                                </div>
                                <div className="p-4 sm:p-5 flex flex-col flex-1">
                                    <h3 className="font-bold text-sm sm:text-base line-clamp-2 mb-3 text-white">{prod.title}</h3>
                                    <div className="mt-auto border-t border-white/5 pt-3">
                                        <span className="text-[9px] text-indigo-400 font-bold uppercase tracking-widest block mb-0.5">
                                            {isOwned ? 'Status' : 'Valor Único'}
                                        </span>
                                        
                                        {isOwned ? (
                                            <span className="text-emerald-400 font-black text-lg md:text-xl flex items-center gap-1.5">
                                                <CheckCircle size={16}/> Adquirido
                                            </span>
                                        ) : discountInfo.hasDiscount ? (
                                            <div className="flex flex-col">
                                                <span className="text-[10px] md:text-xs text-slate-500 line-through decoration-red-500/50">R$ {discountInfo.originalPrice.toFixed(2).replace('.', ',')}</span>
                                                <span className="text-emerald-400 font-black text-lg md:text-xl">R$ {discountInfo.finalPrice.toFixed(2).replace('.', ',')}</span>
                                            </div>
                                        ) : (
                                            <span className="text-emerald-400 font-black text-lg md:text-xl">R$ {discountInfo.originalPrice.toFixed(2).replace('.', ',')}</span>
                                        )}
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            )}

            {/* O Restante do Modal de Produtos Fica Igual... */}
            {selectedProduct && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 pb-24 md:p-8 md:pb-20 bg-black/80 backdrop-blur-sm animate-fade-in" onClick={() => { setSelectedProduct(null); setCurrentImageIndex(0); }}>
                    <div className="bg-slate-900 border border-[#333] w-full md:max-w-4xl rounded-2xl md:rounded-3xl overflow-hidden flex flex-col md:flex-row shadow-[0_0_50px_rgba(0,0,0,0.8)] relative max-h-[80vh] md:max-h-[75vh] animate-scale-in" onClick={e => e.stopPropagation()}>
                        
                        <button onClick={() => { setSelectedProduct(null); setCurrentImageIndex(0); }} className="absolute top-3 right-3 md:top-4 md:right-4 z-50 bg-black/50 text-white p-1.5 md:p-2 rounded-full hover:bg-red-500 backdrop-blur-md transition-colors"><X className="w-5 h-5"/></button>

                        <div className="md:w-1/2 bg-black relative flex items-center justify-center h-48 md:h-auto min-h-[190px] md:min-h-[400px] shrink-0">
                            {selectedProduct.images && selectedProduct.images.length > 0 ? (
                                <>
                                    <img src={selectedProduct.images[currentImageIndex]} className="w-full h-full object-contain animate-fade-in" key={currentImageIndex} />
                                    {selectedProduct.images.length > 1 && (
                                        <>
                                            <button onClick={() => setCurrentImageIndex(prev => prev === 0 ? selectedProduct.images.length - 1 : prev - 1)} className="absolute left-2 md:left-4 bg-black/40 p-2 rounded-full text-white hover:bg-black/70 backdrop-blur-sm border border-white/10"><ChevronDown className="w-5 h-5 rotate-90"/></button>
                                            <button onClick={() => setCurrentImageIndex(prev => prev === selectedProduct.images.length - 1 ? 0 : prev + 1)} className="absolute right-2 md:right-4 bg-black/40 p-2 rounded-full text-white hover:bg-black/70 backdrop-blur-sm border border-white/10"><ChevronDown className="w-5 h-5 -rotate-90"/></button>
                                        </>
                                    )}
                                </>
                            ) : <ImageIcon className="w-16 h-16 text-slate-700"/>}
                        </div>

                        <div className="md:w-1/2 p-5 md:p-10 flex flex-col overflow-y-auto custom-scrollbar bg-slate-900 relative">
                            <h2 className="text-lg md:text-3xl font-black tracking-tight text-white mb-2 leading-tight">{selectedProduct.title}</h2>
                            
                            <div className="mb-4 md:mb-8">
                                {purchasedProducts.includes(selectedProduct.id) ? (
                                    <div className="flex items-center gap-2 text-emerald-400">
                                        <CheckCircle size={32} />
                                        <span className="text-2xl md:text-4xl font-black">Adquirido</span>
                                    </div>
                                ) : getDiscountInfo(selectedProduct.id, 'product', selectedProduct.price)?.hasDiscount ? (
                                    <div className="flex flex-col">
                                        <div className="flex items-center gap-2">
                                            <span className="text-sm md:text-lg text-slate-500 line-through decoration-red-500/50 decoration-2">R$ {getDiscountInfo(selectedProduct.id, 'product', selectedProduct.price).originalPrice.toFixed(2).replace('.', ',')}</span>
                                            <span className="bg-pink-600 text-white text-[10px] md:text-xs px-2 py-1 rounded font-bold uppercase">{getDiscountInfo(selectedProduct.id, 'product', selectedProduct.price).tag} OFF</span>
                                        </div>
                                        <p className="text-2xl md:text-4xl font-black text-emerald-400 mt-1">R$ {getDiscountInfo(selectedProduct.id, 'product', selectedProduct.price).finalPrice.toFixed(2).replace('.', ',')}</p>
                                    </div>
                                ) : (
                                    <p className="text-2xl md:text-4xl font-black text-emerald-400">R$ {getDiscountInfo(selectedProduct.id, 'product', selectedProduct.price)?.originalPrice.toFixed(2).replace('.', ',')}</p>
                                )}
                            </div>
                            
                            <div className="mb-4 md:mb-8 relative z-10 flex-1">
                                <h4 className="text-[9px] md:text-[10px] font-bold uppercase tracking-widest mb-2 md:mb-3 text-slate-500">Detalhes</h4>
                                <p className="text-xs md:text-sm text-slate-300 whitespace-pre-wrap leading-relaxed">{selectedProduct.description}</p>
                            </div>

                            <div className="mt-auto pt-4 border-t border-white/5 relative z-10 shrink-0">
                                {purchasedProducts.includes(selectedProduct.id) ? (
                                    <button onClick={() => {
                                        const files = getProductFiles(selectedProduct);
                                        setViewingProduct(selectedProduct);
                                        setActiveProductFile(files.length > 0 ? files[0] : null);
                                        setSelectedProduct(null);
                                        setCurrentImageIndex(0);
                                    }} className="w-full py-4 rounded-xl font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all bg-emerald-600 hover:bg-emerald-500 text-white shadow-[0_0_20px_rgba(16,185,129,0.3)] hover:-translate-y-1">
                                        <CheckCircle className="w-5 h-5"/> Acessar Arquivos

                        <div className="w-full md:w-80 bg-[#111] border-b md:border-b-0 md:border-r border-white/10 flex flex-col shrink-0 h-[30vh] md:h-full">
                            <div className="p-4 md:p-5 border-b border-white/10 bg-[#0a0a0a] shrink-0">

                                            <div className={`p-2 md:p-2.5 rounded-lg shrink-0 ${activeProductFile?.url === f.url ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white/10 text-white/50'}`}>

                                            <div className="flex-1 min-w-0">
                                                <p className="font-bold text-xs md:text-sm truncate leading-tight">{f.name || `Arquivo ${idx + 1}`}</p>
